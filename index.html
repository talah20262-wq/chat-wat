<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="tab-title">Tallah Star | Diamond Stable</title>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --bg: #0b141a; --hdr: #202c33; --green: #00a884;
            --text: #e9edef; --gold: #d4af37; --blue: #20adff; --msg-me: #005c4b;
            --msg-other: #202c33; --glass: rgba(32, 44, 51, 0.9);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* ستايل Tallah Star الماسي (ثابت كما طلبت) */
        .glass-panel { backdrop-filter: blur(20px); background: var(--glass); border: 1px solid rgba(212,175,55,0.15); }
        header { background: var(--hdr); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); z-index: 1000; }
        .pfp-main { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; cursor: pointer; }
        
        .full-overlay { position: fixed; inset: 0; background: radial-gradient(circle at center, #1c282f 0%, #0b141a 100%); z-index: 100000; display: flex; align-items: center; justify-content: center; text-align: center; }
        .entry-card { padding: 40px; border-radius: 35px; width: 90%; max-width: 420px; box-shadow: 0 25px 60px rgba(0,0,0,1); border: 1px solid rgba(212,175,55,0.2); }

        .user-item { display: flex; padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.03); align-items: center; cursor: pointer; transition: 0.3s; }
        .user-item:hover { background: rgba(212,175,55,0.05); }
        .pfp-list { width: 55px; height: 55px; border-radius: 50%; margin-left: 15px; border: 1.5px solid #333; object-fit: cover; }
        
        #chat-ui { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: none; flex-direction: column; }
        .chat-wallpaper { flex: 1; overflow-y: auto; padding: 20px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-color: rgba(0,0,0,0.95); background-blend-mode: darken; display: flex; flex-direction: column; }
        
        .msg-bubble { max-width: 78%; padding: 10px 14px; border-radius: 15px; margin-bottom: 8px; position: relative; font-size: 15px; animation: fadeInUp 0.3s; }
        .msg-me { background: var(--msg-me); align-self: flex-end; border-top-right-radius: 2px; }
        .msg-other { background: var(--msg-other); align-self: flex-start; border-top-left-radius: 2px; }
        
        .footer-bar { background: var(--hdr); padding: 10px 15px; display: flex; align-items: center; gap: 12px; }
        input[type="text"] { flex: 1; background: #2a3942; border: none; padding: 12px 20px; border-radius: 30px; color: white; outline: none; }

        .admin-main { position: fixed; inset: 0; background: #000; z-index: 50000; display: none; padding: 20px; overflow-y: auto; }
        .card-gold { background: linear-gradient(145deg, #1c282f, #0b141a); padding: 20px; border-radius: 20px; border-left: 4px solid var(--gold); margin-bottom: 20px; }
        .btn-gold { background: var(--gold); color: black; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        
        .req-notif { background: #ff4d4d; color: white; padding: 2px 8px; border-radius: 10px; font-size: 12px; margin-right: 5px; animation: pulse 1s infinite; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

<div id="wait-screen" class="full-overlay hidden">
    <div class="entry-card glass-panel animate__animated animate__pulse animate__infinite">
        <i class="fas fa-crown" style="color:var(--gold); font-size:60px;"></i>
        <h2 style="color:white; margin-top:25px;">في انتظار موافقة الإمبراطور</h2>
        <p style="color:gray; margin-top:10px;">طلبك وصل لـ Tallah Star.. افتح الموقع كمان شوية.</p>
    </div>
</div>

<div id="gate" class="full-overlay hidden">
    <div class="entry-card glass-panel animate__animated animate__zoomIn">
        <h1 style="color:var(--gold); font-size:32px;">TALLAH STAR</h1>
        <p style="color:gray; font-size:12px; margin-bottom:30px;">BLACK DIAMOND EDITION</p>
        <input type="password" id="pass-code" placeholder="كود الدخول">
        <button class="btn-gold" onclick="login()">دخول</button>
        <hr style="margin:20px 0; opacity:0.1">
        <input type="text" id="join-name" placeholder="اسمك لطلب الانضمام" style="width:100%; padding:12px; border-radius:12px; background:#2a3942; color:white; border:none; margin-bottom:10px;">
        <button onclick="sendJoinRequest()" style="background:transparent; border:1px solid var(--green); color:var(--green); width:100%; padding:12px; border-radius:12px; cursor:pointer; font-weight:bold;">إرسال طلب انضمام</button>
    </div>
</div>

<div id="app" class="hidden">
    <header>
        <div style="display:flex; align-items:center; gap:12px;">
            <img id="my-pfp" class="pfp-main" onclick="document.getElementById('pfp-input').click()">
            <input type="file" id="pfp-input" hidden onchange="uploadMyPfp(this)">
            <b id="site-name-display" style="color:var(--gold); font-size:18px;">Tallah Star</b>
        </div>
        <div>
            <span id="req-count-badge" class="req-notif hidden">طلب جديد!</span>
            <i class="fas fa-user-shield" id="admin-btn" onclick="openAdmin()" style="color:var(--gold); font-size:22px; cursor:pointer;"></i>
            <i class="fas fa-power-off" onclick="logout()" style="color:#ff4d4d; margin-right:15px; cursor:pointer;"></i>
        </div>
    </header>

    <div id="users-list-box" style="height:calc(100vh - 75px); overflow-y:auto;">
        <div class="user-item" onclick="openChannel()" style="background:rgba(212,175,55,0.1);">
            <div style="background:var(--gold); width:50px; height:50px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin-left:15px;">
                <i class="fas fa-bullhorn" style="color:black;"></i>
            </div>
            <b>قناة طلة الرسمية ✅</b>
        </div>
        <div id="dynamic-users"></div>
    </div>
</div>

<div id="chat-ui">
    <div class="glass-panel" style="padding:10px 15px; display:flex; align-items:center; gap:12px;">
        <i class="fas fa-chevron-right" onclick="closeChat()" style="cursor:pointer;"></i>
        <img id="chat-pfp" class="pfp-list" style="width:40px; height:40px; margin:0;">
        <div style="flex:1">
            <b id="chat-name"></b>
            <div id="typing-status" style="font-size:11px; color:var(--green); display:none;">جاري الكتابة...</div>
        </div>
    </div>
    <div id="msg-box" class="chat-wallpaper"></div>
    <div class="footer-bar">
        <input type="text" id="msg-input" placeholder="رسالتك هنا..." oninput="handleTyping()">
        <i class="fas fa-paper-plane" onclick="sendText()" style="color:var(--green); font-size:24px; cursor:pointer;"></i>
    </div>
</div>

<div id="admin-panel" class="admin-main">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
        <h2 style="color:var(--gold);">لوحة التحكم</h2>
        <button onclick="closeAdmin()" class="btn-gold" style="width:auto; padding:5px 15px;">إغلاق</button>
    </div>
    <div class="card-gold">
        <h4>⚖️ طلبات الانضمام الجديدة</h4>
        <div id="admin-reqs-list" style="margin-top:10px;"></div>
    </div>
    <div class="card-gold">
        <h4>🚀 برودكاست للكل</h4>
        <input type="text" id="bc-input" placeholder="رسالة للجميع...">
        <button class="btn-gold" onclick="broadcast()">إرسال 🚀</button>
    </div>
    <div class="card-gold">
        <h4>👥 جميع الأعضاء</h4>
        <div id="all-users-list"></div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://talah-c12c5-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let me = JSON.parse(localStorage.getItem('tallah_auth_v18'));
    let myReqId = localStorage.getItem('tallah_req_v18');
    let activeChatKey, targetId, typeTimer;

    // --- نظام التشغيل الذكي ---
    if(me) {
        document.getElementById('app').classList.remove('hidden');
        startEngine();
    } else if(myReqId) {
        document.getElementById('wait-screen').classList.remove('hidden');
        checkMyReqStatus();
    } else {
        document.getElementById('gate').classList.remove('hidden');
    }

    function startEngine() {
        document.getElementById('my-pfp').src = me.pfp || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
        if(me.role !== 'admin') document.getElementById('admin-btn').classList.add('hidden');
        
        loadUsers();
        listenForRequests(); // دي اللي كانت ناقصة عشان الإشعارات توصلك
    }

    // --- معالجة الطلبات (الأهم للإمبراطور) ---
    function sendJoinRequest() {
        const n = document.getElementById('join-name').value;
        if(!n) return Swal.fire('اكتب اسمك يا بطل');
        const ref = db.ref('join_requests').push({ name: n, status: 'pending', time: Date.now() });
        localStorage.setItem('tallah_req_v18', ref.key);
        location.reload();
    }

    function listenForRequests() {
        if(me.role !== 'admin') return;
        db.ref('join_requests').on('value', snap => {
            let count = 0;
            const list = document.getElementById('admin-reqs-list');
            list.innerHTML = "";
            snap.forEach(r => {
                if(r.val().status === 'pending') {
                    count++;
                    list.innerHTML += `<div style="padding:10px; background:rgba(255,255,255,0.05); margin-bottom:5px; border-radius:10px; display:flex; justify-content:space-between;">
                        <span>${r.val().name}</span>
                        <button onclick="approve('${r.key}', '${r.val().name}')" style="color:var(--green); background:none; border:none; cursor:pointer;">قبول ✅</button>
                    </div>`;
                }
            });
            // تحديث بادج الإشعارات في الهيدر
            const badge = document.getElementById('req-count-badge');
            if(count > 0) {
                badge.classList.remove('hidden');
                badge.innerText = count + " طلب جديد!";
                document.getElementById('notif-sound').play(); // رنة لما يوصل طلب
            } else {
                badge.classList.add('hidden');
            }
        });
    }

    async function approve(key, name) {
        const { value: code } = await Swal.fire({ title: 'كود الدخول للعضو', input: 'text' });
        if(code) {
            const newUser = { name: name, code: code, role: 'user', pfp: '' };
            const uRef = db.ref('users').push(newUser);
            db.ref('join_requests/'+key).update({ status: 'approved', userData: {...newUser, uid: uRef.key} });
            Swal.fire('تم القبول بنجاح');
        }
    }

    function checkMyReqStatus() {
        db.ref('join_requests/'+myReqId).on('value', s => {
            if(s.val()?.status === 'approved') {
                localStorage.setItem('tallah_auth_v18', JSON.stringify(s.val().userData));
                localStorage.removeItem('tallah_req_v18');
                location.reload();
            }
        });
    }

    // --- نظام الدردشة ---
    function openChat(uid, name, pfp) {
        targetId = uid;
        activeChatKey = [me.uid, uid].sort().join("_");
        document.getElementById('chat-ui').style.display = 'flex';
        document.getElementById('chat-name').innerText = name;
        document.getElementById('chat-pfp').src = pfp || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
        
        db.ref(`typing/${activeChatKey}/${targetId}`).on('value', s => {
            document.getElementById('typing-status').style.display = s.val() ? 'block' : 'none';
        });

        db.ref('messages/'+activeChatKey).on('value', snap => {
            const box = document.getElementById('msg-box'); box.innerHTML = "";
            snap.forEach(m => {
                const d = m.val();
                box.innerHTML += `<div class="msg-bubble ${d.sender===me.uid?'msg-me':'msg-other'}">${d.content}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendText() {
        const v = document.getElementById('msg-input').value; if(!v) return;
        db.ref('messages/'+activeChatKey).push({ sender: me.uid, content: v, time: Date.now() });
        document.getElementById('msg-input').value = "";
    }

    function handleTyping() {
        db.ref(`typing/${activeChatKey}/${me.uid}`).set(true);
        clearTimeout(typeTimer);
        typeTimer = setTimeout(() => db.ref(`typing/${activeChatKey}/${me.uid}`).set(false), 2000);
    }

    function loadUsers() {
        db.ref('users').on('value', snap => {
            const box = document.getElementById('dynamic-users'); box.innerHTML = "";
            const adminBox = document.getElementById('all-users-list'); if(adminBox) adminBox.innerHTML = "";
            snap.forEach(u => {
                if(u.key === me.uid) return;
                box.innerHTML += `<div class="user-item" onclick="openChat('${u.key}', '${u.val().name}', '${u.val().pfp}')">
                    <img src="${u.val().pfp || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="pfp-list">
                    <b>${u.val().name}</b>
                </div>`;
                if(adminBox) adminBox.innerHTML += `<div style="padding:5px;">${u.val().name} (${u.val().code})</div>`;
            });
        });
    }

    function login() {
        const c = document.getElementById('pass-code').value;
        if(c === "248") { // كود الإمبراطور
            me = { uid:'admin', name:'الإمبراطور', role:'admin', pfp:'' };
            localStorage.setItem('tallah_auth_v18', JSON.stringify(me));
            location.reload();
        } else {
            db.ref('users').once('value', s => {
                s.forEach(u => {
                    if(u.val().code === c) {
                        me = u.val(); me.uid = u.key;
                        localStorage.setItem('tallah_auth_v18', JSON.stringify(me));
                        location.reload();
                    }
                });
            });
        }
    }

    function logout() { localStorage.clear(); location.reload(); }
    function closeChat() { document.getElementById('chat-ui').style.display='none'; }
    function openAdmin() { document.getElementById('admin-panel').style.display='block'; }
    function closeAdmin() { document.getElementById('admin-panel').style.display='none'; }
</script>
</body>
</html>
