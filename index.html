<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tallah Star | The Infinite Empire v27</title>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --gold: #d4af37; --royal: linear-gradient(45deg, #d4af37, #f9f295, #ab8e28);
            --black: #050505; --dark: #0b141a; --green: #00a884; --glass: rgba(15, 23, 30, 0.85);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; cursor: default; }
        body { background: var(--black); color: white; height: 100vh; overflow: hidden; }

        /* تأثير مصفوفة الأكواد (Matrix) خفيف في الخلفية */
        #matrix-bg { position: fixed; inset: 0; z-index: -1; opacity: 0.1; pointer-events: none; }

        .screen { position: fixed; inset: 0; display: none; flex-direction: column; z-index: 10; }
        .active { display: flex !important; }

        /* الهيدر الماسي */
        header { 
            background: var(--dark); padding: 15px 20px; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 2px solid var(--gold); box-shadow: 0 5px 20px rgba(212,175,55,0.2);
        }

        /* لوحة التحكم الجانبية الفخمة */
        #admin-drawer { 
            position: fixed; left: -100%; top: 0; width: 85%; max-width: 400px; height: 100%; 
            background: #0a0a0a; z-index: 10000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
            padding: 30px; border-right: 3px solid var(--gold); overflow-y: auto;
        }
        .drawer-open { left: 0 !important; }

        /* فقاعات الشات "الحبشتكانات" */
        .chat-container { 
            flex: 1; overflow-y: auto; padding: 20px; 
            background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: overlay; background-color: rgba(0,0,0,0.9);
        }
        .bubble { 
            max-width: 75%; padding: 14px; border-radius: 20px; margin-bottom: 12px; 
            position: relative; animation: zoomIn 0.3s; font-size: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .bubble.me { background: #005c4b; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bubble.other { background: #202c33; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid rgba(212,175,55,0.1); }
        
        /* حبشتكانة: رسالة الإمبراطور نوره عالي */
        .admin-msg { border: 1px solid var(--gold) !important; background: linear-gradient(135deg, #005c4b 0%, #1a1a1a 100%) !important; box-shadow: 0 0 15px rgba(212,175,55,0.4) !important; }
        .crown-icon { color: var(--gold); margin-left: 5px; filter: drop-shadow(0 0 5px var(--gold)); }

        /* العناصر التفاعلية */
        .input-area { background: #202c33; padding: 10px 15px; display: flex; align-items: center; gap: 10px; border-top: 1px solid rgba(255,255,255,0.1); }
        .input-field { flex: 1; background: #2a3942; border: none; padding: 12px 20px; border-radius: 25px; color: white; outline: none; font-size: 16px; }
        .btn-gold { color: var(--gold); font-size: 24px; cursor: pointer; transition: 0.3s; }
        .btn-gold:hover { transform: scale(1.2) rotate(10deg); }

        /* كارت العضو */
        .card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; margin-bottom: 10px; border-right: 4px solid var(--gold); transition: 0.3s; }
        .card:hover { background: rgba(255,255,255,0.07); }

        @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<canvas id="matrix-bg"></canvas>
<audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

<div id="admin-drawer">
    <h2 style="color:var(--gold); margin-bottom:25px;"><i class="fas fa-crown"></i> إدارة Tallah Star</h2>
    
    <div id="admin-tools">
        <h4 style="color:var(--green);"><i class="fas fa-user-plus"></i> طلبات الانضمام</h4>
        <div id="pending-list" style="margin-top:10px; min-height: 50px;"></div>
        
        <hr style="opacity:0.1; margin:20px 0;">
        
        <h4 style="color:var(--gold);"><i class="fas fa-users-cog"></i> التحكم في الرعية</h4>
        <div id="active-list" style="margin-top:10px;"></div>
    </div>

    <button onclick="toggleDrawer()" class="btn-main" style="width:100%; background:none; border:1px solid #333; color:gray; padding:12px; border-radius:10px; margin-top:30px;">إغلاق اللوحة</button>
</div>

<div id="view-gate" class="screen active" style="justify-content:center; align-items:center;">
    <div class="animate__animated animate__zoomIn" style="width:85%; max-width:400px; background:var(--glass); padding:40px; border-radius:35px; border:2px solid var(--gold); text-align:center; backdrop-filter: blur(10px);">
        <h1 style="background:var(--royal); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 35px; margin-bottom: 30px;">TALLAH STAR</h1>
        
        <div id="login-form">
            <input type="password" id="l-code" placeholder="ادخل كودك الماسي" style="width:100%; padding:15px; border-radius:15px; border:none; background:#2a3942; color:white; text-align:center; margin-bottom:15px;">
            <button onclick="login()" style="width:100%; padding:15px; background:var(--gold); border:none; border-radius:15px; font-weight:bold; cursor:pointer;">دخول المملكة</button>
            <p style="margin-top:20px; font-size:12px; color:gray;">ليس لديك كود؟ <span onclick="swapForm()" style="color:var(--gold); cursor:pointer;">أنشئ حساباً</span></p>
        </div>

        <div id="reg-form" style="display:none;">
            <input type="text" id="r-name" placeholder="اسمك الملكي" style="width:100%; padding:15px; border-radius:15px; border:none; background:#2a3942; color:white; text-align:center; margin-bottom:15px;">
            <input type="password" id="r-code" placeholder="اختر كود دخول" style="width:100%; padding:15px; border-radius:15px; border:none; background:#2a3942; color:white; text-align:center; margin-bottom:15px;">
            <button onclick="register()" style="width:100%; padding:15px; background:var(--green); border:none; border-radius:15px; font-weight:bold; cursor:pointer;">إرسال طلب</button>
            <p style="margin-top:20px; font-size:12px; color:gray;">عندك حساب؟ <span onclick="swapForm()" style="color:var(--gold); cursor:pointer;">سجل دخول</span></p>
        </div>
    </div>
</div>

<div id="view-main" class="screen">
    <header>
        <i class="fas fa-chess-king btn-gold" id="admin-icon" style="display:none;" onclick="toggleDrawer()"></i>
        <b style="color:var(--gold); font-size:20px;">إمبراطورية طلة</b>
        <i class="fas fa-sign-out-alt" style="color:#ff4d4d; font-size:20px;" onclick="logout()"></i>
    </header>
    <div id="chat-list" style="flex:1; overflow-y:auto; padding:20px;"></div>
</div>

<div id="view-chat" class="screen">
    <header>
        <div style="display:flex; align-items:center; gap:12px;">
            <i class="fas fa-arrow-right" onclick="showView('view-main')"></i>
            <b id="active-user-name"></b>
        </div>
        <div id="typing-notif" style="font-size:10px; color:var(--green); display:none;">يكتب الآن...</div>
    </header>
    <div id="chat-box" class="chat-container" style="display:flex; flex-direction:column;"></div>
    <div class="input-area">
        <i class="fas fa-magic btn-gold" title="حبشتكانات"></i>
        <input type="text" id="msg-input" class="input-field" placeholder="تحدث يا بطل..." oninput="isTyping()">
        <i class="fas fa-paper-plane btn-gold" onclick="sendMsg()" style="color:var(--green)"></i>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://talah-c12c5-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let me = JSON.parse(localStorage.getItem('tallah_v27_final'));
    let activeChat, targetId, typeTimer;

    if(me) { showView('view-main'); initSystem(); }

    function showView(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function swapForm() {
        const l = document.getElementById('login-form'), r = document.getElementById('reg-form');
        l.style.display = l.style.display === 'none' ? 'block' : 'none';
        r.style.display = r.style.display === 'none' ? 'block' : 'none';
    }

    // --- نظام الهوية الجديدة ---
    function register() {
        const name = document.getElementById('r-name').value, code = document.getElementById('r-code').value;
        if(!name || !code) return;
        db.ref('users').push({ name, code, active: false, banned: false, role: 'user', time: Date.now() });
        Swal.fire('تم الإرسال', 'طلبك وصل للإمبراطور.. انتظر التفعيل', 'success');
        swapForm();
    }

    function login() {
        const code = document.getElementById('l-code').value;
        if(code === "248") { 
            me = { uid:'admin', name:'الإمبراطور', role:'admin', active:true };
            finishLogin(); return;
        }
        db.ref('users').once('value', s => {
            let found = false;
            s.forEach(u => {
                if(u.val().code === code) {
                    if(!u.val().active) return Swal.fire('انتظر','حسابك لم يتفعل بعد','warning');
                    if(u.val().banned) return Swal.fire('طرد','أنت محظور من الدخول','error');
                    me = {...u.val(), uid: u.key};
                    finishLogin(); found = true;
                }
            });
            if(!found) Swal.fire('خطأ','الكود غير صحيح','error');
        });
    }

    function finishLogin() {
        localStorage.setItem('tallah_v27_final', JSON.stringify(me));
        location.reload();
    }

    // --- محرك الإمبراطورية ---
    function initSystem() {
        if(me.role === 'admin') {
            document.getElementById('admin-icon').style.display = 'block';
            loadAdminPanel();
        }
        db.ref('status/'+me.uid).set(true);
        db.ref('status/'+me.uid).onDisconnect().set(false);
        loadChatList();
        initMatrix();
    }

    function loadAdminPanel() {
        db.ref('users').on('value', s => {
            const pBox = document.getElementById('pending-list'), aBox = document.getElementById('active-list');
            pBox.innerHTML = ""; aBox.innerHTML = "";
            s.forEach(u => {
                if(u.key === 'admin') return;
                const d = u.val();
                const card = `<div class="card animate__animated animate__fadeIn">
                    <b>${d.name}</b> <small>(${d.code})</small><br>
                    <div style="margin-top:10px; display:flex; gap:10px;">
                        ${!d.active ? `<button onclick="activate('${u.key}')" style="background:var(--green); border:none; padding:5px 10px; border-radius:5px; color:white;">تفعيل</button>` : ''}
                        <button onclick="toggleBan('${u.key}',${d.banned})" style="background:#ff4d4d; border:none; padding:5px 10px; border-radius:5px; color:white;">${d.banned?'فك حظر':'طرد'}</button>
                    </div>
                </div>`;
                d.active ? aBox.innerHTML += card : pBox.innerHTML += card;
            });
        });
    }

    function activate(id) { db.ref('users/'+id).update({ active: true }); }
    function toggleBan(id, s) { db.ref('users/'+id).update({ banned: !s }); }

    function loadChatList() {
        db.ref('users').on('value', s => {
            const list = document.getElementById('chat-list'); list.innerHTML = "";
            s.forEach(u => {
                if(u.key === me.uid || !u.val().active || u.val().banned) return;
                list.innerHTML += `<div class="card" onclick="openChat('${u.key}','${u.val().name}')" style="display:flex; justify-content:space-between; align-items:center;">
                    <b>${u.val().name}</b>
                    <span id="st-${u.key}" style="font-size:12px; color:gray;">●</span>
                </div>`;
                db.ref('status/'+u.key).on('value', st => {
                    const el = document.getElementById('st-'+u.key);
                    if(el) el.style.color = st.val() ? 'var(--green)' : 'gray';
                });
            });
        });
    }

    function openChat(uid, name) {
        targetId = uid;
        activeChat = [me.uid, uid].sort().join("_");
        document.getElementById('active-user-name').innerText = name;
        showView('view-chat');
        db.ref('messages/'+activeChat).on('value', s => {
            const box = document.getElementById('chat-box'); box.innerHTML = "";
            s.forEach(m => {
                const d = m.val();
                const isAdmin = d.role === 'admin' ? 'admin-msg' : '';
                box.innerHTML += `<div class="bubble ${d.sender===me.uid?'me':'other'} ${isAdmin}">
                    ${d.role==='admin'?'<span class="crown-tag"><i class="fas fa-crown crown-icon"></i> إمبراطور طلة</span>':''}
                    ${d.text}
                </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMsg() {
        const inp = document.getElementById('msg-input');
        if(!inp.value) return;
        db.ref('messages/'+activeChat).push({ sender: me.uid, text: inp.value, role: me.role, time: Date.now() });
        inp.value = "";
    }

    function isTyping() {
        document.getElementById('snd-click').play();
        db.ref(`typing/${activeChat}/${me.uid}`).set(true);
        clearTimeout(typeTimer);
        typeTimer = setTimeout(() => db.ref(`typing/${activeChat}/${me.uid}`).set(false), 2000);
    }

    // --- حبشتكانة: تأثير الماتريكس ---
    function initMatrix() {
        const c = document.getElementById("matrix-bg"), ctx = c.getContext("2d");
        c.height = window.innerHeight; c.width = window.innerWidth;
        const chars = "TALLAH01", fontSize = 10, columns = c.width/fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        setInterval(() => {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, c.width, c.height);
            ctx.fillStyle = "#d4af37"; ctx.font = fontSize + "px arial";
            drops.forEach((y, i) => {
                const text = chars[Math.floor(Math.random()*chars.length)];
                ctx.fillText(text, i*fontSize, y*fontSize);
                if(y*fontSize > c.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }, 33);
    }

    function toggleDrawer() { document.getElementById('admin-drawer').classList.toggle('drawer-open'); }
    function logout() { localStorage.clear(); location.reload(); }

    // اختصارات الكيبورد
    window.onkeydown = (e) => {
        if(e.key === 'Enter' && document.activeElement.id === 'msg-input') sendMsg();
        if(e.key === 'Escape') { showView('view-main'); document.getElementById('admin-drawer').classList.remove('drawer-open'); }
    };
</script>
</body>
</html>
