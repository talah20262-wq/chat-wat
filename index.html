<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tallah Star | Black Diamond v20</title>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --bg: #0b141a; --hdr: #202c33; --green: #00a884;
            --text: #e9edef; --gold: #d4af37; --glass: rgba(32, 44, 51, 0.95);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* الشاشات الرئيسية - مخفية افتراضياً */
        .page-view { position: fixed; inset: 0; display: none; flex-direction: column; z-index: 10; }
        .active-view { display: flex !important; }

        /* ستايل المداخل */
        .overlay { background: radial-gradient(circle, #1c282f, #050505); align-items: center; justify-content: center; z-index: 1000; }
        .card { background: var(--glass); padding: 40px; border-radius: 30px; width: 90%; max-width: 400px; border: 1px solid rgba(212,175,55,0.3); text-align: center; }

        /* الهيدر والقائمة */
        header { background: var(--hdr); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); }
        .pfp { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
        
        .user-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .user-item:hover { background: rgba(212,175,55,0.05); }

        /* واجهة الشات */
        #chat-window { z-index: 2000; background: var(--bg); }
        .chat-content { flex: 1; overflow-y: auto; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-color: #000; background-blend-mode: overlay; padding: 20px; display: flex; flex-direction: column; }
        
        .bubble { max-width: 80%; padding: 10px 15px; border-radius: 15px; margin-bottom: 10px; font-size: 15px; }
        .me { background: #005c4b; align-self: flex-end; }
        .other { background: #202c33; align-self: flex-start; border: 1px solid rgba(212,175,55,0.2); }

        .footer { background: var(--hdr); padding: 10px; display: flex; align-items: center; gap: 10px; }
        input { flex: 1; background: #2a3942; border: none; padding: 12px; border-radius: 20px; color: white; outline: none; }

        .btn-gold { background: var(--gold); color: black; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        .admin-panel { position: fixed; inset: 0; background: black; z-index: 5000; display: none; padding: 20px; overflow-y: auto; }
        .req-badge { background: red; color: white; padding: 2px 8px; border-radius: 10px; font-size: 12px; margin-right: 5px; }
    </style>
</head>
<body>

<div id="gate-view" class="page-view overlay">
    <div class="card animate__animated animate__zoomIn">
        <h1 style="color:var(--gold)">TALLAH STAR</h1>
        <p style="color:gray; font-size:12px; margin-bottom:20px;">النسخة الماسية v20</p>
        <input type="password" id="pass" placeholder="كود الدخول الماسي" style="text-align:center; margin-bottom:10px; width:100%;">
        <button class="btn-gold" onclick="login()">دخول</button>
        <div style="margin:20px 0; opacity:0.3">أو</div>
        <input type="text" id="join-name" placeholder="اسمك لطلب الانضمام" style="width:100%; text-align:center; margin-bottom:10px;">
        <button onclick="sendReq()" style="background:none; border:1px solid var(--gold); color:var(--gold); width:100%; padding:10px; border-radius:10px; cursor:pointer;">إرسال طلب انضمام</button>
    </div>
</div>

<div id="wait-view" class="page-view overlay">
    <div class="card">
        <i class="fas fa-clock" style="color:var(--gold); font-size:50px;"></i>
        <h2 style="margin-top:20px;">طلبك قيد المراجعة</h2>
        <p style="color:gray; margin-top:10px;">الإمبراطور هيوافق عليك وهتفتح فوراً.</p>
    </div>
</div>

<div id="app-view" class="page-view">
    <header>
        <div style="display:flex; align-items:center; gap:10px;">
            <img id="my-pfp" class="pfp" onclick="document.getElementById('pfp-up').click()">
            <input type="file" id="pfp-up" hidden onchange="uploadPfp(this)">
            <b style="color:var(--gold)">Tallah Star</b>
        </div>
        <div>
            <span id="badge" class="req-badge" style="display:none;">!</span>
            <i class="fas fa-crown" id="adm-icon" onclick="openAdm()" style="color:var(--gold); font-size:22px; cursor:pointer; margin-right:15px; display:none;"></i>
            <i class="fas fa-power-off" onclick="logout()" style="color:red; cursor:pointer;"></i>
        </div>
    </header>
    <div id="users-list" style="overflow-y:auto; flex:1;"></div>
</div>

<div id="chat-window" class="page-view">
    <header style="background:var(--hdr)">
        <i class="fas fa-arrow-right" onclick="closeChat()" style="cursor:pointer;"></i>
        <b id="chat-title"></b>
        <img id="chat-pfp" class="pfp" style="width:35px; height:35px;">
    </header>
    <div id="msg-box" class="chat-content"></div>
    <div class="footer">
        <input type="text" id="msg-in" placeholder="اكتب رسالتك...">
        <i class="fas fa-paper-plane" onclick="sendMsg()" style="color:var(--green); font-size:25px; cursor:pointer;"></i>
    </div>
</div>

<div id="admin-view" class="admin-panel">
    <button onclick="closeAdm()" style="float:left; color:white; background:none; border:none;">إغلاق X</button>
    <h2 style="color:var(--gold)">لوحة الإمبراطور</h2>
    <div id="req-list" style="margin-top:20px; background:#111; padding:15px; border-radius:10px;">
        <h4>طلبات الانضمام:</h4>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://talah-c12c5-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let me = JSON.parse(localStorage.getItem('tallah_user'));
    let myReqId = localStorage.getItem('tallah_req');
    let activeKey, target;

    // فحص الحالة عند الفتح
    if(me) { showPage('app-view'); start(); }
    else if(myReqId) { showPage('wait-view'); checkReq(); }
    else { showPage('gate-view'); }

    function showPage(id) {
        document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active-view'));
        document.getElementById(id).classList.add('active-view');
    }

    function start() {
        document.getElementById('my-pfp').src = me.pfp || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
        if(me.role === 'admin') {
            document.getElementById('adm-icon').style.display = 'inline';
            listenReqs();
        }
        loadUsers();
    }

    function login() {
        const p = document.getElementById('pass').value;
        if(p === "248") {
            me = { uid:'admin', name:'الإمبراطور', role:'admin', pfp:'' };
            localStorage.setItem('tallah_user', JSON.stringify(me));
            location.reload();
        } else {
            db.ref('users').once('value', s => {
                s.forEach(u => { if(u.val().code === p) {
                    me = {...u.val(), uid: u.key};
                    localStorage.setItem('tallah_user', JSON.stringify(me));
                    location.reload();
                }});
            });
        }
    }

    function sendReq() {
        const n = document.getElementById('join-name').value;
        if(!n) return;
        const ref = db.ref('join_requests').push({ name: n, status: 'pending' });
        localStorage.setItem('tallah_req', ref.key);
        location.reload();
    }

    function checkReq() {
        db.ref('join_requests/'+myReqId).on('value', s => {
            if(s.val()?.status === 'approved') {
                localStorage.setItem('tallah_user', JSON.stringify(s.val().userData));
                localStorage.removeItem('tallah_req');
                location.reload();
            }
        });
    }

    function loadUsers() {
        db.ref('users').on('value', s => {
            const list = document.getElementById('users-list'); list.innerHTML = "";
            s.forEach(u => {
                if(u.key === me.uid) return;
                list.innerHTML += `<div class="user-item" onclick="openChat('${u.key}', '${u.val().name}', '${u.val().pfp}')">
                    <img src="${u.val().pfp || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="pfp" style="margin-left:10px;">
                    <b>${u.val().name}</b>
                </div>`;
            });
        });
    }

    function openChat(uid, name, pfp) {
        target = uid;
        activeKey = [me.uid, uid].sort().join("_");
        document.getElementById('chat-title').innerText = name;
        document.getElementById('chat-pfp').src = pfp || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
        showPage('chat-window');
        
        db.ref('messages/'+activeKey).on('value', s => {
            const box = document.getElementById('msg-box'); box.innerHTML = "";
            s.forEach(m => {
                box.innerHTML += `<div class="bubble ${m.val().sender === me.uid ? 'me':'other'}">${m.val().text}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMsg() {
        const t = document.getElementById('msg-in').value; if(!t) return;
        db.ref('messages/'+activeKey).push({ sender: me.uid, text: t });
        document.getElementById('msg-in').value = "";
    }

    function listenReqs() {
        db.ref('join_requests').on('value', s => {
            const list = document.getElementById('req-list'); list.innerHTML = "<h4>طلبات الانضمام:</h4>";
            let count = 0;
            s.forEach(r => { if(r.val().status === 'pending') {
                count++;
                list.innerHTML += `<div style="display:flex; justify-content:space-between; margin-top:10px;">
                    <span>${r.val().name}</span>
                    <button onclick="approve('${r.key}', '${r.val().name}')" style="color:lime;">قبول</button>
                </div>`;
            }});
            document.getElementById('badge').style.display = count > 0 ? 'inline' : 'none';
        });
    }

    async function approve(k, n) {
        const { value: code } = await Swal.fire({ title: 'كود العضو', input: 'text' });
        if(code) {
            const uData = { name: n, code: code, role: 'user', pfp: '' };
            const uRef = db.ref('users').push(uData);
            db.ref('join_requests/'+k).update({ status: 'approved', userData: {...uData, uid: uRef.key} });
        }
    }

    function uploadPfp(i) {
        const r = new FileReader();
        r.onload = e => {
            me.pfp = e.target.result;
            db.ref('users/'+me.uid).update({ pfp: me.pfp });
            localStorage.setItem('tallah_user', JSON.stringify(me));
            location.reload();
        };
        r.readAsDataURL(i.files[0]);
    }

    function closeChat() { showPage('app-view'); }
    function openAdm() { document.getElementById('admin-view').style.display = 'block'; }
    function closeAdm() { document.getElementById('admin-view').style.display = 'none'; }
    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
