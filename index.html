<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TALLAH STAR | THE SUPREME EMPIRE v33</title>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap');

        :root {
            --gold: #d4af37; --royal: linear-gradient(135deg, #d4af37, #f9f295, #ab8e28);
            --black: #020202; --dark: #0a0f14; --green: #00ff88; --red: #ff3e3e;
            --glass: rgba(10, 15, 20, 0.95);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--black); color: white; height: 100vh; overflow: hidden; perspective: 1000px; }

        /* رادار الخلفية الهكر */
        #bg-canvas { position: fixed; inset: 0; z-index: -1; }
        .fire-bg { position: fixed; inset: 0; background: radial-gradient(circle, rgba(212,175,55,0.05) 0%, transparent 70%); pointer-events: none; }

        /* شاشات الإمبراطورية */
        .screen { position: fixed; inset: 0; display: none; flex-direction: column; z-index: 10; transition: 0.5s ease; }
        .active { display: flex !important; animation: fadeInCustom 0.8s; }

        /* سنترة البوابة المصلحة (تصحيح الطلب) */
        #gate { justify-content: center; align-items: center; background: radial-gradient(circle at center, #1a252f 0%, #050505 100%); }
        .gate-card {
            width: 85%; max-width: 450px; background: var(--glass); padding: 50px; 
            border-radius: 40px; border: 3px solid var(--gold); text-align: center;
            box-shadow: 0 0 60px rgba(212,175,55,0.3); backdrop-filter: blur(20px);
        }

        /* هيدر العظمة */
        header { 
            background: var(--glass); padding: 20px; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--gold); box-shadow: 0 0 30px rgba(212,175,55,0.3);
        }

        /* نافذة اللايف الإمبراطوري المصلحة */
        #live-hub {
            position: fixed; top: 90px; left: 50%; transform: translateX(-50%);
            width: 320px; height: 200px; background: #000; border: 3px solid var(--gold);
            border-radius: 20px; z-index: 999; display: none; overflow: hidden;
            box-shadow: 0 0 40px var(--gold);
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* إشعار الملك لايف */
        #live-notif {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--royal); color: black; padding: 10px 30px; border-radius: 50px;
            font-weight: 900; z-index: 2000; display: none; box-shadow: 0 5px 20px var(--gold);
        }

        /* لوحة العرش */
        #throne-drawer { 
            position: fixed; left: -100%; top: 0; width: 85%; max-width: 420px; height: 100%; 
            background: rgba(5, 5, 5, 0.98); z-index: 10000; padding: 30px; border-right: 3px solid var(--gold); 
            overflow-y: auto; transition: 0.6s cubic-bezier(0.7, 0, 0.3, 1);
        }
        .throne-open { left: 0 !important; }

        /* أزرار مشعللة */
        .btn-fire { 
            background: var(--royal); color: black; border: none; padding: 15px; border-radius: 15px; 
            font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px;
            transition: 0.3s; box-shadow: 0 5px 15px rgba(212,175,55,0.4);
        }
        .btn-fire:active { transform: scale(0.9); }
        .input-fire { background: rgba(255,255,255,0.05); border: 1px solid var(--gold); padding: 15px; border-radius: 15px; color: white; width: 100%; outline: none; text-align: center; font-size: 18px; margin-bottom: 20px; }

        /* فقاعات الشات */
        .chat-container { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; }
        .bubble { max-width: 80%; padding: 15px; border-radius: 20px; margin-bottom: 15px; position: relative; }
        .bubble.me { background: #004d40; align-self: flex-end; border-bottom-right-radius: 2px; border-right: 4px solid var(--green); }
        .bubble.other { background: #1c282f; align-self: flex-start; border-bottom-left-radius: 2px; border-left: 4px solid var(--gold); }
        .admin-tag { color: var(--gold); font-size: 11px; font-weight: 900; display: block; margin-bottom: 5px; }

        @keyframes fadeInCustom { from { opacity: 0; transform: scale(1.1); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="fire-bg"></div>

<div id="live-notif" class="animate__animated animate__pulse animate__infinite"><i class="fas fa-video"></i> الملك في بث مباشر الآن!</div>

<div id="live-hub">
    <div style="position:absolute; top:10px; left:10px; background:red; padding:3px 8px; border-radius:5px; font-size:10px; font-weight:bold; z-index:2;">LIVE</div>
    <video id="live-v" autoplay playsinline controls></video>
</div>

<div id="throne-drawer">
    <h1 style="color:var(--gold); margin-bottom:30px;"><i class="fas fa-crown"></i> عرش طلة</h1>
    
    <div style="background:rgba(212,175,55,0.05); padding:20px; border-radius:20px; border:1px solid var(--gold);">
        <h4>بث الإمبراطورية</h4>
        <button onclick="startLive('cam')" class="btn-fire" style="width:100%;">فتح كاميرا لايف 🔥</button>
        <button onclick="startLive('screen')" class="btn-fire" style="width:100%; background:#00ff88;">بث شاشة (Screen Rec) 📱</button>
        <button onclick="stopLive()" id="stop-btn" class="btn-fire" style="width:100%; background:red; color:white; display:none;">إنهاء البث</button>
    </div>

    <div style="margin-top:25px;">
        <h4>القوة العظمى</h4>
        <button onclick="boom()" class="btn-fire" style="background:linear-gradient(to right, #ff416c, #ff4b2b); width:100%;">تفجير احتفالات للكل 🎉</button>
    </div>

    <div id="admin-tools" style="margin-top:30px;">
        <h4 style="color:var(--green);">طلبات الانضمام</h4>
        <div id="entry-requests"></div>
        <h4 style="color:var(--gold); margin-top:20px;">الرعية المتصلة</h4>
        <div id="kingdom-citizens"></div>
    </div>

    <button onclick="toggleThrone()" style="margin-top:40px; background:none; border:none; color:gray; width:100%;">إغلاق العرش</button>
</div>

<div id="gate" class="screen active">
    <div class="gate-card animate__animated animate__zoomIn">
        <h1 style="background:var(--royal); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 55px; font-weight: 900;">TALLAH</h1>
        <p style="color:gray; letter-spacing:4px; margin-bottom:40px;">THE SOVEREIGN EMPIRE</p>
        
        <div id="gate-main">
            <input type="password" id="key-input" class="input-fire" placeholder="مفتاح العبور">
            <button onclick="enterKingdom()" class="btn-fire" style="width:100%;">عبور البوابة</button>
            <p onclick="toggleGate(true)" style="margin-top:30px; color:var(--gold); cursor:pointer;">طلب كود جديد</p>
        </div>

        <div id="gate-reg" style="display:none;">
            <input type="text" id="reg-n" class="input-fire" placeholder="اسمك الملكي">
            <input type="password" id="reg-k" class="input-fire" placeholder="اختر كودك">
            <button onclick="register()" class="btn-fire" style="width:100%;">إرسال الطلب</button>
            <p onclick="toggleGate(false)" style="margin-top:30px; color:gray; cursor:pointer;">العودة للدخول</p>
        </div>
    </div>
</div>

<div id="empire" class="screen">
    <header>
        <i class="fas fa-dragon" style="color:var(--gold); font-size:30px;" onclick="toggleThrone()"></i>
        <div style="text-align:center;">
            <b style="color:var(--gold); font-size:22px;">إمبراطورية طلة</b>
            <small id="u-count" style="color:var(--green); display:block; font-size:10px;">متصل: 0</small>
        </div>
        <i class="fas fa-sign-out-alt" style="color:red; font-size:25px;" onclick="logout()"></i>
    </header>
    <div id="citizen-list" style="flex:1; overflow-y:auto; padding:20px;"></div>
</div>

<div id="chat-view" class="screen">
    <header>
        <div style="display:flex; align-items:center; gap:15px;">
            <i class="fas fa-chevron-right" onclick="showView('empire')"></i>
            <b id="target-n"></b>
        </div>
        <i class="fas fa-shield-alt" style="color:var(--gold);"></i>
    </header>
    <div id="chat-box" class="chat-container"></div>
    <div style="background:var(--dark); padding:20px; display:flex; gap:10px;">
        <input type="text" id="m-input" class="input-fire" style="margin:0" placeholder="اكتب رسالتك...">
        <button onclick="send()" style="background:none; border:none; color:var(--gold); font-size:30px;"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
    const config = { databaseURL: "https://talah-c12c5-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(config);
    const db = firebase.database();

    let me = JSON.parse(localStorage.getItem('tallah_v33'));
    let stream, currentKey, targetId;

    if(me) { showView('empire'); initKingdom(); }

    function showView(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function toggleGate(isReg) {
        document.getElementById('gate-main').style.display = isReg ? 'none' : 'block';
        document.getElementById('gate-reg').style.display = isReg ? 'block' : 'none';
    }

    // --- نظام الدخول ---
    function enterKingdom() {
        const k = document.getElementById('key-input').value;
        if(k === "248") { me = {uid:'admin', name:'الإمبراطور', role:'admin', active:true}; save(); return; }
        db.ref('users').once('value', s => {
            let f = false;
            s.forEach(u => {
                if(u.val().code === k && u.val().active && !u.val().banned) {
                    me = {...u.val(), uid: u.key}; save(); f = true;
                }
            });
            if(!f) Swal.fire('خطأ','المفتاح مرفوض','error');
        });
    }

    function register() {
        const n = document.getElementById('reg-n').value, k = document.getElementById('reg-k').value;
        db.ref('users').push({ name:n, code:k, active:false, role:'user' });
        Swal.fire('تم الإرسال','انتظر تفعيل الإمبراطور','success'); toggleGate(false);
    }

    function save() { localStorage.setItem('tallah_v33', JSON.stringify(me)); location.reload(); }

    // --- المحرك الرئيسي ---
    function initKingdom() {
        db.ref('status/'+me.uid).set(true);
        db.ref('status/'+me.uid).onDisconnect().set(false);
        loadCitizens();
        
        // استماع اللايف (إصلاح الشاشة السوداء والاشعارات)
        db.ref('live_signal').on('value', s => {
            const d = s.val();
            const notif = document.getElementById('live-notif');
            const hub = document.getElementById('live-hub');
            if(d && d.active) {
                notif.style.display = 'block'; hub.style.display = 'block';
                // تذكير: الربط الحقيقي للفيديو يتطلب عنوان بث أو WebRTC
            } else {
                notif.style.display = 'none'; hub.style.display = 'none';
            }
        });

        db.ref('boom').on('value', s => { if(s.val() && s.val().t > Date.now()-5000) { confetti({particleCount:150, spread:70, origin:{y:0.6}, colors:['#d4af37','#fff']}); }});
        if(me.role === 'admin') loadAdmin();
        initVisuals();
    }

    // --- ميزة البث وتسجيل الشاشة (تعديلك المطلوب) ---
    async function startLive(type) {
        try {
            if(type === 'cam') stream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
            else stream = await navigator.mediaDevices.getDisplayMedia({video:true});
            
            document.getElementById('live-v').srcObject = stream;
            db.ref('live_signal').set({ active: true, type: type, owner: me.name });
            document.getElementById('stop-btn').style.display = 'block';
        } catch(e) { Swal.fire('خطأ','فشل الوصول للمصدر','error'); }
    }

    function stopLive() {
        if(stream) stream.getTracks().forEach(t => t.stop());
        db.ref('live_signal').set({ active: false });
        document.getElementById('stop-btn').style.display = 'none';
    }

    function loadCitizens() {
        db.ref('users').on('value', s => {
            const list = document.getElementById('citizen-list'); list.innerHTML = "";
            let online = 0;
            s.forEach(u => {
                if(u.key === me.uid || !u.val().active) return;
                list.innerHTML += `<div onclick="openChat('${u.key}','${u.val().name}')" style="background:rgba(255,255,255,0.03); padding:20px; border-radius:20px; margin-bottom:15px; border-right:5px solid var(--gold); display:flex; justify-content:space-between;">
                    <b>${u.val().name}</b> <span id="st-${u.key}">●</span>
                </div>`;
                db.ref('status/'+u.key).on('value', st => {
                    const el = document.getElementById('st-'+u.key);
                    if(el) { el.style.color = st.val()?'var(--green)':'gray'; if(st.val()) online++; }
                    document.getElementById('u-count').innerText = "متصل الآن: " + online;
                });
            });
        });
    }

    function openChat(id, name) {
        targetId = id; currentKey = [me.uid, id].sort().join("_");
        document.getElementById('target-n').innerText = name;
        showView('chat-view');
        db.ref('messages/'+currentKey).on('value', s => {
            const box = document.getElementById('chat-box'); box.innerHTML = "";
            s.forEach(m => {
                const d = m.val();
                box.innerHTML += `<div class="bubble ${d.s===me.uid?'me':'other'}">${d.role==='admin'?'<span class="admin-tag">الإمبراطور</span>':''}${d.t}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function send() {
        const i = document.getElementById('m-input');
        if(!i.value) return;
        db.ref('messages/'+currentKey).push({ s: me.uid, t: i.value, role: me.role, time: Date.now() });
        i.value = "";
    }

    function boom() { db.ref('boom').set({ t: Date.now() }); }

    function loadAdmin() {
        db.ref('users').on('value', s => {
            const reqs = document.getElementById('entry-requests'), citizens = document.getElementById('kingdom-citizens');
            reqs.innerHTML = ""; citizens.innerHTML = "";
            s.forEach(u => {
                if(u.key === 'admin') return;
                const d = u.val();
                const card = `<div style="background:#111; padding:10px; border-radius:10px; margin-top:10px; border:1px solid #333;">
                    <b>${d.name}</b> (${d.code})<br>
                    <button onclick="db.ref('users/${u.key}').update({active:true})" style="color:var(--green); background:none; border:none; margin-top:5px;">تفعيل</button> | 
                    <button onclick="db.ref('users/${u.key}').update({banned:!${d.banned}})" style="color:red; background:none; border:none;">طرد</button>
                </div>`;
                d.active ? citizens.innerHTML += card : reqs.innerHTML += card;
            });
        });
    }

    function initVisuals() {
        const c = document.getElementById("bg-canvas"), ctx = c.getContext("2d");
        c.width = window.innerWidth; c.height = window.innerHeight;
        const pts = [];
        for(let i=0; i<40; i++) pts.push({x:Math.random()*c.width, y:Math.random()*c.height, r:Math.random()*2, s:Math.random()*0.5});
        function draw() {
            ctx.clearRect(0,0,c.width,c.height); ctx.fillStyle = "rgba(212,175,55,0.2)";
            pts.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill(); p.y-=p.s; if(p.y<0) p.y=c.height; });
            requestAnimationFrame(draw);
        } draw();
    }

    function toggleThrone() { document.getElementById('throne-drawer').classList.toggle('throne-open'); }
    function logout() { localStorage.clear(); location.reload(); }
    window.onkeydown = (e) => { if(e.key === 'Enter') send(); };
</script>
</body>
</html>
