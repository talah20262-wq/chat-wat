<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Najm WhatsApp Ultra</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/locale/ar.min.js"></script>

    <style>
        :root { --wa-bg: #0b141a; --wa-header: #202c33; --wa-green: #00a884; --wa-text: #e9edef; --wa-muted: #8696a0; --wa-msg-me: #005c4b; --wa-msg-other: #202c33; --blue-check: #34b7f1; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: var(--wa-bg); color: var(--wa-text); height: 100vh; overflow: hidden; }

        /* القائمة المتقدمة */
        .menu-drop { position: absolute; top: 50px; left: 10px; background: #233138; border-radius: 8px; display: none; flex-direction: column; z-index: 5000; width: 220px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); overflow: hidden; }
        .menu-item { padding: 12px 18px; cursor: pointer; border-bottom: 1px solid #2a3942; transition: 0.2s; font-size: 14px; display: flex; align-items: center; gap: 10px; }
        .menu-item:hover { background: #182229; }

        /* علامات الصح والوقت */
        .status-icons { font-size: 12px; margin-right: 5px; }
        .tick-single { color: var(--wa-muted); }
        .tick-double { color: var(--wa-muted); }
        .tick-read { color: var(--blue-check) !important; }

        /* يكتب الآن */
        .typing-indicator { color: var(--wa-green); font-style: italic; font-size: 13px; font-weight: bold; }

        /* شاشة القفل */
        #lock-screen { position: fixed; inset: 0; background: #0b141a; z-index: 20000; display: none; align-items: center; justify-content: center; flex-direction: column; }
        
        /* واجهة الدردشة */
        #chat-window { position: fixed; inset: 0; background: var(--wa-bg); z-index: 3000; display: none; flex-direction: column; }
        .chat-header { background: var(--wa-header); padding: 10px; display: flex; align-items: center; cursor: pointer; }
        .chat-body { flex: 1; overflow-y: auto; padding: 15px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-color: rgba(11,20,26,0.94); background-blend-mode: darken; }
        
        .msg-bubble { max-width: 75%; padding: 8px 12px; border-radius: 12px; margin-bottom: 5px; position: relative; font-size: 15px; line-height: 1.4; }
        .sent { align-self: flex-end; background: var(--wa-msg-me); border-top-right-radius: 0; margin-left: auto; }
        .received { align-self: flex-start; background: var(--wa-msg-other); border-top-left-radius: 0; }
        .msg-info { display: flex; align-items: center; justify-content: flex-end; gap: 4px; font-size: 10px; opacity: 0.7; margin-top: 4px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="lock-screen">
    <i class="fas fa-lock" style="font-size: 50px; color: var(--wa-green); margin-bottom: 20px;"></i>
    <input type="password" id="lock-pass" placeholder="أدخل كود فك القفل" style="padding:10px; border-radius:5px; border:none; text-align:center">
    <button onclick="unlockApp()" style="margin-top:10px; padding:10px 20px; background:var(--wa-green); border:none; border-radius:5px; cursor:pointer">فتح التطبيق</button>
</div>

<div id="app-container" style="display: flex; flex-direction: column; height: 100vh;">
    <header style="background: var(--wa-header); padding: 15px; display: flex; justify-content: space-between; align-items: center;">
        <b style="font-size: 20px; color: #8696a0;">Najm WhatsApp</b>
        <div style="display:flex; gap:20px; color:#8696a0; font-size:18px; position:relative">
            <i class="fas fa-search"></i>
            <i class="fas fa-ellipsis-v" onclick="toggleMainBtn()"></i>
            <div id="main-menu" class="menu-drop">
                <div class="menu-item" onclick="Swal.fire('مجموعة جديدة','تم تفعيل الطلب','success')"><i class="fas fa-users"></i> مجموعة جديدة</div>
                <div class="menu-item" onclick="Swal.fire('الرسائل المميزة','لا توجد رسائل حالياً','info')"><i class="fas fa-star"></i> الرسائل المميزة</div>
                <div class="menu-item" onclick="markAllAsRead()"><i class="fas fa-check-double"></i> تمييز الكل كمقروء</div>
                <div class="menu-item" onclick="lockApp()"><i class="fas fa-user-shield"></i> قفل التطبيق</div>
                <div class="menu-item" onclick="toggleAdmin(true)" id="king-menu"><i class="fas fa-crown"></i> لوحة المالك</div>
                <div class="menu-item" style="color:red" onclick="logout()"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</div>
            </div>
        </div>
    </header>

    <div id="user-list" style="flex:1; overflow-y:auto"></div>
</div>

<div id="chat-window">
    <div class="chat-header">
        <i class="fas fa-arrow-right" onclick="closeChat()" style="margin: 0 10px;"></i>
        <img id="chat-pfp" src="" style="width:40px; height:40px; border-radius:50%; margin-left:10px">
        <div style="flex:1">
            <b id="chat-name"></b><br>
            <small id="chat-status-text" style="color: var(--wa-green);">متصل الآن</small>
        </div>
    </div>
    <div id="chat-messages" class="chat-body" style="display:flex; flex-direction:column"></div>
    <div class="input-area" style="background:#202c33; padding:10px; display:flex; align-items:center; gap:10px">
        <input type="text" id="msg-input" placeholder="رسالة" style="flex:1; padding:10px; border-radius:20px; border:none; background:#2a3942; color:white; outline:none">
        <button onclick="sendMsg()" style="background:var(--wa-green); border:none; width:45px; height:45px; border-radius:50%; cursor:pointer"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
// ================= CONFIG =================
const firebaseConfig = { databaseURL: "https://talah-c12c5-default-rtdb.asia-southeast1.firebasedatabase.app/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
moment.locale('ar-sa');

let me = JSON.parse(localStorage.getItem('najm_pro_session'));
let activeID = null;

// ================= AUTH & LOCK =================
if(!me) location.href = 'login.html'; // أو شاشة الدخول بتاعتك

function lockApp() { 
    localStorage.setItem('app_locked', 'true');
    document.getElementById('lock-screen').style.display = 'flex';
}

function unlockApp() {
    if(document.getElementById('lock-pass').value === me.loginCode) {
        document.getElementById('lock-screen').style.display = 'none';
        localStorage.removeItem('app_locked');
    } else {
        Swal.fire('خطأ','الكود غير صحيح','error');
    }
}

// ================= REAL-TIME ENGINE =================
function init() {
    if(localStorage.getItem('app_locked')) lockApp();
    
    // 1. تحديث الظهور اللحظي
    db.ref('users/'+me.phone).update({ online: true, lastSeen: Date.now() });
    db.ref('users/'+me.phone).onDisconnect().update({ online: false, lastSeen: Date.now() });

    // 2. قائمة المستخدمين مع "يكتب الآن"
    db.ref('users').on('value', snap => {
        const list = document.getElementById('user-list');
        list.innerHTML = "";
        snap.forEach(child => {
            const u = child.val();
            if(u.phone === me.phone) return;
            
            list.innerHTML += `
            <div class="user-row" onclick="openChat('${u.phone}','${u.name}','${u.pfp}')" style="display:flex; align-items:center; padding:15px; border-bottom:1px solid #222d34; cursor:pointer">
                <img src="${u.pfp}" style="width:55px; height:55px; border-radius:50%; margin-left:15px">
                <div style="flex:1">
                    <div style="display:flex; justify-content:space-between"><b>${u.name}</b> <small style="color:#8696a0">${moment(u.lastSeen).fromNow()}</small></div>
                    <div id="list-status-${u.phone}" style="font-size:13px; color:#8696a0">${u.online ? '<span style="color:#00a884">متصل الآن</span>' : 'أخر ظهور ' + moment(u.lastSeen).calendar()}</div>
                </div>
            </div>`;
        });
    });
}

// ================= CHAT SYSTEM (The Beast Mode) =================
function openChat(id, name, pfp) {
    activeID = [me.phone, id].sort().join("_");
    document.getElementById('chat-window').style.display = 'flex';
    document.getElementById('chat-name').innerText = name;
    document.getElementById('chat-pfp').src = pfp;

    // اتبع نظام "يكتب الآن"
    db.ref('typing/'+activeID+'/'+id).on('value', snap => {
        document.getElementById('chat-status-text').innerText = snap.val() ? "يكتب الآن..." : "متصل الآن";
    });

    // تحميل الرسائل بنظام الصح المتطور
    db.ref('messages/'+activeID).on('value', snap => {
        const box = document.getElementById('chat-messages');
        box.innerHTML = "";
        snap.forEach(m => {
            const d = m.val();
            const isMe = d.sender === me.phone;
            
            // تحديد أيقونة الصح
            let ticks = '<i class="fas fa-check tick-single"></i>';
            if(d.seen) ticks = '<i class="fas fa-check-double tick-read"></i>';
            else if(d.delivered) ticks = '<i class="fas fa-check-double tick-double"></i>';

            box.innerHTML += `
            <div class="msg-bubble ${isMe ? 'sent' : 'received'}">
                ${d.text}
                <div class="msg-info">
                    ${moment(d.time).format('h:mm a')}
                    ${isMe ? ticks : ''}
                </div>
            </div>`;

            // تحديث حالة القراءة لو أنا المستلم
            if(!isMe && !d.seen) {
                db.ref('messages/'+activeID+'/'+m.key).update({ seen: true });
            }
        });
        box.scrollTop = box.scrollHeight;
    });
}

// ================= ACTIONS =================
function sendMsg() {
    const txt = document.getElementById('msg-input').value;
    if(!txt.trim()) return;
    
    db.ref('messages/'+activeID).push({
        sender: me.phone,
        text: txt,
        time: Date.now(),
        delivered: true,
        seen: false
    });
    document.getElementById('msg-input').value = "";
}

// يكتب الآن
document.getElementById('msg-input').addEventListener('input', () => {
    db.ref('typing/'+activeID+'/'+me.phone).set(true);
    clearTimeout(window.typingTimer);
    window.typingTimer = setTimeout(() => {
        db.ref('typing/'+activeID+'/'+me.phone).set(false);
    }, 2000);
});

function toggleMainBtn() {
    const m = document.getElementById('main-menu');
    m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
}

function closeChat() { document.getElementById('chat-window').style.display='none'; }
function logout() { localStorage.clear(); location.reload(); }

init();
</script>
</body>
</html>
