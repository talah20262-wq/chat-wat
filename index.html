<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tallah Star | الإمبراطورية v12</title>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #0b141a; --hdr: #202c33; --green: #00a884;
            --text: #e9edef; --gold: #d4af37; --blue: #20adff; --msg-me: #005c4b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        header { background: var(--hdr); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #111b21; }
        .pfp-main { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; background: #333; cursor: pointer; border: 2px solid var(--gold); }

        /* قائمة المستخدمين */
        .user-row { display: flex; padding: 15px; border-bottom: 1px solid #222d34; align-items: center; cursor: pointer; position: relative; }
        .pfp-list { width: 55px; height: 55px; border-radius: 50%; margin-left: 15px; object-fit: cover; background: #222; }
        .unread-badge { background: var(--green); color: white; border-radius: 50%; min-width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; margin-right: auto; }

        /* الشات */
        #chat-ui { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: none; flex-direction: column; }
        .chat-body { flex: 1; overflow-y: auto; padding: 15px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-color: rgba(0,0,0,0.92); background-blend-mode: darken; display: flex; flex-direction: column; }
        .bubble { max-width: 80%; padding: 10px; border-radius: 12px; margin-bottom: 8px; font-size: 15px; }
        .b-me { background: var(--msg-me); align-self: flex-end; border-top-right-radius: 0; }
        .b-other { background: var(--hdr); align-self: flex-start; border-top-left-radius: 0; }
        .msg-img { width: 100%; border-radius: 8px; margin-top: 5px; max-height: 250px; object-fit: cover; }

        /* لوحة التحكم */
        .admin-panel { position: fixed; inset: 0; background: #000; z-index: 50000; display: none; padding: 20px; overflow-y: auto; }
        .admin-card { background: #1c282f; padding: 15px; border-radius: 15px; margin-bottom: 15px; border-right: 5px solid var(--gold); }
        .btn-gold { background: var(--gold); color: black; font-weight: bold; border: none; padding: 12px; border-radius: 10px; width: 100%; cursor: pointer; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

<div id="gate" style="position:fixed; inset:0; background:var(--bg); z-index:100000; display:flex; align-items:center; justify-content:center;">
    <div style="background:#1c282f; padding:30px; border-radius:25px; width:90%; max-width:400px; text-align:center; border-top: 5px solid var(--gold);">
        <h1 style="color:var(--gold)">Tallah Star</h1>
        <input type="password" id="entry-code" placeholder="كود الدخول" style="width:100%; padding:14px; margin:15px 0; border-radius:10px; border:none; background:#2a3942; color:white; text-align:center;">
        <button class="btn-gold" onclick="attemptLogin()">دخول</button>
        <hr style="opacity:0.1; margin:15px 0;">
        <input type="text" id="req-name" placeholder="اسمك لطلب انضمام" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:none; background:#2a3942; color:white; text-align:center;">
        <button style="background:var(--green); color:white; width:100%; padding:12px; border-radius:10px; border:none; font-weight:bold;" onclick="requestJoin()">طلب كود</button>
    </div>
</div>

<div id="app" class="hidden">
    <header>
        <div style="display:flex; align-items:center; gap:10px;">
            <img id="my-pfp" class="pfp-main" onclick="document.getElementById('pfp-input').click()">
            <input type="file" id="pfp-input" hidden accept="image/*" onchange="uploadMyPfp(this)">
            <b id="brand-name">Tallah Star</b>
        </div>
        <div style="display:flex; gap:20px; font-size:20px;">
            <i class="fas fa-crown" id="admin-icon" onclick="openAdmin()" style="cursor:pointer; color:var(--gold)"></i>
            <i class="fas fa-power-off" onclick="logout()" style="cursor:pointer;"></i>
        </div>
    </header>
    <div id="users-list"></div>
</div>

<div id="chat-ui">
    <div style="background:var(--hdr); padding:10px; display:flex; align-items:center; gap:12px;">
        <i class="fas fa-arrow-right" onclick="closeChat()" style="cursor:pointer"></i>
        <img id="chat-user-pfp" class="pfp-list" style="width:40px; height:40px; margin:0">
        <b id="chat-user-name"></b>
    </div>
    <div id="chat-box" class="chat-body"></div>
    <div class="chat-footer">
        <label for="img-in"><i class="fas fa-image" style="font-size:22px; color:#8696a0; cursor:pointer;"></i></label>
        <input type="file" id="img-in" hidden accept="image/*" onchange="sendPhoto(this)">
        <input type="text" id="msg-input" style="flex:1; background:#2a3942; border:none; padding:12px; border-radius:20px; color:white;" placeholder="رسالة...">
        <i class="fas fa-paper-plane" style="color:var(--green); font-size:24px; cursor:pointer;" onclick="sendText()"></i>
    </div>
</div>

<div id="admin-panel" class="admin-panel">
    <h2 style="color:var(--gold); margin-bottom:20px;">التحكم الكامل 👑</h2>
    <div class="admin-card">
        <h4>المستخدمين والأكواد</h4>
        <div id="admin-users-list"></div>
    </div>
    <button style="background:red; color:white; padding:12px; border-radius:10px; width:100%; border:none; font-weight:bold;" onclick="closeAdmin()">إغلاق</button>
</div>

<script>
    // تكوين Firebase
    const firebaseConfig = { databaseURL: "https://talah-c12c5-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // التنبيهات دايماً تظهر فوق
    const Toast = Swal.mixin({ toast: true, position: 'top', showConfirmButton: false, timer: 3000 });

    let me = JSON.parse(localStorage.getItem('tallah_v12_auth'));
    let activeChat = null;
    let targetKey = null;

    function attemptLogin() {
        const code = document.getElementById('entry-code').value;
        if(code === "248") {
            me = { uid: 'admin', name: 'الإمبراطور', role: 'admin', pfp: 'https://cdn-icons-png.flaticon.com/512/149/149071.png' };
            saveAuth();
        } else {
            db.ref('users').once('value', s => {
                let found = false;
                s.forEach(u => { if(u.val().code === code) { me = u.val(); me.uid = u.key; found = true; saveAuth(); } });
                if(!found) Toast.fire({ icon: 'error', title: 'الكود غلط يا وحش' });
            });
        }
    }
    function saveAuth() { localStorage.setItem('tallah_v12_auth', JSON.stringify(me)); location.reload(); }

    if(me) {
        document.getElementById('gate').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('my-pfp').src = me.pfp || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
        if(me.role !== 'admin') document.getElementById('admin-icon').classList.add('hidden');
        loadUsers();
    }

    // رفع صورة البروفايل من الجهاز
    function uploadMyPfp(input) {
        const reader = new FileReader();
        reader.onload = e => {
            const data = e.target.result;
            me.pfp = data;
            document.getElementById('my-pfp').src = data;
            localStorage.setItem('tallah_v12_auth', JSON.stringify(me));
            if(me.uid === 'admin') db.ref('settings/adminPfp').set(data);
            else db.ref('users/'+me.uid).update({ pfp: data });
            Toast.fire({ icon: 'success', title: 'تم تحديث صورتك' });
        };
        reader.readAsDataURL(input.files[0]);
    }

    function loadUsers() {
        db.ref('users').on('value', snap => {
            const list = document.getElementById('users-list'); list.innerHTML = "";
            
            // إضافة "الإمبراطور" للقائمة لو المستخدم عادي
            if(me.uid !== 'admin') {
                db.ref('settings/adminPfp').once('value', p => {
                    addUserRow(list, 'admin', 'الإمبراطور', p.val(), true);
                });
            }

            snap.forEach(u => {
                if(u.key === me.uid) return;
                addUserRow(list, u.key, u.val().name, u.val().pfp, u.val().verified);
            });
        });
    }

    function addUserRow(list, key, name, pfp, verified) {
        db.ref(`unread/${me.uid}/${key}`).on('value', c => {
            const count = c.val() || 0;
            const existing = document.getElementById('row-'+key);
            const html = `
                <div class="user-row" id="row-${key}" onclick="openChat('${key}', '${name}', '${pfp}')">
                    <img src="${pfp || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="pfp-list">
                    <div style="flex:1"><b>${name} ${verified?'<i class="fas fa-check-circle" style="color:var(--blue)"></i>':''}</b></div>
                    ${count > 0 ? `<div class="unread-badge">${count}</div>` : ''}
                </div>`;
            if(existing) existing.outerHTML = html;
            else list.innerHTML += html;
        });
    }

    function openChat(key, name, pfp) {
        targetKey = key;
        activeChat = [me.uid, key].sort().join("_");
        document.getElementById('chat-ui').style.display = 'flex';
        document.getElementById('chat-user-name').innerText = name;
        document.getElementById('chat-user-pfp').src = pfp || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';

        db.ref(`unread/${me.uid}/${key}`).set(0); // تصفير الإشعارات

        db.ref('messages/' + activeChat).on('value', snap => {
            const box = document.getElementById('chat-box'); box.innerHTML = "";
            snap.forEach(m => {
                const d = m.val(); const isMe = d.sender === me.uid;
                let content = d.type === 'image' ? `<img src="${d.content}" class="msg-img">` : d.content;
                box.innerHTML += `<div class="bubble ${isMe?'b-me':'b-other'}">${content}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendText() {
        const v = document.getElementById('msg-input').value; if(!v) return;
        db.ref('messages/'+activeChat).push({ sender:me.uid, content:v, type:'text' });
        db.ref(`unread/${targetKey}/${me.uid}`).transaction(c => (c||0)+1);
        document.getElementById('msg-input').value = "";
    }

    function sendPhoto(i) {
        const r = new FileReader();
        r.onload = e => {
            db.ref('messages/'+activeChat).push({ sender:me.uid, content:e.target.result, type:'image' });
            db.ref(`unread/${targetKey}/${me.uid}`).transaction(c => (c||0)+1);
        };
        r.readAsDataURL(i.files[0]);
    }

    function openAdmin() {
        document.getElementById('admin-panel').style.display = 'block';
        db.ref('users').on('value', s => {
            const box = document.getElementById('admin-users-list'); box.innerHTML = "";
            s.forEach(u => {
                box.innerHTML += `<div style="background:#2a3942; padding:10px; border-radius:10px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                    <span>${u.val().name}</span>
                    <button onclick="deleteUser('${u.key}')" style="background:red; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">حذف</button>
                </div>`;
            });
        });
    }

    function deleteUser(k) { db.ref('users/'+k).remove(); Toast.fire({ icon: 'success', title: 'تم الحذف' }); }
    function closeChat() { document.getElementById('chat-ui').style.display='none'; }
    function closeAdmin() { document.getElementById('admin-panel').style.display='none'; }
    function logout() { localStorage.clear(); location.reload(); }
    function requestJoin() {
        const n = document.getElementById('req-name').value;
        if(n) { db.ref('join_requests').push({ name: n }); Toast.fire({ icon: 'info', title: 'تم إرسال طلبك' }); }
    }
</script>
</body>
</html>
