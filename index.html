<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tallah Star | WhatsApp Edition</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Tallah%20Star%22,%22short_name%22:%22Tallah%22,%22display%22:%22standalone%22,%22start_url%22:%22/%22,%22background_color%22:%22#0b141a%22,%22theme_color%22:%22#202c33%22}">

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --wa-bg: #0b141a; --wa-header: #202c33; --wa-green: #00a884;
            --wa-msg-me: #005c4b; --wa-msg-other: #202c33; --wa-gold: #d4af37;
            --wa-text: #e9edef; --wa-muted: #8696a0; --wa-border: #222d34;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--wa-bg); color: var(--wa-text); height: 100vh; overflow: hidden; }

        /* --- زرار التثبيت العلوي (Install PWA) --- */
        #pwa-install-banner {
            position: fixed; top: 0; left: 0; right: 0; background: var(--wa-header);
            padding: 12px 20px; z-index: 20000; display: none;
            justify-content: space-between; align-items: center; border-bottom: 2px solid var(--wa-green);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* --- شاشة الدخول الاحترافية --- */
        .auth-container { position: fixed; inset: 0; background: #0b141a; z-index: 15000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: #222e35; width: 100%; max-width: 420px; padding: 40px 30px; border-radius: 30px; text-align: center; border-top: 8px solid var(--wa-green); box-shadow: 0 20px 50px rgba(0,0,0,0.7); }
        .auth-card h1 { color: var(--wa-green); font-size: 32px; margin-bottom: 10px; }
        .auth-card p { color: var(--wa-muted); margin-bottom: 30px; }
        .auth-input { width: 100%; padding: 18px; margin-bottom: 15px; border-radius: 15px; border: none; background: #2a3942; color: white; font-size: 16px; outline: none; text-align: center; transition: 0.3s; }
        .auth-input:focus { box-shadow: 0 0 0 2px var(--wa-green); }
        .btn-main { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .btn-green { background: var(--wa-green); color: #0b141a; }
        .btn-owner { background: transparent; color: var(--wa-gold); border: 2px solid var(--wa-gold); margin-top: 20px; }

        /* --- الهيكل الرئيسي --- */
        .app-shell { display: none; height: 100vh; flex-direction: column; }
        header { background: var(--wa-header); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: relative; }
        .brand { font-size: 24px; font-weight: 500; color: var(--wa-muted); }
        .head-icons { display: flex; gap: 25px; color: var(--wa-muted); font-size: 20px; }

        .tabs-nav { background: var(--wa-header); display: flex; border-bottom: 1px solid var(--wa-border); }
        .tab-item { flex: 1; padding: 16px; text-align: center; color: var(--wa-muted); font-weight: bold; position: relative; cursor: pointer; transition: 0.3s; }
        .tab-item.active { color: var(--wa-green); }
        .tab-item.active::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: var(--wa-green); }

        /* --- قائمة المحادثات --- */
        .chats-wrapper { flex: 1; overflow-y: auto; background: var(--wa-bg); }
        .chat-entry { display: flex; align-items: center; padding: 14px 18px; cursor: pointer; border-bottom: 0.5px solid var(--wa-border); transition: 0.2s; }
        .chat-entry:hover { background: #202c33; }
        .pfp { width: 58px; height: 58px; border-radius: 50%; object-fit: cover; background: #313d45; margin-left: 15px; }
        .entry-body { flex: 1; }
        .entry-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .entry-name { color: var(--wa-text); font-size: 18px; font-weight: 500; }
        .entry-time { color: var(--wa-muted); font-size: 12px; }
        .entry-msg { color: var(--wa-muted); font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }

        /* --- واجهة الدردشة (الاحترافية) --- */
        .chat-overlay { position: fixed; inset: 0; background: var(--wa-bg); z-index: 10000; display: none; flex-direction: column; }
        .chat-top-bar { background: var(--wa-header); padding: 10px 15px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-color: rgba(11,27,33,0.94); background-blend-mode: darken; display: flex; flex-direction: column; gap: 6px; }
        
        .msg-bubble { max-width: 85%; padding: 8px 12px; border-radius: 10px; font-size: 16px; position: relative; color: #e9edef; line-height: 1.4; }
        .msg-bubble.sent { align-self: flex-end; background: var(--wa-msg-me); border-top-right-radius: 0; }
        .msg-bubble.received { align-self: flex-start; background: var(--wa-msg-other); border-top-left-radius: 0; }
        .msg-info { font-size: 11px; color: rgba(255,255,255,0.5); float: left; margin-top: 6px; margin-right: 10px; }
        .blue-ticks { color: #53bdeb; margin-right: 4px; font-size: 13px; }

        /* بار الإدخال - تشغيل الريكورد والأزرار */
        .chat-input-bar { background: var(--wa-header); padding: 10px; display: flex; align-items: center; gap: 10px; }
        .input-pill { flex: 1; background: #2a3942; border-radius: 28px; display: flex; align-items: center; padding: 5px 15px; }
        #text-input { flex: 1; background: transparent; border: none; color: white; padding: 12px; outline: none; font-size: 16px; }
        .circle-action { width: 50px; height: 50px; background: var(--wa-green); border-radius: 50%; border: none; color: #111b21; font-size: 22px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .circle-action:active { transform: scale(0.9); }
        .rec-timer { display: none; color: #ff3b30; font-weight: bold; margin-right: 10px; animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.3; } }

        /* --- لوحة تحكم الإمبراطور (Admin) --- */
        .admin-panel { position: fixed; inset: 0; background: #0b141a; z-index: 20000; display: none; flex-direction: column; }
        .admin-head { background: var(--wa-gold); color: #000; padding: 25px; display: flex; justify-content: space-between; align-items: center; }
        .admin-body { padding: 20px; overflow-y: auto; }
        .user-manage-card { background: #1c282f; padding: 20px; border-radius: 15px; margin-bottom: 15px; border-right: 6px solid var(--wa-gold); display: flex; justify-content: space-between; align-items: center; }
        .kick-btn { background: #ff3b30; color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="pwa-install-banner">
    <div style="display:flex; align-items:center; gap:15px">
        <img src="https://cdn-icons-png.flaticon.com/512/166/166258.png" width="35">
        <b>تثبيت طلة Star كأبلكيشن 📲</b>
    </div>
    <button class="kick-btn" style="background:var(--wa-green); color:#000" onclick="triggerPWA()">تثبيت</button>
</div>

<div id="auth-layer" class="auth-container">
    <div class="auth-card">
        <h1>Tallah Star</h1>
        <p>مرحباً بك في إمبراطورية النجم</p>
        <input type="text" id="in-name" class="auth-input" placeholder="اكتب اسمك هنا">
        <input type="tel" id="in-phone" class="auth-input" placeholder="رقم الموبايل">
        <button class="btn-main btn-green" onclick="handleReg()">ابدأ الدردشة</button>
        <button class="btn-main btn-owner" onclick="handleOwnerAuth()">دخول المالك 👑</button>
    </div>
</div>

<div id="app-layer" class="app-shell">
    <header>
        <div class="brand" id="dynamic-site-name">WhatsApp</div>
        <div class="head-icons">
            <i class="fas fa-search"></i>
            <i class="fas fa-crown hidden" id="king-crown" onclick="toggleAdminView(true)" style="color:var(--wa-gold)"></i>
            <i class="fas fa-ellipsis-v" onclick="showGlobalSettings()"></i>
        </div>
    </header>

    <div class="tabs-nav">
        <div class="tab-item"><i class="fas fa-camera"></i></div>
        <div class="tab-item active">الدردشات</div>
        <div class="tab-item">الحالة</div>
        <div class="tab-item">المكالمات</div>
    </div>

    <div class="chats-wrapper">
        <div class="chat-entry" onclick="launchChat('public_room', 'جروب طلة العام 👑', 'https://cdn-icons-png.flaticon.com/512/166/166258.png')">
            <img src="https://cdn-icons-png.flaticon.com/512/166/166258.png" class="pfp">
            <div class="entry-body">
                <div class="entry-row"><b class="entry-name">جروب طلة العام 👑</b><span class="entry-time">الآن</span></div>
                <div class="entry-msg" id="last-msg-global">أهلاً بكل الملوك في عالم طلة...</div>
            </div>
        </div>
        <div id="dynamic-contacts"></div>
    </div>
</div>

<div id="chat-layer" class="chat-overlay">
    <div class="chat-top-bar">
        <i class="fas fa-arrow-right" onclick="exitChat()" style="color:var(--wa-muted); font-size:22px"></i>
        <img id="chat-pfp-top" class="pfp" style="width:42px; height:42px; margin:0">
        <div style="flex:1"><b id="chat-name-top"></b><br><small style="color:var(--wa-green)">متصل الآن</small></div>
        <div style="display:flex; gap:20px; color:var(--wa-muted); font-size:20px">
            <i class="fas fa-video" onclick="simulateCall('فيديو')"></i>
            <i class="fas fa-phone" onclick="simulateCall('صوتية')"></i>
        </div>
    </div>
    
    <div id="msg-container" class="chat-messages"></div>

    <div class="chat-input-bar">
        <div class="input-pill">
            <i class="far fa-smile" style="color:var(--wa-muted); font-size:24px"></i>
            <span id="recording-indicator" class="rec-timer">REC 00:00</span>
            <input type="text" id="text-input" placeholder="رسالة">
            <i class="fas fa-paperclip" style="color:var(--wa-muted); font-size:22px; margin-left:15px"></i>
        </div>
        <button id="action-btn-main" class="circle-action" onclick="performAction()">
            <i id="action-icon" class="fas fa-microphone"></i>
        </button>
    </div>
</div>

<div id="admin-layer" class="admin-panel">
    <div class="admin-head">
        <h2>إدارة الإمبراطورية 👑</h2>
        <i class="fas fa-times" onclick="toggleAdminView(false)" style="font-size:28px"></i>
    </div>
    <div class="admin-body">
        <div class="user-manage-card" style="background:var(--wa-header); border:none">
            <b>تعديل اسم التطبيق</b>
            <button class="kick-btn" style="background:var(--wa-green); color:#000" onclick="adminSetSiteName()">تعديل</button>
        </div>
        <div class="user-manage-card" style="background:#ff3b30; border:none">
            <b style="color:white">تصفير كل المحادثات</b>
            <button class="kick-btn" style="background:#000" onclick="adminNukeMessages()">تدمير</button>
        </div>
        <h3 style="margin:25px 10px; color:var(--wa-gold)">إدارة الرعية (المستخدمين):</h3>
        <div id="admin-user-list"></div>
    </div>
</div>

<script>
    // --- 1. الإعدادات والربط بالـ Firebase بتاعتك من الصور ---
    const firebaseConfig = { databaseURL: "https://talah-c12c5-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myData = JSON.parse(localStorage.getItem('tallah_user_session'));
    let activeChatID = null;
    let deferredPrompt;
    let mediaRecorder;
    let audioChunks = [];

    // --- 2. نظام التثبيت PWA الشغال ---
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault(); deferredPrompt = e;
        document.getElementById('pwa-install-banner').style.display = 'flex';
    });

    function triggerPWA() {
        if(!deferredPrompt) return;
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => {
            document.getElementById('pwa-install-banner').style.display = 'none';
        });
    }

    if(myData) startEmpire();

    // --- 3. نظام الدخول ---
    function handleReg() {
        const name = document.getElementById('in-name').value, phone = document.getElementById('in-phone').value;
        if(!name || !phone) return Swal.fire('بيانات ناقصة','اكتب اسمك ورقمك يا كنج','warning');
        const userObj = { name, phone, pfp: 'https://cdn-icons-png.flaticon.com/512/149/149071.png', role: 'user' };
        db.ref('users/' + phone).set(userObj).then(() => {
            localStorage.setItem('tallah_user_session', JSON.stringify(userObj));
            location.reload();
        });
    }

    async function handleOwnerAuth() {
        const { value: code } = await Swal.fire({ title: 'كود المالك', input: 'password', confirmButtonColor: '#d4af37' });
        if(code === "2009257mama") {
            const adminObj = { name: 'الإمبراطور نجم 👑', phone: 'admin_star', role: 'admin', pfp: 'https://cdn-icons-png.flaticon.com/512/149/149071.png' };
            localStorage.setItem('tallah_user_session', JSON.stringify(adminObj));
            location.reload();
        } else {
            Swal.fire('خطأ','الكود غلط يا بطل','error');
        }
    }

    // --- 4. تشغيل الإمبراطورية ---
    function startEmpire() {
        document.getElementById('auth-layer').style.display = 'none';
        document.getElementById('app-layer').style.display = 'flex';
        if(myData.role === 'admin') document.getElementById('king-crown').classList.remove('hidden');

        // جلب اسم الموقع لايف
        db.ref('settings/site_title').on('value', s => { 
            if(s.val()) document.getElementById('dynamic-site-name').innerText = s.val(); 
        });

        // جلب المستخدمين لايف
        db.ref('users').on('value', snap => {
            const contactBox = document.getElementById('dynamic-contacts');
            const adminBox = document.getElementById('admin-user-list');
            contactBox.innerHTML = ""; adminBox.innerHTML = "";
            
            snap.forEach(child => {
                const u = child.val();
                if(u.phone === myData.phone) return;

                // القائمة الرئيسية
                contactBox.innerHTML += `
                    <div class="chat-entry" onclick="launchChat('${u.phone}', '${u.name}', '${u.pfp}')">
                        <img src="${u.pfp}" class="pfp">
                        <div class="entry-body">
                            <div class="entry-row"><b class="entry-name">${u.name}</b><span class="entry-time">12:00 ص</span></div>
                            <div class="entry-msg">متصل الآن بإذن الله...</div>
                        </div>
                    </div>`;

                // قائمة الإدارة
                adminBox.innerHTML += `
                    <div class="user-manage-card">
                        <div><b>${u.name}</b><br><small>${u.phone}</small></div>
                        <button class="kick-btn" onclick="adminKickUser('${u.phone}')">طرد ❌</button>
                    </div>`;
            });
        });
    }

    // --- 5. نظام الشات والريكورد ---
    function launchChat(targetID, name, pfp) {
        activeChatID = (targetID === 'public_room') ? 'public_room' : [myData.phone, targetID].sort().join("___");
        document.getElementById('chat-layer').style.display = 'flex';
        document.getElementById('chat-name-top').innerText = name;
        document.getElementById('chat-pfp-top').src = pfp;

        db.ref('messages/' + activeChatID).off(); // تنظيف
        db.ref('messages/' + activeChatID).on('value', snap => {
            const msgBox = document.getElementById('msg-container');
            msgBox.innerHTML = "";
            snap.forEach(m => {
                const msg = m.val();
                const isMe = msg.sender === myData.phone;
                msgBox.innerHTML += `
                    <div class="msg-bubble ${isMe ? 'sent' : 'received'}">
                        ${activeChatID === 'public_room' && !isMe ? `<small style="color:var(--wa-gold); display:block">${msg.sender_name}</small>` : ''}
                        ${msg.content}
                        <div class="msg-info">12:05 ص ${isMe ? '<i class="fas fa-check-double blue-ticks"></i>' : ''}</div>
                    </div>`;
            });
            msgBox.scrollTop = msgBox.scrollHeight;
        });
    }

    const textInput = document.getElementById('text-input');
    const actionIcon = document.getElementById('action-icon');

    textInput.oninput = () => {
        actionIcon.className = textInput.value.trim() ? "fas fa-paper-plane" : "fas fa-microphone";
    };

    async function performAction() {
        if(textInput.value.trim()) {
            // إرسال نص
            db.ref('messages/' + activeChatID).push({
                sender: myData.phone,
                sender_name: myData.name,
                content: textInput.value,
                type: 'text'
            });
            textInput.value = "";
            textInput.dispatchEvent(new Event('input'));
        } else {
            // نظام الريكورد الصوتي الحقيقي (Audio Recording)
            if(!mediaRecorder || mediaRecorder.state === "inactive") {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.start();
                document.getElementById('recording-indicator').style.display = 'inline';
                actionIcon.style.color = 'red';
                
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        db.ref('messages/' + activeChatID).push({
                            sender: myData.phone,
                            sender_name: myData.name,
                            content: `<audio controls src="${e.target.result}" style="width:200px"></audio>`,
                            type: 'audio'
                        });
                    };
                    reader.readAsDataURL(blob);
                };
            } else {
                mediaRecorder.stop();
                document.getElementById('recording-indicator').style.display = 'none';
                actionIcon.style.color = '#111b21';
            }
        }
    }

    // --- 6. وظائف المالك المطلقة ---
    function toggleAdminView(show) { document.getElementById('admin-layer').style.display = show ? 'flex' : 'none'; }

    async function adminSetSiteName() {
        const { value: newTitle } = await Swal.fire({ title: 'اسم الإمبراطورية الجديد', input: 'text' });
        if(newTitle) db.ref('settings/site_title').set(newTitle);
    }

    function adminNukeMessages() {
        Swal.fire({ title: 'هل أنت متأكد؟', text: "سيتم مسح كل الرسايل من الكوكب!", icon: 'warning', showCancelButton: true }).then(r => {
            if(r.isConfirmed) db.ref('messages').remove();
        });
    }

    function adminKickUser(phone) {
        db.ref('users/' + phone).remove();
        Swal.fire('تم الطرد','المستخدم ده ملوش مكان وسطنا','success');
    }

    function exitChat() { document.getElementById('chat-layer').style.display = 'none'; }
    function simulateCall(type) { Swal.fire('اتصال ' + type, 'جاري الاتصال بـ ' + document.getElementById('chat-name-top').innerText, 'info'); }
</script>

</body>
</html>
