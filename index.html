<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TALLAH EMPIRE | THE ULTIMATE BYPASS v42</title>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        :root { --gold: #d4af37; --royal: linear-gradient(135deg, #d4af37, #f9f295); --black: #020202; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background: var(--black); color: white; height: 100vh; overflow: hidden; }

        /* سنترة البوابة */
        #gate { position: fixed; inset: 0; z-index: 1000; display: flex; justify-content: center; align-items: center; background: #000; }
        .gate-card { width: 85%; max-width: 400px; background: rgba(15,15,15,0.98); padding: 40px; border-radius: 30px; border: 2px solid var(--gold); text-align: center; }

        .screen { position: fixed; inset: 0; display: none; flex-direction: column; z-index: 10; background: var(--black); }
        .active { display: flex !important; }

        /* نافذة اللايف - الخدعة التقنية */
        #live-hub {
            position: fixed; top: 100px; left: 50%; transform: translateX(-50%);
            width: 340px; height: 200px; background: #000; border: 3px solid var(--gold);
            border-radius: 20px; z-index: 999; display: none; overflow: hidden;
            box-shadow: 0 0 40px var(--gold);
        }
        
        /* إخفاء تام لأدوات كروم */
        video { 
            width: 100%; height: 100%; object-fit: cover; 
            pointer-events: none; 
            filter: contrast(1.1); /* تحسين الصورة لإيهام المتصفح بجودة عالية */
        }
        video::-webkit-media-controls { display: none !important; }
        video::-webkit-media-controls-enclosure { display: none !important; }

        /* واجهة البث الوهمية */
        .live-overlay {
            position: absolute; inset: 0; pointer-events: none; z-index: 5;
            display: flex; flex-direction: column; justify-content: space-between; padding: 15px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, transparent 40%, transparent 60%, rgba(0,0,0,0.5) 100%);
        }

        .live-tag { background: red; color: white; padding: 3px 10px; border-radius: 4px; font-weight: bold; font-size: 12px; display: flex; align-items: center; gap: 6px; width: fit-content; }
        .live-tag::before { content: ''; width: 8px; height: 8px; background: white; border-radius: 50%; animation: blink 0.8s infinite; }
        
        .live-timer { color: white; font-size: 13px; font-family: monospace; background: rgba(0,0,0,0.7); padding: 4px 10px; border-radius: 6px; align-self: flex-end; border: 1px solid rgba(212,175,55,0.3); }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        #live-notif { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--royal); color: black; padding: 10px 30px; border-radius: 50px; font-weight: 900; z-index: 2000; display: none; }

        header { background: #0a0f14; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); }
        #throne-drawer { position: fixed; left: -100%; top: 0; width: 85%; max-width: 380px; height: 100%; background: #050505; z-index: 10000; padding: 30px; border-right: 2px solid var(--gold); transition: 0.5s; overflow-y: auto; }
        .throne-open { left: 0 !important; }

        .btn-gold { background: var(--royal); color: black; border: none; padding: 15px; border-radius: 15px; font-weight: 900; cursor: pointer; width: 100%; margin-top: 10px; }
        .input-gold { background: rgba(255,255,255,0.05); border: 1px solid var(--gold); padding: 15px; border-radius: 15px; color: white; width: 100%; text-align: center; margin-bottom: 15px; outline: none; }
    </style>
</head>
<body>

<div id="live-notif"><i class="fas fa-video"></i> الإمبراطور في بث مباشر الآن!</div>

<div id="live-hub">
    <div class="live-overlay">
        <div class="live-tag">LIVE</div>
        <div class="live-timer" id="fake-timer">32:14</div>
    </div>
    <video id="remote-v" autoplay playsinline muted preload="auto"></video>
</div>

<div id="gate" class="screen active">
    <div class="gate-card">
        <h1 style="color:var(--gold); font-size:45px;">TALLAH</h1>
        <p style="color:gray; margin-bottom:30px;">THE SOVEREIGN EMPIRE</p>
        <input type="password" id="pass-k" class="input-gold" placeholder="مفتاح العبور">
        <button onclick="login()" class="btn-gold">عبور</button>
    </div>
</div>

<div id="empire" class="screen">
    <header>
        <i class="fas fa-dragon" style="color:var(--gold); font-size:25px;" onclick="toggleThrone()"></i>
        <b>إمبراطورية طلة</b>
        <i class="fas fa-sign-out-alt" style="color:red;" onclick="logout()"></i>
    </header>
    <div id="u-list" style="flex:1; overflow-y:auto; padding:20px;"></div>
</div>

<div id="throne-drawer">
    <h2 style="color:var(--gold); margin-bottom:30px; text-align:center;">لوحة التحكم</h2>
    <button onclick="startLive('cam')" class="btn-gold">فتح الكاميرا 🔥</button>
    <button onclick="startLive('screen')" class="btn-gold" style="background:#00ff88;">بث الشاشة 📱</button>
    <button id="stop-btn" onclick="stopLive()" class="btn-gold" style="background:red; color:white; display:none;">إنهاء</button>
    <button onclick="toggleThrone()" style="margin-top:40px; color:gray; background:none; border:none; width:100%;">إغلاق</button>
</div>

<script>
    const config = { databaseURL: "https://talah-c12c5-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(config);
    const db = firebase.database();

    const peer = new Peer(Math.random().toString(36).substr(2, 9));
    let me = JSON.parse(localStorage.getItem('tallah_v42'));
    let myStream;

    if(me) { document.getElementById('gate').classList.remove('active'); showView('empire'); initKingdom(); }

    function showView(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function login() {
        const k = document.getElementById('pass-k').value;
        if(k === "248") { me = {uid:'admin', name:'الإمبراطور', role:'admin'}; save(); }
        else { db.ref('users').once('value', s => { s.forEach(u => { if(u.val().code===k && u.val().active) { me={...u.val(), uid:u.key}; save(); } }); }); }
    }
    function save() { localStorage.setItem('tallah_v42', JSON.stringify(me)); location.reload(); }

    function initKingdom() {
        db.ref('status/'+me.uid).set(true);
        db.ref('status/'+me.uid).onDisconnect().set(false);
        loadList();

        peer.on('call', call => {
            call.answer();
            call.on('stream', stream => {
                const v = document.getElementById('remote-v');
                document.getElementById('live-hub').style.display = 'block';
                document.getElementById('live-notif').style.display = 'block';
                
                // خدعة كروم: إيهام المتصفح بوجود تدفق وسائط مستمر
                v.srcObject = stream;
                
                // منع ظهور الـ 0 ثانية عن طريق تثبيت الـ currentTime وهمياً
                v.onloadedmetadata = () => {
                    v.currentTime = 0.1; 
                    startFakeTimer();
                };
            });
        });

        db.ref('admin_peer').on('value', pId => {
            if(pId.val() && me.role !== 'admin') {
                peer.call(pId.val(), new MediaStream());
                document.getElementById('live-notif').style.display = 'block';
            } else if(!pId.val()) {
                document.getElementById('live-hub').style.display = 'none';
                document.getElementById('live-notif').style.display = 'none';
            }
        });
    }

    // العداد الوهمي لاقناع الجميع بالمدة
    function startFakeTimer() {
        let mins = Math.floor(Math.random() * 20) + 15; // يبدأ عشوائياً بين 15 و 35 دقيقة
        let secs = Math.floor(Math.random() * 59);
        setInterval(() => {
            secs++;
            if(secs == 60) { mins++; secs = 0; }
            document.getElementById('fake-timer').innerText = `${mins}:${secs < 10 ? '0'+secs : secs}`;
        }, 1000);
    }

    async function startLive(type) {
        try {
            myStream = (type === 'cam') ? 
                await navigator.mediaDevices.getUserMedia({video:true, audio:true}) : 
                await navigator.mediaDevices.getDisplayMedia({video:true, audio:true});
            
            document.getElementById('live-hub').style.display = 'block';
            document.getElementById('remote-v').srcObject = myStream;
            db.ref('admin_peer').set(peer.id);
            document.getElementById('stop-btn').style.display = 'block';
        } catch(e) { console.log(e); }
    }

    function stopLive() {
        if(myStream) myStream.getTracks().forEach(t => t.stop());
        db.ref('admin_peer').remove();
        location.reload();
    }

    function loadList() {
        db.ref('users').on('value', s => {
            const l = document.getElementById('u-list'); l.innerHTML = "";
            s.forEach(u => { if(u.key !== me.uid && u.val().active) l.innerHTML += `<div style="background:#111; padding:20px; border-radius:15px; margin-bottom:10px; border-right:3px solid var(--gold);">${u.val().name}</div>`; });
        });
    }

    function toggleThrone() { document.getElementById('throne-drawer').classList.toggle('throne-open'); }
    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
