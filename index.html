<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Star</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --main-bg: #0b141a; --chat-bg: #0b141a; --my-msg: #005c4b; --other-msg: #202c33; --accent: #00a884; --text: #e9edef; }
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--main-bg); color: var(--text); overflow: hidden; }
        
        /* واجهة الدخول الديمقراطية */
        #auth-screen { position: fixed; inset: 0; background: #111b21; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .auth-card { background: #222e35; padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #2a3942; color: white; box-sizing: border-box; }
        .auth-btn { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* الشات */
        #main-app { display: none; height: 100vh; flex-direction: column; }
        header { background: #202c33; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); display: flex; flex-direction: column; gap: 8px; }
        
        .message { max-width: 75%; padding: 8px 12px; border-radius: 10px; font-size: 0.9rem; position: relative; }
        .sent { align-self: flex-end; background: var(--my-msg); }
        .received { align-self: flex-start; background: var(--other-msg); }
        .msg-info { font-size: 0.7rem; color: #8696a0; margin-top: 4px; display: flex; justify-content: space-between; }

        /* منطقة الأزرار */
        .input-bar { background: #202c33; padding: 10px; display: flex; align-items: center; gap: 10px; }
        .input-bar input { flex: 1; background: #2a3942; border: none; padding: 10px; border-radius: 20px; color: white; outline: none; }
        .btn-icon { color: #8696a0; font-size: 1.4rem; cursor: pointer; }
        .btn-active { color: #ff3b3b; }
        
        #admin-menu { position: fixed; top: 70px; left: 10px; background: #673ab7; padding: 10px; border-radius: 50%; display: none; cursor: pointer; z-index: 100; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h2 style="color:var(--accent)">واتساب النجم</h2>
        <p style="font-size: 0.8rem; color:#8696a0">سجل بياناتك للانضمام للجروب</p>
        <input type="text" id="join-name" class="auth-input" placeholder="الاسم (أو كود المالك)">
        <input type="text" id="join-phone" class="auth-input" placeholder="رقم الهاتف">
        <button class="auth-btn" onclick="processAuth()">دخول</button>
    </div>
</div>

<div id="main-app">
    <header>
        <div style="display:flex; align-items:center; gap:10px;">
            <img id="my-pic" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" width="40" height="40" style="border-radius:50%">
            <b id="my-name">...</b>
        </div>
        <i class="fas fa-sign-out-alt btn-icon" onclick="localStorage.clear(); location.reload();"></i>
    </header>
    <div id="chat-box"></div>
    <div class="input-bar">
        <i class="fas fa-camera btn-icon" onclick="sendImg()"></i>
        <input type="text" id="msg-input" placeholder="اكتب رسالة..." onkeypress="if(event.key==='Enter') doSend()">
        <i id="mic-icon" class="fas fa-microphone btn-icon" onclick="doRecord()"></i>
        <i class="fas fa-paper-plane btn-icon" style="color:var(--accent)" onclick="doSend()"></i>
    </div>
</div>

<div id="admin-menu" onclick="showAdminRequests()"><i class="fas fa-users-cog"></i></div>

<script>
    // الإعدادات - رابط Firebase الخاص بك
    const config = { databaseURL: "https://groop-27edc-default-rtdb.europe-west1.firebasedatabase.app/" };
    firebase.initializeApp(config);
    const db = firebase.database();

    let user = JSON.parse(localStorage.getItem('star_v4_session'));
    let recorder; let chunks = [];

    if(user) checkUser();

    function processAuth() {
        const name = document.getElementById('join-name').value;
        const phone = document.getElementById('join-phone').value;

        // الدخول السري للمالك
        if(name === "2009257mama") {
            const admin = { role: 'admin', name: 'المالك النجم', status: 'active', pic: 'https://i.ibb.co/N2pGGLgJ/Chat-GPT-Image-28-2026-01-03-16.png' };
            saveAndGo(admin);
            return;
        }

        if(!name || !phone) return Swal.fire('دخل بياناتك يا نجم');
        
        const newUser = { role: 'user', name: name, phone: phone, status: 'pending', pic: 'https://cdn-icons-png.flaticon.com/512/149/149071.png' };
        db.ref('users').child(phone).set(newUser).then(() => saveAndGo(newUser));
    }

    function saveAndGo(obj) { localStorage.setItem('star_v4_session', JSON.stringify(obj)); user = obj; checkUser(); }

    function checkUser() {
        if(user.role === 'admin') { startApp(); return; }
        db.ref('users').child(user.phone).on('value', s => {
            if(s.val()?.status === 'active') startApp();
            else document.getElementById('auth-screen').innerHTML = "<div class='auth-card'><h2>بانتظار موافقة النجم...</h2><p>طلبك وصل للمالك، أول ما يوافق الشات هيفتح تلقائياً.</p></div>";
        });
    }

    function startApp() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'flex';
        document.getElementById('my-name').innerText = user.name;
        document.getElementById('my-pic').src = user.pic;
        if(user.role === 'admin') document.getElementById('admin-menu').style.display = 'block';
        loadMsgs();
    }

    // --- تشغيل الأزرار الفعلي ---
    function doSend(type = 'text', val = null) {
        const input = document.getElementById('msg-input');
        const text = val || input.value;
        if(!text) return;
        db.ref('chat').push({
            name: user.name, type: type, body: text,
            time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
        });
        input.value = "";
    }

    async function sendImg() {
        const { value: url } = await Swal.fire({ title: 'رابط الصورة', input: 'url' });
        if(url) doSend('img', url);
    }

    async function doRecord() {
        const icon = document.getElementById('mic-icon');
        if(!recorder || recorder.state === 'inactive') {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                recorder = new MediaRecorder(stream);
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/ogg' });
                    const r = new FileReader();
                    r.readAsDataURL(blob);
                    r.onloadend = () => doSend('voice', r.result);
                    chunks = [];
                };
                recorder.start();
                icon.classList.add('btn-active');
            } catch(e) { Swal.fire('وافق على المايك أولاً'); }
        } else {
            recorder.stop();
            icon.classList.remove('btn-active');
        }
    }

    function loadMsgs() {
        db.ref('chat').limitToLast(50).on('value', s => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            s.forEach(m => {
                const d = m.val();
                const isMe = d.name === user.name;
                let html = `<div class="message ${isMe ? 'sent' : 'received'}">
                    <b style="color:#34b7f1; font-size:0.7rem">${d.name}</b>
                    ${d.type==='text' ? `<div>${d.body}</div>` : d.type==='img' ? `<img src="${d.body}" width="100%">` : `<audio controls src="${d.body}"></audio>`}
                    <div class="msg-info">${d.time} ${user.role==='admin' ? `<span onclick="db.ref('chat').child('${m.key}').remove()">حذف</span>` : ''}</div>
                </div>`;
                box.innerHTML += html;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function showAdminRequests() {
        db.ref('users').once('value', s => {
            let list = '';
            s.forEach(u => {
                if(u.val().status === 'pending') {
                    list += `<p>${u.val().name} <button onclick="db.ref('users').child('${u.key}').update({status:'active'})">موافقة</button></p>`;
                }
            });
            Swal.fire({ title: 'طلبات الانضمام', html: list || 'لا يوجد طلبات' });
        });
    }
</script>
</body>
</html>
