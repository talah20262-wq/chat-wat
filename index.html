<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Star | النسخة الملكية</title>
    
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22WhatsApp%20Star%22,%22short_name%22:%22Star%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22#0b141a%22,%22theme_color%22:%22#202c33%22}">
    <meta name="theme-color" content="#202c33">

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --bg: #0b141a; --header: #202c33; --green: #25d366; --gold: #d4af37; --blue: #34b7f1; --msg-me: #005c4b; --msg-other: #202c33; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; height: 100vh; overflow: hidden; }

        /* شاشات الدخول */
        .auth-screen { position: fixed; inset: 0; background: radial-gradient(circle, #111b21 0%, #0b141a 100%); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .royal-card { background: #222e35; padding: 30px; border-radius: 30px; width: 100%; max-width: 420px; text-align: center; border: 1px solid var(--gold); box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
        
        input, button, textarea { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: none; outline: none; transition: 0.3s; }
        input { background: #2a3942; color: white; text-align: center; font-size: 1rem; }
        input:focus { border: 1px solid var(--gold); }
        .btn-green { background: var(--green); color: #000; font-weight: 900; cursor: pointer; }
        .btn-gold { background: none; color: var(--gold); border: 1px solid var(--gold); font-weight: bold; cursor: pointer; }

        /* واجهة التطبيق */
        .app-container { display: none; height: 100vh; flex-direction: column; }
        header { background: var(--header); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--gold); }
        
        .user-info { display: flex; align-items: center; gap: 12px; }
        .pfp-small { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }

        /* القائمة */
        .main-content { flex: 1; overflow-y: auto; background: #111b21; }
        .chat-item { display: flex; align-items: center; padding: 15px 20px; border-bottom: 1px solid #1c282f; cursor: pointer; transition: 0.2s; position: relative; }
        .chat-item:hover { background: #2a3942; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid #111b21; position: absolute; right: 55px; bottom: 15px; background: #8696a0; }
        .status-dot.online { background: var(--green); }

        /* نافذة الشات */
        .chat-window { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: none; flex-direction: column; }
        .chat-body { flex: 1; overflow-y: auto; padding: 20px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); display: flex; flex-direction: column; gap: 8px; }
        
        .bubble { max-width: 75%; padding: 10px 15px; border-radius: 18px; font-size: 0.95rem; line-height: 1.4; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .bubble.me { align-self: flex-end; background: var(--msg-me); border-top-left-radius: 0; }
        .bubble.other { align-self: flex-start; background: var(--msg-other); border-top-right-radius: 0; }
        .bubble .time { font-size: 0.7rem; color: #8696a0; display: block; text-align: left; margin-top: 5px; }

        .input-area { background: var(--header); padding: 10px; display: flex; align-items: center; gap: 10px; }
        .icon-btn { font-size: 20px; color: #8696a0; cursor: pointer; transition: 0.3s; }
        .icon-btn:hover { color: var(--gold); }

        /* لوحة المالك */
        .admin-panel { position: fixed; top: 70px; left: 15px; right: 15px; background: #1c282f; border: 2px solid var(--gold); border-radius: 20px; padding: 20px; z-index: 6000; display: none; max-height: 70vh; overflow-y: auto; box-shadow: 0 0 50px rgba(0,0,0,1); }
        .admin-row { display: flex; justify-content: space-between; align-items: center; background: #2a3942; padding: 12px; margin-bottom: 8px; border-radius: 10px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<audio id="msg-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

<div id="auth-screen" class="auth-screen">
    <div class="royal-card">
        <h1 style="color:var(--gold); margin-bottom: 20px;"><i class="fas fa-crown"></i> WhatsApp Star</h1>
        <div id="auth-form">
            <input type="text" id="reg-name" placeholder="الاسم المستعار">
            <input type="tel" id="reg-phone" placeholder="رقم الموبايل">
            <input type="password" id="reg-pass" placeholder="كلمة السر">
            <button class="btn-green" onclick="handleAuth()">دخول ملكي 🚀</button>
        </div>
        <button class="btn-gold" onclick="ownerAccess()">دخول المالك 🛡️</button>
    </div>
</div>

<div id="app" class="app-container">
    <header>
        <div class="user-info">
            <img id="my-pfp" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="pfp-small" onclick="changePfp()">
            <b id="my-name" style="color:var(--gold)"></b>
        </div>
        <div style="display:flex; gap:20px; align-items:center; font-size: 20px;">
            <i class="fas fa-user-shield" id="admin-icon" style="display:none; color:var(--gold); cursor:pointer" onclick="toggleAdmin()"></i>
            <i class="fas fa-sign-out-alt" onclick="logout()" style="cursor:pointer"></i>
        </div>
    </header>

    <div id="admin-panel" class="admin-panel">
        <h3 style="color:var(--gold); text-align:center; margin-bottom:15px">لوحة تحكم الإمبراطور</h3>
        <div id="admin-users-list"></div>
    </div>

    <div class="main-content" id="contacts-list">
        </div>
</div>

<div id="chat-screen" class="chat-window">
    <header>
        <div style="display:flex; align-items:center; gap:12px">
            <i class="fas fa-arrow-right" onclick="closeChat()"></i>
            <img id="chat-pfp" src="" class="pfp-small">
            <b id="chat-title"></b>
        </div>
    </header>
    <div class="chat-body" id="chat-msgs"></div>
    <div class="input-area">
        <label for="file-up"><i class="fas fa-paperclip icon-btn"></i></label>
        <input type="file" id="file-up" class="hidden" accept="image/*" onchange="uploadImage(this)">
        <input type="text" id="msg-input" placeholder="اكتب رسالتك...">
        <i class="fas fa-microphone icon-btn" onclick="requestMic()"></i>
        <i class="fas fa-paper-plane icon-btn" style="color:var(--green)" onclick="sendMsg()"></i>
    </div>
</div>

<script>
    // 1. إعدادات Firebase
    const firebaseConfig = { databaseURL: "https://talah-c12c5-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let me = JSON.parse(localStorage.getItem('star_session'));
    let activeChatID = null;

    if(me) launchApp();

    // 2. تسجيل الدخول والمالك
    function handleAuth() {
        const n = document.getElementById('reg-name').value, p = document.getElementById('reg-phone').value, s = document.getElementById('reg-pass').value;
        if(!n || !p || !s) return Swal.fire('بيانات ناقصة');
        
        const data = { name: n, phone: p, pass: s, pfp: 'https://cdn-icons-png.flaticon.com/512/149/149071.png', status: 'online' };
        db.ref('users/' + p).set(data).then(() => {
            localStorage.setItem('star_session', JSON.stringify(data));
            location.reload();
        });
    }

    async function ownerAccess() {
        const { value: code } = await Swal.fire({ title: 'رمز المالك', input: 'password' });
        if(code === "2009257mama") {
            const adminData = { name: 'الإمبراطور المالك 👑', phone: 'admin_001', role: 'admin', pfp: 'https://cdn-icons-png.flaticon.com/512/149/149071.png' };
            localStorage.setItem('star_session', JSON.stringify(adminData));
            location.reload();
        }
    }

    // 3. تشغيل التطبيق
    function launchApp() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        document.getElementById('my-name').innerText = me.name;
        document.getElementById('my-pfp').src = me.pfp;

        if(me.role === 'admin') {
            document.getElementById('admin-icon').style.display = 'block';
            syncAdmin();
        }

        // تحديث الحالة أونلاين
        db.ref('users/' + me.phone).update({ status: 'online' });
        window.onbeforeunload = () => db.ref('users/' + me.phone).update({ status: 'offline' });

        syncUsers();
    }

    function syncUsers() {
        db.ref('users').on('value', snap => {
            const list = document.getElementById('contacts-list');
            list.innerHTML = "";
            snap.forEach(u => {
                const user = u.val();
                if(user.phone === me.phone) return;
                
                const roomID = [me.phone, user.phone].sort().join("_");
                list.innerHTML += `
                    <div class="chat-item" onclick="openChat('${roomID}', '${user.name}', '${user.pfp}')">
                        <img src="${user.pfp}" class="pfp-small">
                        <div class="status-dot ${user.status === 'online' ? 'online' : ''}"></div>
                        <div style="flex:1; margin-right:15px">
                            <b>${user.name}</b><br>
                            <small style="color:#8696a0">${user.status === 'online' ? 'متصل الآن' : 'غير متصل'}</small>
                        </div>
                    </div>`;
            });
        });
    }

    function openChat(id, name, pfp) {
        activeChatID = id;
        document.getElementById('chat-screen').style.display = 'flex';
        document.getElementById('chat-title').innerText = name;
        document.getElementById('chat-pfp').src = pfp;

        db.ref('chats/' + id).on('value', snap => {
            const box = document.getElementById('chat-msgs');
            box.innerHTML = "";
            snap.forEach(m => {
                const msg = m.val();
                const isMe = msg.sender === me.phone;
                box.innerHTML += `<div class="bubble ${isMe ? 'me' : 'other'}">${msg.text}</div>`;
            });
            box.scrollTop = box.scrollHeight;
            if(snap.exists()) document.getElementById('msg-sound').play();
        });
    }

    function sendMsg() {
        const txt = document.getElementById('msg-input').value;
        if(!txt || !activeChatID) return;
        db.ref('chats/' + activeChatID).push({ sender: me.phone, text: txt, time: Date.now() });
        document.getElementById('msg-input').value = "";
    }

    // 4. ميزات متقدمة
    async function changePfp() {
        const { value: file } = await Swal.fire({ title: 'اختر لوجو جديد', input: 'file', inputAttributes: { accept: 'image/*' } });
        if(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                db.ref('users/' + me.phone).update({ pfp: e.target.result });
                me.pfp = e.target.result;
                localStorage.setItem('star_session', JSON.stringify(me));
                location.reload();
            };
            reader.readAsDataURL(file);
        }
    }

    function syncAdmin() {
        db.ref('users').on('value', snap => {
            const list = document.getElementById('admin-users-list');
            list.innerHTML = "";
            snap.forEach(u => {
                const user = u.val();
                if(user.role === 'admin') return;
                list.innerHTML += `<div class="admin-row">
                    <span>${user.name}</span>
                    <button onclick="db.ref('users/${user.phone}').remove()" style="background:red; color:white; padding:5px; border-radius:5px; border:none">طرد ❌</button>
                </div>`;
            });
        });
    }

    function toggleAdmin() { const p = document.getElementById('admin-panel'); p.style.display = (p.style.display === 'block') ? 'none' : 'block'; }
    function closeChat() { document.getElementById('chat-screen').style.display = 'none'; }
    function logout() { localStorage.clear(); location.reload(); }
    function requestMic() { navigator.mediaDevices.getUserMedia({ audio: true }).then(() => Swal.fire('جاهز', 'تم الوصول للميكروفون بنجاح', 'success')); }
    
    async function uploadImage(input) {
        if(input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => db.ref('chats/' + activeChatID).push({ sender: me.phone, text: `<img src="${e.target.result}" style="max-width:100%; border-radius:10px">`, time: Date.now() });
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
</body>
</html>
