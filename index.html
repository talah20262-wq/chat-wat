<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Star | الإمبراطورية</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --bg: #0b141a; --header: #202c33; --green: #25d366; --gold: #d4af37; --msg-me: #005c4b; --msg-other: #202c33; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        /* شاشة الدخول */
        .auth-screen { position: fixed; inset: 0; background: #0b141a; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .royal-card { background: #222e35; padding: 35px; border-radius: 30px; width: 90%; max-width: 420px; text-align: center; border: 2px solid var(--gold); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 16px; margin: 12px 0; border-radius: 15px; border: none; background: #2a3942; color: white; text-align: center; font-size: 18px; }
        .btn { width: 100%; padding: 16px; border-radius: 15px; border: none; cursor: pointer; font-weight: 900; font-size: 18px; transition: 0.3s; }
        .btn-green { background: var(--green); color: #000; }
        .btn-gold { background: none; color: var(--gold); border: 2px solid var(--gold); margin-top: 15px; }

        /* الهيدر */
        header { background: var(--header); padding: 18px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 100; }
        .pfp { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
        .icon-large { font-size: 28px; color: var(--gold); cursor: pointer; transition: 0.3s; }
        .icon-large:hover { transform: scale(1.1); }

        /* قائمة الشاتات */
        .list { flex: 1; overflow-y: auto; background: #111b21; padding-bottom: 20px; }
        .row { display: flex; align-items: center; padding: 18px 20px; border-bottom: 1px solid #1c282f; cursor: pointer; transition: 0.2s; }
        .row:hover { background: #1c282f; }
        .row b { font-size: 18px; color: #fff; }
        .row small { font-size: 14px; color: #8696a0; }
        .group-icon { background: var(--gold); color: #000; display: flex; align-items: center; justify-content: center; font-size: 22px; }

        /* نافذة المحادثة */
        .chat-view { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: none; flex-direction: column; }
        .chat-header { background: var(--header); padding: 15px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--gold); }
        .chat-msgs { flex: 1; overflow-y: auto; padding: 20px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; background-color: #0b141a; display: flex; flex-direction: column; gap: 10px; }
        
        .bubble { max-width: 85%; padding: 12px 18px; border-radius: 20px; font-size: 16px; line-height: 1.5; position: relative; }
        .bubble.me { align-self: flex-end; background: var(--msg-me); border-top-left-radius: 0; }
        .bubble.other { align-self: flex-start; background: var(--msg-other); border-top-right-radius: 0; }
        .bubble .sender-name { font-size: 12px; color: var(--gold); font-weight: bold; margin-bottom: 5px; display: block; }
        .bubble img { max-width: 100%; border-radius: 12px; margin-top: 8px; }

        .input-bar { background: var(--header); padding: 15px; display: flex; align-items: center; gap: 15px; }
        #text-in { flex: 1; background: #2a3942; border: none; padding: 14px 20px; border-radius: 30px; color: white; font-size: 16px; outline: none; }

        /* الإعدادات */
        #settings-menu { position: fixed; top: 90px; left: 20px; right: 20px; background: #1c282f; border: 2px solid var(--gold); border-radius: 25px; padding: 25px; z-index: 6000; display: none; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
    </style>
</head>
<body>

<audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

<div id="auth-box" class="auth-screen">
    <div class="royal-card">
        <h1 style="color:var(--gold); margin-bottom: 10px;"><i class="fas fa-star"></i> WhatsApp Star</h1>
        <p style="color:#8696a0; margin-bottom: 20px;">ادخل وسيطر على العالم الملكي</p>
        <input type="text" id="u-name" placeholder="اسمك الملكي المستعار">
        <input type="tel" id="u-phone" placeholder="رقم الموبايل">
        <button class="btn btn-green" onclick="login()">دخول الآن 🚀</button>
        <button class="btn btn-gold" onclick="adminAccess()">دخول المالك 👑</button>
    </div>
</div>

<div id="main-app" style="display:none; height: 100vh; flex-direction: column;">
    <header>
        <div style="display:flex; align-items:center; gap:15px">
            <img id="my-img" class="pfp" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
            <b id="my-display-name" style="font-size: 20px;"></b>
        </div>
        <div style="display:flex; gap:30px">
            <i class="fas fa-cog icon-large" onclick="toggleSettings()"></i>
            <i class="fas fa-sign-out-alt icon-large" style="color:#ff3b30" onclick="logout()"></i>
        </div>
    </header>

    <div id="settings-menu">
        <h3 style="text-align:center; color:var(--gold); margin-bottom:20px; font-size: 22px;">غرفة التحكم</h3>
        <button class="btn btn-gold" onclick="changePfp()">تغيير صورتك الشخصية 🖼️</button>
        <button class="btn btn-gold" style="margin-top:10px" onclick="Swal.fire('تم ضبط اللغة','العربية هي لغتك الحالية','success')">اللغة: العربية 🇪🇬</button>
        <div id="admin-only" style="display:none; margin-top:20px; border-top:1px solid #444; padding-top:15px">
            <p style="color:var(--gold); margin-bottom:10px">إدارة الرعية (للمالك فقط):</p>
            <div id="users-list-admin"></div>
        </div>
    </div>

    <div class="list">
        <div class="row" onclick="openChat('global_group', 'الجروب الملكي العام', 'group')">
            <div class="pfp group-icon"><i class="fas fa-users"></i></div>
            <div style="margin-right:15px">
                <b>الجروب الملكي العام 👑</b><br>
                <small style="color:var(--gold)">شات جماعي لكل أعضاء النجم</small>
            </div>
        </div>
        <div id="contacts"></div>
    </div>
</div>

<div id="chat-win" class="chat-view">
    <div class="chat-header">
        <i class="fas fa-arrow-right icon-large" onclick="closeChat()"></i>
        <div id="chat-pfp-box"></div>
        <b id="chat-name" style="font-size: 20px;"></b>
    </div>
    <div id="msgs-box" class="chat-msgs"></div>
    <div class="input-bar">
        <label for="img-up"><i class="fas fa-image icon-large" style="color:#8696a0"></i></label>
        <input type="file" id="img-up" style="display:none" accept="image/*" onchange="sendImage(this)">
        <input type="text" id="text-in" placeholder="اكتب رسالتك الملكية...">
        <i class="fas fa-paper-plane icon-large" style="color:var(--green)" onclick="sendText()"></i>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://talah-c12c5-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let me = JSON.parse(localStorage.getItem('star_session'));
    let activeChat = null;

    if(me) startApp();

    function login() {
        const name = document.getElementById('u-name').value;
        const phone = document.getElementById('u-phone').value;
        if(!name || !phone) return Swal.fire('خطأ','كمل بياناتك يا ملك','error');
        
        const user = { name, phone, pfp: 'https://cdn-icons-png.flaticon.com/512/149/149071.png' };
        db.ref('users/' + phone).set(user).then(() => {
            localStorage.setItem('star_session', JSON.stringify(user));
            location.reload();
        });
    }

    async function adminAccess() {
        const { value: code } = await Swal.fire({ title: 'كود المالك السري', input: 'password' });
        if(code === "2009257mama") {
            const admin = { name: 'المالك النجم 👑', phone: 'admin_001', role: 'admin', pfp: 'https://cdn-icons-png.flaticon.com/512/149/149071.png' };
            localStorage.setItem('star_session', JSON.stringify(admin));
            location.reload();
        }
    }

    function startApp() {
        document.getElementById('auth-box').style.display = 'none';
        document.getElementById('main-app').style.display = 'flex';
        document.getElementById('my-display-name').innerText = me.name;
        document.getElementById('my-img').src = me.pfp;

        if(me.role === 'admin') {
            document.getElementById('admin-only').style.display = 'block';
            syncAdmin();
        }
        
        db.ref('users').on('value', snap => {
            const cont = document.getElementById('contacts');
            cont.innerHTML = "";
            snap.forEach(u => {
                const user = u.val();
                if(user.phone === me.phone) return;
                cont.innerHTML += `
                    <div class="row" onclick="openChat('${user.phone}', '${user.name}', '${user.pfp}')">
                        <img src="${user.pfp}" class="pfp">
                        <div style="margin-right:15px"><b>${user.name}</b><br><small>متوفر الآن</small></div>
                    </div>`;
            });
        });
    }

    function openChat(target, name, type) {
        if(type === 'group') {
            activeChat = 'global_group';
            document.getElementById('chat-pfp-box').innerHTML = '<div class="pfp group-icon"><i class="fas fa-users"></i></div>';
        } else {
            activeChat = [me.phone, target].sort().join("_");
            document.getElementById('chat-pfp-box').innerHTML = `<img src="${type}" class="pfp">`;
        }

        document.getElementById('chat-win').style.display = 'flex';
        document.getElementById('chat-name').innerText = name;

        db.ref('chats/' + activeChat).off(); // فك الارتباط القديم
        db.ref('chats/' + activeChat).on('value', snap => {
            const box = document.getElementById('msgs-box');
            box.innerHTML = "";
            snap.forEach(m => {
                const d = m.val();
                const isMe = d.s === me.phone;
                box.innerHTML += `
                    <div class="bubble ${isMe ? 'me' : 'other'}">
                        ${!isMe ? `<span class="sender-name">${d.sender_name || 'عضو'}</span>` : ''}
                        ${d.t}
                    </div>`;
            });
            box.scrollTop = box.scrollHeight;
            if(snap.exists()) document.getElementById('notif-sound').play();
        });
    }

    function sendText() {
        const val = document.getElementById('text-in').value;
        if(!val) return;
        db.ref('chats/' + activeChat).push({ s: me.phone, sender_name: me.name, t: val });
        document.getElementById('text-in').value = "";
    }

    function sendImage(input) {
        if(input.files && input.files[0]) {
            const r = new FileReader();
            r.onload = (e) => db.ref('chats/' + activeChat).push({ s: me.phone, sender_name: me.name, t: `<img src="${e.target.result}">` });
            r.readAsDataURL(input.files[0]);
        }
    }

    async function changePfp() {
        const { value: file } = await Swal.fire({ title: 'اختر لوجو جديد', input: 'file', inputAttributes: { accept: 'image/*' } });
        if(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                db.ref('users/' + me.phone).update({ pfp: e.target.result });
                me.pfp = e.target.result;
                localStorage.setItem('star_session', JSON.stringify(me));
                location.reload();
            };
            reader.readAsDataURL(file);
        }
    }

    function syncAdmin() {
        db.ref('users').on('value', snap => {
            const div = document.getElementById('users-list-admin');
            div.innerHTML = "";
            snap.forEach(u => {
                if(u.val().phone !== me.phone) {
                    div.innerHTML += `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; background:#2a3942; padding:10px; border-radius:10px">
                        <span>${u.val().name}</span>
                        <button onclick="db.ref('users/${u.key}').remove()" style="color:#ff3b30; background:none; border:none; font-weight:bold">طرد ❌</button>
                    </div>`;
                }
            });
        });
    }

    function toggleSettings() {
        const s = document.getElementById('settings-menu');
        s.style.display = s.style.display === 'block' ? 'none' : 'block';
    }

    function closeChat() { document.getElementById('chat-win').style.display = 'none'; }
    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
