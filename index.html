<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tallah Ultra Chat</title>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

<style>
body{margin:0;font-family:tahoma;background:#0b141a;color:#fff}
#users .u{padding:12px;border-bottom:1px solid #222;cursor:pointer}
.chat{position:fixed;inset:0;display:none;flex-direction:column}
.top{background:#202c33;padding:10px;display:flex;gap:10px;align-items:center}
.box{flex:1;overflow:auto;padding:10px;display:flex;flex-direction:column}
.msg{padding:8px;margin:6px;border-radius:10px;max-width:75%}
.me{background:#005c4b;margin-left:auto}
.oth{background:#202c33}
.footer{display:flex;padding:10px;background:#202c33;gap:6px}
.footer input{flex:1;padding:10px;border:none;border-radius:20px}
.small{font-size:10px;opacity:.6}
.status{font-size:11px;opacity:.7}
</style>
</head>

<body>

<div id="users"></div>

<div id="chat" class="chat">
  <div class="top">
    <img id="img" style="width:40px;height:40px;border-radius:50%">
    <div>
      <div id="name"></div>
      <div id="status" class="status"></div>
    </div>
    <button onclick="closeChat()">رجوع</button>
  </div>

  <div id="box" class="box"></div>

  <div class="footer">
    <input id="inp" oninput="typing()">
    <button onclick="send()">➤</button>
  </div>
</div>

<script>

firebase.initializeApp({
  databaseURL:"https://talah-c12c5-default-rtdb.asia-southeast1.firebasedatabase.app/"
});

const db=firebase.database();

let me=JSON.parse(localStorage.getItem("me"))||{
  id:Date.now().toString(),
  name:"user"
};

localStorage.setItem("me",JSON.stringify(me));

let active=null;
let ref=null;

/* ================= USERS ================= */
db.ref("users/"+me.id).set({
  name:me.name,
  online:true,
  lastSeen:Date.now()
});

/* presence */
db.ref(".info/connected").on("value",snap=>{
  if(snap.val()){
    db.ref("users/"+me.id).update({online:true});
    db.ref("users/"+me.id).onDisconnect().update({
      online:false,
      lastSeen:Date.now()
    });
  }
});

/* load users */
db.ref("users").on("value",snap=>{
  let d=snap.val()||{};
  let x="";

  Object.keys(d).forEach(i=>{
    if(i==me.id) return;

    x+=`
      <div class="u" onclick="openChat('${i}','${d[i].name}','${d[i].online}','${d[i].lastSeen}')">
        ${d[i].name}
      </div>`;
  });

  users.innerHTML=x;
});

/* chat id */
cid=(a,b)=>[a,b].sort().join("_");

/* ================= OPEN CHAT ================= */
function openChat(id,name,online,lastSeen){
  active=id;
  chat.style.display="flex";

  nameEl=name;
  document.getElementById("name").innerText=name;

  img.src="https://cdn-icons-png.flaticon.com/512/149/149071.png";

  status.innerText=online?"Online":"آخر ظهور "+new Date(lastSeen).toLocaleTimeString();

  if(ref) ref.off();
  box.innerHTML="";

  ref=db.ref("messages/"+cid(me.id,id)).limitToLast(50);

  ref.on("child_added",s=>{
    let d=s.val();
    let k=s.key;
    let isMe=d.sender==me.id;

    box.innerHTML+=`
      <div class="msg ${isMe?'me':'oth'}">
        ${d.content}
        <div class="small">${isMe?(d.seen?'✔✔':'✔'):''}</div>
      </div>
    `;

    if(!isMe && !d.seen){
      db.ref("messages/"+cid(me.id,id)+"/"+k).update({seen:true});
    }

    box.scrollTop=999999;
  });

  /* typing */
  db.ref("typing/"+cid(me.id,id)).on("value",s=>{
    let v=s.val();
    if(v && v.user!=me.id){
      status.innerText=v.name+" يكتب الآن...";
    }
  });
}

/* ================= SEND ================= */
function send(){
  let v=inp.value;
  if(!v) return;

  db.ref("messages/"+cid(me.id,active)).push({
    sender:me.id,
    content:v,
    time:Date.now(),
    seen:false
  });

  inp.value="";
}

/* ================= TYPING ================= */
function typing(){
  db.ref("typing/"+cid(me.id,active)).set({
    user:me.id,
    name:me.name
  });

  clearTimeout(window.t);
  window.t=setTimeout(()=>{
    db.ref("typing/"+cid(me.id,active)).remove();
  },1000);
}

/* ================= CLOSE ================= */
function closeChat(){
  chat.style.display="none";
}

</script>

</body>
</html>
