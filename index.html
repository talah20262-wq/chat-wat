<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Najm WhatsApp</title>

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Najm%20WhatsApp%22,%22short_name%22:%22Najm%22,%22display%22:%22standalone%22,%22background_color%22:%22#0b141a%22,%22theme_color%22:%22#202c33%22}">

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --wa-bg: #0b141a; --wa-header: #202c33; --wa-green: #00a884;
            --wa-gold: #d4af37; --wa-text: #e9edef; --wa-muted: #8696a0;
            --wa-msg-me: #005c4b; --wa-msg-other: #202c33;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--wa-bg); color: var(--wa-text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* --- الهيدر --- */
        header { background: var(--wa-header); padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .site-info { display: flex; align-items: center; gap: 12px; }
        #site-logo { width: 38px; height: 38px; border-radius: 10px; object-fit: cover; border: 1px solid var(--wa-muted); }
        .header-icons { display: flex; gap: 20px; color: var(--wa-muted); font-size: 20px; }
        
        /* القائمة الجانبية (3 نقط) */
        .dropdown { position: absolute; top: 60px; left: 10px; background: #233138; border-radius: 8px; display: none; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 2000; min-width: 160px; }
        .dropdown-item { padding: 12px 20px; cursor: pointer; border-bottom: 1px solid #2a3942; font-size: 14px; }
        .dropdown-item:hover { background: #1c282f; }

        /* --- التبويبات --- */
        .tabs { background: var(--wa-header); display: flex; border-bottom: 1px solid #222d34; }
        .tab { flex: 1; padding: 15px; text-align: center; color: var(--wa-muted); font-weight: bold; cursor: pointer; position: relative; }
        .tab.active { color: var(--wa-green); border-bottom: 3px solid var(--wa-green); }

        /* --- المحتوى --- */
        .main-content { flex: 1; overflow-y: auto; background: var(--wa-bg); }
        .chat-row { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #222d34; cursor: pointer; }
        .user-pfp { width: 55px; height: 55px; border-radius: 50%; margin-left: 15px; background: #313d45; }
        .chat-details { flex: 1; }
        .chat-details b { display: block; font-size: 17px; margin-bottom: 4px; }
        .chat-details p { font-size: 14px; color: var(--wa-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 250px; }

        /* --- الأزرار العائمة --- */
        .fab { position: fixed; bottom: 25px; left: 25px; width: 60px; height: 60px; background: var(--wa-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #111; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; z-index: 999; }

        /* --- لوحة المالك 👑 --- */
        .admin-panel { position: fixed; inset: 0; background: var(--wa-bg); z-index: 5000; display: none; flex-direction: column; padding: 20px; overflow-y: auto; }
        .admin-card { background: #1c282f; padding: 20px; border-radius: 15px; margin-bottom: 20px; border-right: 5px solid var(--wa-gold); }
        .admin-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #2a3942; color: white; outline: none; }
        .admin-btn { width: 100%; padding: 12px; background: var(--wa-green); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 5px; }

        /* --- شاشة الدخول --- */
        .auth-screen { position: fixed; inset: 0; background: var(--wa-bg); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: #222e35; width: 100%; max-width: 400px; padding: 40px; border-radius: 25px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-screen" class="auth-screen">
    <div class="auth-card">
        <h1 style="color:var(--wa-green); margin-bottom:10px">Najm WhatsApp</h1>
        <p style="color:var(--wa-muted); margin-bottom:30px">أدخل كود الدخول الخاص بك</p>
        <input type="password" id="entry-code" class="admin-input" placeholder="كود الدخول" style="text-align: center; font-size: 20px; letter-spacing: 5px;">
        <button class="admin-btn" onclick="checkAuth()">دخول</button>
        <p id="auth-error" style="color:red; margin-top:10px; font-size:14px; display:none">الكود غير صحيح يا نجم</p>
    </div>
</div>

<header>
    <div class="site-info">
        <img id="site-logo" src="https://cdn-icons-png.flaticon.com/512/124/124034.png">
        <b id="site-title" style="font-size: 20px;">Najm WhatsApp</b>
    </div>
    <div class="header-icons">
        <i class="fas fa-search" onclick="Swal.fire('بحث','ميزة البحث قريباً','info')"></i>
        <i class="fas fa-crown hidden" id="owner-icon" onclick="toggleAdmin(true)" style="color:var(--wa-gold)"></i>
        <i class="fas fa-ellipsis-v" onclick="toggleDropdown()"></i>
        <div id="main-dropdown" class="dropdown">
            <div class="dropdown-item" onclick="openProfile()">الملف الشخصي</div>
            <div class="dropdown-item" onclick="installApp()">تثبيت كـ تطبيق</div>
            <div class="dropdown-item" style="color:red" onclick="logout()">تسجيل الخروج</div>
        </div>
    </div>
</header>

<div class="tabs">
    <div class="tab" onclick="changeTab('camera')"><i class="fas fa-camera"></i></div>
    <div class="tab active" onclick="changeTab('chats')">الدردشات</div>
    <div class="tab" onclick="changeTab('status')">الحالة</div>
    <div class="tab" onclick="changeTab('calls')">المكالمات</div>
</div>

<div class="main-content">
    <div id="content-list"></div>
</div>

<div class="fab" onclick="fabAction()"><i id="fab-icon" class="fas fa-comment-alt"></i></div>

<div id="owner-panel" class="admin-panel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
        <h2 style="color:var(--wa-gold)">لوحة المالك المطلقة 👑</h2>
        <i class="fas fa-times" onclick="toggleAdmin(false)" style="font-size:25px; cursor:pointer"></i>
    </div>

    <div class="admin-card">
        <b>تغيير هوية التطبيق (للكل)</b>
        <input type="text" id="set-site-name" class="admin-input" placeholder="اسم التطبيق الجديد">
        <input type="text" id="set-site-logo" class="admin-input" placeholder="رابط اللوجو الجديد (URL)">
        <button class="admin-btn" onclick="saveSiteIdentity()">حفظ التغييرات</button>
    </div>

    <div class="admin-card">
        <b>إضافة مستخدم (تسجيل يدوي)</b>
        <input type="text" id="new-u-name" class="admin-input" placeholder="اسم المستخدم">
        <input type="tel" id="new-u-phone" class="admin-input" placeholder="رقم الهاتف">
        <input type="text" id="new-u-code" class="admin-input" placeholder="حدد له كود دخول">
        <button class="admin-btn" style="background:var(--wa-gold); color:black" onclick="manualRegister()">تسجيل المستخدم فوراً</button>
    </div>

    <div class="admin-card" style="border-right-color: red;">
        <b>منطقة الخطر</b>
        <button class="admin-btn" style="background:red; color:white" onclick="nukeMessages()">مسح كل رسائل التطبيق 🧨</button>
    </div>
</div>

<script>
    // --- إعدادات Firebase ---
    const firebaseConfig = { databaseURL: "https://talah-c12c5-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let me = JSON.parse(localStorage.getItem('najm_user'));
    let currentTab = 'chats';

    // --- نظام الدخول ---
    function checkAuth() {
        const code = document.getElementById('entry-code').value;
        if(code === "2009257mama") { // كود المالك
            const boss = { name: "المالك نجم 👑", phone: "000", role: "admin", code: "2009257mama" };
            localStorage.setItem('najm_user', JSON.stringify(boss));
            location.reload();
        } else {
            // البحث عن كود المستخدم في القاعدة
            db.ref('users').once('value', snap => {
                let found = false;
                snap.forEach(u => {
                    const userData = u.val();
                    if(userData.loginCode === code) {
                        localStorage.setItem('najm_user', JSON.stringify(userData));
                        location.reload();
                        found = true;
                    }
                });
                if(!found) document.getElementById('auth-error').style.display = 'block';
            });
        }
    }

    if(me) {
        document.getElementById('auth-screen').style.display = 'none';
        if(me.role === 'admin') document.getElementById('owner-icon').classList.remove('hidden');
        initApp();
    }

    function initApp() {
        // تحميل إعدادات الموقع
        db.ref('settings/identity').on('value', snap => {
            const data = snap.val();
            if(data) {
                document.getElementById('site-title').innerText = data.name || "Najm WhatsApp";
                document.getElementById('site-logo').src = data.logo || "https://cdn-icons-png.flaticon.com/512/124/124034.png";
                document.title = data.name;
            }
        });
        loadChats();
    }

    // --- التبديل بين التبويبات ---
    function changeTab(t) {
        currentTab = t;
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
        
        const fabIcon = document.getElementById('fab-icon');
        if(t === 'status') {
            fabIcon.className = "fas fa-camera";
            document.getElementById('content-list').innerHTML = "<div style='padding:20px; text-align:center'>لا توجد حالات جديدة</div>";
        } else if(t === 'chats') {
            fabIcon.className = "fas fa-comment-alt";
            loadChats();
        }
    }

    function loadChats() {
        db.ref('users').on('value', snap => {
            const list = document.getElementById('content-list');
            list.innerHTML = "";
            snap.forEach(child => {
                const u = child.val();
                if(u.phone === me.phone) return;
                list.innerHTML += `
                    <div class="chat-row" onclick="startChat('${u.phone}', '${u.name}')">
                        <img src="${u.pfp}" class="user-pfp">
                        <div class="chat-details">
                            <b>${u.name}</b>
                            <p>${u.bio || 'متوفر الآن'}</p>
                        </div>
                    </div>`;
            });
        });
    }

    // --- وظائف المالك ---
    function toggleAdmin(show) { document.getElementById('owner-panel').style.display = show ? 'flex' : 'none'; }
    function toggleDropdown() { 
        const d = document.getElementById('main-dropdown');
        d.style.display = d.style.display === 'flex' ? 'none' : 'flex';
    }

    function saveSiteIdentity() {
        const name = document.getElementById('set-site-name').value;
        const logo = document.getElementById('set-site-logo').value;
        if(name || logo) {
            db.ref('settings/identity').update({ name, logo });
            Swal.fire('نجاح','تم تحديث هوية التطبيق للجميع','success');
        }
    }

    function manualRegister() {
        const name = document.getElementById('new-u-name').value;
        const phone = document.getElementById('new-u-phone').value;
        const code = document.getElementById('new-u-code').value;
        if(!name || !phone || !code) return Swal.fire('خطأ','أكمل البيانات','error');

        db.ref('users/' + phone).set({
            name, phone, loginCode: code, role: 'user', 
            pfp: 'https://cdn-icons-png.flaticon.com/512/149/149071.png',
            bio: 'استخدم Najm WhatsApp'
        }).then(() => {
            Swal.fire('تم','المستخدم جاهز للدخول بالكود الخاص به','success');
        });
    }

    function nukeMessages() {
        Swal.fire({ title: 'تدمير الرسائل؟', text: "لن تستطيع التراجع!", icon: 'warning', showCancelButton: true }).then(r => {
            if(r.isConfirmed) db.ref('messages').remove();
        });
    }

    function fabAction() {
        if(currentTab === 'status') {
            Swal.fire({ title: 'نشر حالة', input: 'file', inputAttributes: { 'accept': 'image/*' } });
        } else {
            Swal.fire('رسالة جديدة','اختر مستخدم من القائمة للدردشة','info');
        }
    }

    function logout() { localStorage.clear(); location.reload(); }
    function installApp() { Swal.fire('تثبيت','اضغط على "إضافة إلى الشاشة الرئيسية" من إعدادات المتصفح','info'); }
</script>

</body>
</html>
