<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Star | الإدارة العليا</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22WhatsApp%20Star%22,%22short_name%22:%22Star%22,%22display%22:%22standalone%22}">

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --wa-bg: #0b141a; --wa-header: #202c33; --wa-green: #00a884;
            --wa-msg-me: #005c4b; --wa-msg-other: #202c33; --wa-gold: #d4af37;
            --wa-text: #e9edef; --wa-muted: #8696a0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--wa-bg); color: var(--wa-text); height: 100vh; overflow: hidden; }

        /* شريط التثبيت الذكي */
        #install-bar { position: fixed; top: 0; left: 0; right: 0; background: var(--wa-header); padding: 10px 15px; z-index: 10000; display: none; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--wa-green); }

        /* شاشة الدخول */
        .auth-screen { position: fixed; inset: 0; background: var(--wa-bg); z-index: 9000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--wa-header); width: 90%; max-width: 400px; padding: 30px; border-radius: 20px; text-align: center; border: 1px solid var(--wa-gold); }
        .auth-input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 10px; border: none; background: #2a3942; color: white; text-align: center; outline: none; }
        .btn-king { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; background: var(--wa-green); color: #0b141a; font-size: 16px; margin-top: 5px; }

        /* الهيكل الرئيسي */
        .main-app { display: none; height: 100vh; flex-direction: column; }
        header { background: var(--wa-header); padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .nav-tabs { background: var(--wa-header); display: flex; text-align: center; border-bottom: 1px solid #222d34; }
        .tab { flex: 1; padding: 15px; color: var(--wa-muted); font-weight: bold; cursor: pointer; }
        .tab.active { color: var(--wa-green); border-bottom: 3px solid var(--wa-green); }

        /* القائمة */
        .chat-list { flex: 1; overflow-y: auto; }
        .user-row { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #222d34; cursor: pointer; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; margin-left: 15px; background: #313d45; }

        /* واجهة الشات */
        .chat-win { position: fixed; inset: 0; background: var(--wa-bg); z-index: 5000; display: none; flex-direction: column; }
        .chat-body { flex: 1; overflow-y: auto; padding: 15px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-color: rgba(11,20,26,0.92); background-blend-mode: darken; display: flex; flex-direction: column; gap: 8px; }
        .bubble { max-width: 80%; padding: 8px 12px; border-radius: 10px; font-size: 15px; position: relative; }
        .bubble.me { align-self: flex-end; background: var(--wa-msg-me); border-top-right-radius: 0; }
        .bubble.other { align-self: flex-start; background: var(--wa-msg-other); border-top-left-radius: 0; }

        /* بار الإدخال - الأزرار */
        .input-bar { background: var(--wa-header); padding: 10px; display: flex; align-items: center; gap: 10px; }
        #msg-in { flex: 1; background: #2a3942; border: none; padding: 12px; border-radius: 25px; color: white; outline: none; }
        .btn-send { width: 45px; height: 45px; background: var(--wa-green); border-radius: 50%; border: none; color: #111; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* لوحة تحكم المالك */
        .owner-panel { position: fixed; inset: 0; background: #0b141a; z-index: 8000; display: none; flex-direction: column; padding: 20px; overflow-y: auto; }
        .admin-card { background: #1c282f; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-right: 4px solid var(--wa-gold); }
    </style>
</head>
<body>

<div id="install-bar">
    <span>تثبيت التطبيق على الموبايل</span>
    <button onclick="pwaInstall()" style="padding:5px 15px; background:var(--wa-green); border:none; border-radius:5px">تثبيت</button>
</div>

<div id="auth-box" class="auth-screen">
    <div class="auth-card">
        <h1 style="color:var(--wa-green); margin-bottom:20px">WhatsApp Star</h1>
        <input type="text" id="user-name" class="auth-input" placeholder="اسمك">
        <input type="tel" id="user-phone" class="auth-input" placeholder="رقم الهاتف">
        <button class="btn-king" onclick="login()">دخول</button>
        <button class="btn-king" style="background:transparent; color:var(--wa-gold); border:1px solid var(--wa-gold)" onclick="adminLogin()">دخول المالك 👑</button>
    </div>
</div>

<div id="app-box" class="main-app">
    <header>
        <b id="site-title" style="font-size: 20px;">WhatsApp Star</b>
        <div style="display:flex; gap:20px; color:var(--wa-muted); font-size:18px">
            <i class="fas fa-search"></i>
            <i class="fas fa-crown" id="crown-btn" style="display:none; color:var(--wa-gold)" onclick="showOwnerPanel()"></i>
            <i class="fas fa-ellipsis-v"></i>
        </div>
    </header>
    <div class="nav-tabs">
        <div class="tab"><i class="fas fa-camera"></i></div>
        <div class="tab active">الدردشات</div>
        <div class="tab">الحالة</div>
        <div class="tab">المكالمات</div>
    </div>
    <div id="users-list" class="chat-list"></div>
</div>

<div id="chat-box" class="chat-win">
    <header style="background:var(--wa-header)">
        <i class="fas fa-arrow-right" onclick="closeChat()"></i>
        <img id="chat-avatar" class="avatar" style="width:38px; height:38px; margin:0">
        <div style="flex:1"><b id="chat-name"></b><br><small style="color:var(--wa-green)">متصل الآن</small></div>
        <i class="fas fa-video" onclick="fakeCall('فيديو')"></i>
        <i class="fas fa-phone" onclick="fakeCall('صوتية')"></i>
    </header>
    <div id="chat-content" class="chat-body"></div>
    <div class="input-bar">
        <i class="far fa-smile" style="font-size:24px; color:var(--wa-muted)"></i>
        <input type="text" id="msg-in" placeholder="رسالة">
        <button id="main-btn" class="btn-send" onclick="handleSend()"><i id="btn-icon" class="fas fa-microphone"></i></button>
    </div>
</div>

<div id="owner-panel" class="owner-panel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
        <h2 style="color:var(--wa-gold)">تحكم المالك 👑</h2>
        <i class="fas fa-times" onclick="this.parentElement.parentElement.style.display='none'"></i>
    </div>
    <button class="btn-king" onclick="changeName()">تغيير اسم الموقع</button>
    <button class="btn-king" style="background:#ff3b30; color:white" onclick="clearData()">مسح كل البيانات</button>
    <h3 style="margin:20px 0; color:var(--wa-green)">إدارة المستخدمين:</h3>
    <div id="admin-users"></div>
</div>

<script>
    // ربط Firebase بالداتابيز بتاعتك اللي في الصورة
    const firebaseConfig = { databaseURL: "https://talah-c12c5-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = JSON.parse(localStorage.getItem('star_user'));
    let chatID = null;
    let deferredPrompt;

    // ميزة التثبيت PWA
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault(); deferredPrompt = e;
        document.getElementById('install-bar').style.display = 'flex';
    });
    function pwaInstall() { if(deferredPrompt) deferredPrompt.prompt(); }

    if(user) launch();

    function login() {
        const n = document.getElementById('user-name').value, p = document.getElementById('user-phone').value;
        if(!n || !p) return;
        const data = { name: n, phone: p, role: 'user', pfp: 'https://cdn-icons-png.flaticon.com/512/149/149071.png' };
        db.ref('users/' + p).set(data).then(() => { localStorage.setItem('star_user', JSON.stringify(data)); location.reload(); });
    }

    async function adminLogin() {
        const { value: pass } = await Swal.fire({ title: 'كود المالك', input: 'password' });
        if(pass === "2009257mama") {
            const admin = { name: 'الإمبراطور محمد نجم 👑', phone: 'admin_01', role: 'admin' };
            localStorage.setItem('star_user', JSON.stringify(admin));
            location.reload();
        }
    }

    function launch() {
        document.getElementById('auth-box').style.display = 'none';
        document.getElementById('app-box').style.display = 'flex';
        if(user.role === 'admin') document.getElementById('crown-btn').style.display = 'block';

        db.ref('site/name').on('value', s => { if(s.val()) document.getElementById('site-title').innerText = s.val(); });

        db.ref('users').on('value', snap => {
            const list = document.getElementById('users-list');
            const adminList = document.getElementById('admin-users');
            list.innerHTML = ""; adminList.innerHTML = "";
            snap.forEach(u => {
                const d = u.val();
                if(d.phone === user.phone) return;
                list.innerHTML += `<div class="user-row" onclick="openChat('${d.phone}', '${d.name}', '${d.pfp}')">
                    <img src="${d.pfp}" class="avatar">
                    <div><b>${d.name}</b><br><small style="color:var(--wa-muted)">متصل الآن</small></div>
                </div>`;
                adminList.innerHTML += `<div class="admin-card">
                    <span>${d.name}</span>
                    <button onclick="kickUser('${d.phone}')" style="background:#ff3b30; border:none; padding:5px 10px; border-radius:5px; color:white">طرد</button>
                </div>`;
            });
        });
    }

    function openChat(id, name, pfp) {
        chatID = [user.phone, id].sort().join("_");
        document.getElementById('chat-box').style.display = 'flex';
        document.getElementById('chat-name').innerText = name;
        document.getElementById('chat-avatar').src = pfp;

        db.ref('messages/' + chatID).on('value', snap => {
            const cont = document.getElementById('chat-content');
            cont.innerHTML = "";
            snap.forEach(m => {
                const msg = m.val();
                const isMe = msg.s === user.phone;
                cont.innerHTML += `<div class="bubble ${isMe ? 'me' : 'other'}">${msg.t}</div>`;
            });
            cont.scrollTop = cont.scrollHeight;
        });
    }

    // زرار المايك يتحول لإرسال عند الكتابة
    document.getElementById('msg-in').oninput = function() {
        document.getElementById('btn-icon').className = this.value.trim() ? "fas fa-paper-plane" : "fas fa-microphone";
    };

    function handleSend() {
        const input = document.getElementById('msg-in');
        if(!input.value.trim()) return Swal.fire('الريكورد','جاري تفعيل نظام الريكورد...','info');
        db.ref('messages/' + chatID).push({ s: user.phone, t: input.value });
        input.value = "";
        input.oninput();
    }

    function showOwnerPanel() { document.getElementById('owner-panel').style.display = 'flex'; }
    function kickUser(p) { db.ref('users/' + p).remove(); }
    async function changeName() {
        const { value: n } = await Swal.fire({ title: 'اسم الموقع الجديد', input: 'text' });
        if(n) db.ref('site/name').set(n);
    }
    function clearData() { db.ref('/').remove(); location.reload(); }
    function closeChat() { document.getElementById('chat-box').style.display = 'none'; }
    function fakeCall(t) { Swal.fire('اتصال ' + t, 'جاري الاتصال...', 'success'); }
</script>
</body>
</html>
