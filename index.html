<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Najm WhatsApp Ultra</title>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/locale/ar.min.js"></script>

    <style>
        :root {
            --wa-bg: #0b141a; --wa-header: #202c33; --wa-green: #00a884;
            --wa-text: #e9edef; --wa-muted: #8696a0; --wa-msg-me: #005c4b;
            --wa-msg-other: #202c33; --wa-border: #222d34; --blue-check: #34b7f1;
            --wa-gold: #d4af37;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--wa-bg); color: var(--wa-text); height: 100vh; overflow: hidden; position: relative; }

        /* Splash & Spinner */
        #splash { position: fixed; inset: 0; background: var(--wa-bg); z-index: 20000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 50px; height: 50px; border: 3px solid var(--wa-header); border-top: 3px solid var(--wa-green); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Header & Tabs */
        header { background: var(--wa-header); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .brand { font-size: 20px; font-weight: 600; color: var(--wa-muted); }
        .header-icons { display: flex; gap: 20px; font-size: 18px; color: var(--wa-muted); cursor: pointer; }
        
        .tabs { background: var(--wa-header); display: flex; border-bottom: 1px solid var(--wa-border); }
        .tab { flex: 1; padding: 15px; text-align: center; color: var(--wa-muted); font-weight: bold; cursor: pointer; font-size: 14px; position: relative; }
        .tab.active { color: var(--wa-green); border-bottom: 3px solid var(--wa-green); }

        /* Unread Badge */
        .unread-badge { background: var(--wa-green); color: #000; font-size: 10px; border-radius: 50%; padding: 2px 6px; font-weight: bold; margin-right: 5px; }

        /* Menu Dropdown */
        .menu-drop { position: absolute; top: 55px; left: 10px; background: #233138; width: 180px; border-radius: 4px; display: none; flex-direction: column; z-index: 5000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .menu-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #2a3942; font-size: 14px; display: flex; align-items: center; gap: 10px; }
        .menu-item:hover { background: #1c282f; }

        /* Chat Rows */
        .chat-row { display: flex; padding: 12px 16px; border-bottom: 1px solid var(--wa-border); cursor: pointer; align-items: center; }
        .pfp { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; margin-left: 15px; background: #313d45; }
        .chat-info { flex: 1; }
        .chat-top { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .chat-name { font-weight: 500; font-size: 16px; }
        .chat-time { font-size: 11px; color: var(--wa-muted); }

        /* Chat Window */
        #chat-window { position: fixed; inset: 0; background: var(--wa-bg); z-index: 10000; display: none; flex-direction: column; }
        .cw-body { flex: 1; overflow-y: auto; padding: 15px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-color: rgba(11,20,26,0.92); background-blend-mode: darken; display: flex; flex-direction: column; gap: 5px; }
        .bubble { max-width: 80%; padding: 8px 12px; border-radius: 8px; font-size: 14px; position: relative; }
        .b-me { align-self: flex-end; background: var(--wa-msg-me); border-top-right-radius: 0; }
        .b-other { align-self: flex-start; background: var(--wa-msg-other); border-top-left-radius: 0; }

        /* FAB */
        .fab { position: fixed; bottom: 20px; left: 20px; width: 55px; height: 55px; background: var(--wa-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; color: #111; cursor: pointer; z-index: 99; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="splash">
    <div class="spinner"></div>
    <b style="color:var(--wa-muted); margin-top:15px">Najm WhatsApp</b>
</div>

<div id="main-app" class="hidden">
    <header>
        <div class="brand" id="dynamic-name">Najm WhatsApp</div>
        <div class="header-icons">
            <i class="fas fa-search"></i>
            <i class="fas fa-ellipsis-v" id="menu-btn" onclick="toggleMainDropdown()"></i>
            <div id="main-menu" class="menu-drop">
                <div class="menu-item" onclick="createNewGroup()"><i class="fas fa-users"></i> مجموعة جديدة</div>
                <div class="menu-item" onclick="showStarred()"><i class="fas fa-star"></i> الرسائل المميزة</div>
                <div class="menu-item" onclick="toggleAdmin(true)" id="king-icon"><i class="fas fa-crown" style="color:gold"></i> لوحة المالك</div>
                <div class="menu-item" onclick="lockApp()"><i class="fas fa-lock"></i> قفل التطبيق</div>
                <div class="menu-item" style="color:#ff5e5e" onclick="logout()"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</div>
            </div>
        </div>
    </header>

    <div class="tabs">
        <div class="tab" onclick="switchView('camera')"><i class="fas fa-camera"></i></div>
        <div class="tab active" id="t-chats" onclick="switchView('chats')">الدردشات</div>
        <div class="tab" id="t-status" onclick="switchView('status')">الحالة</div>
        <div class="tab" id="t-calls" onclick="switchView('calls')">المكالمات</div>
    </div>

    <div id="view-chats" class="view-container">
        <div id="chats-list"></div>
    </div>

    <div id="view-status" class="view-container hidden" style="padding:20px; text-align:center">
        <div class="chat-row" style="border:none">
            <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="pfp">
            <div class="chat-info"><b>حالتي</b><br><small>اضغط لإضافة حالة</small></div>
        </div>
    </div>

    <div id="view-calls" class="view-container hidden" style="padding:50px; text-align:center; color:var(--wa-muted)">
        <i class="fas fa-phone-alt" style="font-size:40px; margin-bottom:15px"></i><br>
        لا توجد مكالمات حالياً
    </div>

    <div class="fab" id="main-fab" onclick="handleFab()"><i id="fab-icon" class="fas fa-comment-alt"></i></div>
</div>

<div id="chat-window">
    <div class="cw-header" style="background:var(--wa-header); padding:10px; display:flex; align-items:center; gap:10px">
        <i class="fas fa-arrow-right" onclick="closeChat()" style="padding:10px; cursor:pointer"></i>
        <img id="cw-pfp" class="pfp" style="width:40px; height:40px; margin:0">
        <div style="flex:1">
            <b id="cw-name"></b><br>
            <small id="cw-status" style="color:var(--wa-green)">متصل الآن</small>
        </div>
        <div class="header-icons" style="font-size:18px">
            <i class="fas fa-video" onclick="callUser('فيديو')"></i>
            <i class="fas fa-phone" onclick="callUser('صوتية')"></i>
        </div>
    </div>
    <div id="cw-messages" class="cw-body"></div>
    <div class="input-bar" style="background:var(--wa-header); padding:8px; display:flex; align-items:center; gap:8px">
        <div class="input-wrap" style="flex:1; background:#2a3942; border-radius:25px; padding:5px 15px; display:flex; align-items:center">
            <input type="text" id="msg-input" placeholder="رسالة" style="flex:1; background:transparent; border:none; color:white; padding:10px; outline:none">
            <label for="img-send"><i class="fas fa-paperclip" style="cursor:pointer; color:var(--wa-muted)"></i></label>
            <input type="file" id="img-send" class="hidden" accept="image/*">
        </div>
        <button class="send-btn" onclick="sendMsg()" style="width:45px; height:45px; background:var(--wa-green); border:none; border-radius:50%; color:#111"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<div id="admin-panel" class="admin-view hidden" style="position:fixed; inset:0; background:var(--wa-bg); z-index:15000; padding:20px">
    <h2 style="color:var(--wa-gold); margin-bottom:20px">التحكم في الإمبراطورية 👑</h2>
    <div style="background:#1c282f; padding:15px; border-radius:10px; margin-bottom:15px">
        <b>إعلان عام للجميع 📢</b>
        <input type="text" id="a-announcement" class="a-input" placeholder="اكتب رسالة الإعلان هنا" style="width:100%; padding:10px; margin:10px 0; border-radius:5px">
        <button onclick="sendGlobalAlert()" style="width:100%; padding:10px; background:var(--wa-green); border:none; border-radius:5px">نشر الآن</button>
    </div>
    <button onclick="toggleAdmin(false)" style="width:100%; padding:10px; background:#444; border:none; border-radius:5px; color:white">إغلاق اللوحة</button>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://talah-c12c5-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    moment.locale('ar-sa');

    let me = JSON.parse(localStorage.getItem('najm_user_session'));
    let activeChat = null;

    window.onload = () => {
        // طلب إذن الإشعارات فوراً
        if (Notification.permission !== "granted") {
            Notification.requestPermission();
        }

        setTimeout(() => {
            document.getElementById('splash').classList.add('hidden');
            if(!me) {
                Swal.fire({
                    title: 'دخول النظام',
                    input: 'password',
                    inputPlaceholder: 'كود الدخول',
                    allowOutsideClick: false
                }).then(res => {
                    if(res.value === "248") {
                        me = { name: "المالك نجم 👑", phone: "admin", role: "admin" };
                        localStorage.setItem('najm_user_session', JSON.stringify(me));
                        location.reload();
                    } else { location.reload(); }
                });
            } else { startApp(); }
        }, 1500);
    };

    function startApp() {
        document.getElementById('main-app').classList.remove('hidden');
        if(me.role !== 'admin') document.getElementById('king-icon').style.display = 'none';

        // Presence
        db.ref('users/'+me.phone).update({ online: true, lastSeen: Date.now() });
        db.ref('users/'+me.phone).onDisconnect().update({ online: false, lastSeen: Date.now() });

        // Global Alerts Listener
        db.ref('settings/global_alert').on('value', s => {
            if(s.val() && s.val().time > (Date.now() - 10000)) {
                Swal.fire('إعلان هام', s.val().text, 'info');
            }
        });

        loadChats();
    }

    function loadChats() {
        db.ref('users').on('value', snap => {
            const list = document.getElementById('chats-list');
            list.innerHTML = "";
            snap.forEach(child => {
                const u = child.val();
                if(u.phone === me.phone) return;
                
                // الدائرة الخضراء (رسائل غير مقروءة تجريبية)
                const badge = u.online ? '<span class="unread-badge">1</span>' : '';

                list.innerHTML += `
                    <div class="chat-row" onclick="openChat('${u.phone}', '${u.name}', '${u.pfp}')">
                        <img src="${u.pfp || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="pfp">
                        <div class="chat-info">
                            <div class="chat-top"><span class="chat-name">${u.name}</span> <span class="chat-time">${moment(u.lastSeen).fromNow()}</span></div>
                            <div style="display:flex; justify-content:space-between; align-items:center">
                                <small style="color:var(--wa-muted)">${u.online ? '<span style="color:var(--wa-green)">متصل الآن</span>' : 'اضغط للدردشة'}</small>
                                ${badge}
                            </div>
                        </div>
                    </div>`;
            });
        });
    }

    // 1. وظيفة مجموعة جديدة
    function createNewGroup() {
        Swal.fire({
            title: 'إنشاء مجموعة جديدة',
            input: 'text',
            inputPlaceholder: 'اسم المجموعة',
            showCancelButton: true
        }).then(res => {
            if(res.value) Swal.fire('تم', 'تم إنشاء المجموعة بنجاح (سيتم إضافة الأعضاء قريباً)', 'success');
        });
    }

    // 2. وظيفة الرسائل المميزة
    function showStarred() {
        Swal.fire('الرسائل المميزة', 'لا توجد رسائل مميزة حالياً بنجمة', 'info');
    }

    // 3. وظيفة قفل التطبيق
    function lockApp() {
        document.body.innerHTML = `
            <div style="height:100vh; background:#0b141a; display:flex; flex-direction:column; align-items:center; justify-content:center">
                <i class="fas fa-lock" style="font-size:50px; color:var(--wa-green); margin-bottom:20px"></i>
                <button onclick="location.reload()" style="padding:10px 20px; background:var(--wa-green); border:none; border-radius:5px">إدخال رمز القفل</button>
            </div>`;
    }

    // 4. وظيفة الإعلان من لوحة المالك
    function sendGlobalAlert() {
        const txt = document.getElementById('a-announcement').value;
        if(txt) {
            db.ref('settings/global_alert').set({ text: txt, time: Date.now() });
            Swal.fire('تم', 'تم نشر الإعلان لكل المستخدمين', 'success');
        }
    }

    // 5. وظيفة المكالمات
    function callUser(type) {
        Swal.fire({
            title: `بدء مكالمة ${type}`,
            text: `جاري الاتصال بـ ${document.getElementById('cw-name').innerText}...`,
            icon: 'success',
            timer: 3000,
            showConfirmButton: false
        });
    }

    function openChat(id, name, pfp) {
        activeChat = [me.phone, id].sort().join("_");
        document.getElementById('chat-window').style.display = 'flex';
        document.getElementById('cw-name').innerText = name;
        document.getElementById('cw-pfp').src = pfp || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';

        db.ref('messages/'+activeChat).on('value', snap => {
            const box = document.getElementById('cw-messages');
            box.innerHTML = "";
            snap.forEach(m => {
                const d = m.val();
                const isMe = d.sender === me.phone;
                box.innerHTML += `
                    <div class="bubble ${isMe ? 'b-me' : 'b-other'}">
                        ${d.text}
                        <div style="font-size:9px; text-align:left; opacity:0.6; margin-top:5px">${moment(d.time).format('h:mm a')}</div>
                    </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMsg() {
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim()) return;
        db.ref('messages/'+activeChat).push({ sender: me.phone, text: inp.value, time: Date.now() });
        
        // إرسال إشعار للمستلم (محاكاة)
        if (Notification.permission === "granted") {
            new Notification("Najm WhatsApp", { body: "لديك رسالة جديدة" });
        }
        inp.value = "";
    }

    function toggleMainDropdown() {
        const m = document.getElementById('main-menu');
        m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
    }

    function switchView(v) {
        document.querySelectorAll('.view-container').forEach(el => el.classList.add('hidden'));
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.getElementById('view-'+v).classList.remove('hidden');
        document.getElementById('t-'+v).classList.add('active');
    }

    function toggleAdmin(s) { document.getElementById('admin-panel').classList.toggle('hidden', !s); }
    function closeChat() { document.getElementById('chat-window').style.display = 'none'; }
    function logout() { localStorage.clear(); location.reload(); }
</script>

</body>
</html>
