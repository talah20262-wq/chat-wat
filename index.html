<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Star</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --wa-bg: #0b141a;
            --wa-header: #0b141a;
            --wa-nav: #0b141a;
            --wa-accent: #25d366;
            --wa-secondary: #8696a0;
            --gold: #ffd700;
            --verify: #2196f3;
            --ios-font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
        }

        body, html { height: 100%; margin: 0; font-family: var(--ios-font); background-color: var(--wa-bg); color: #e9edef; overflow: hidden; }

        /* شاشة البداية */
        #auth-screen { position: fixed; inset: 0; background: #111b21; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .auth-card { background: #222e35; padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; }

        /* الهيدر العلوي */
        .top-nav { background: var(--wa-header); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; font-size: 1.3rem; }
        .wa-logo { color: #e9edef; font-weight: 600; }

        /* Tabs التنقل السفلي */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #111b21; display: flex; justify-content: space-around; padding: 10px 0; border-top: 0.5px solid #222e35; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--wa-secondary); font-size: 0.75rem; cursor: pointer; }
        .nav-item.active { color: #e9edef; }
        .nav-item i { font-size: 1.3rem; margin-bottom: 4px; }
        .badge-count { background: var(--wa-accent); color: #000; border-radius: 50%; padding: 2px 6px; font-size: 0.7rem; position: absolute; top: 5px; right: 25%; font-weight: bold; }

        /* قائمة المحادثات */
        #chats-list { height: calc(100vh - 130px); overflow-y: auto; padding-bottom: 80px; }
        .chat-row { display: flex; align-items: center; padding: 12px 16px; cursor: pointer; transition: 0.1s; position: relative; }
        .chat-row:active { background: #202c33; }
        .avatar { width: 55px; height: 55px; border-radius: 50%; background: #54656f; margin-left: 15px; object-fit: cover; }
        .chat-body { flex: 1; border-bottom: 0.1px solid #222e35; padding-bottom: 12px; }
        .chat-main { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .name { font-weight: 500; font-size: 1.05rem; display: flex; align-items: center; gap: 5px; }
        .last-msg { color: var(--wa-secondary); font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
        .time { font-size: 0.75rem; color: var(--wa-accent); }

        /* شاشة الشات الفعلي */
        #chat-window { display: none; position: fixed; inset: 0; background: var(--wa-bg); z-index: 100; flex-direction: column; }
        .chat-header { background: #202c33; padding: 8px 12px; display: flex; align-items: center; gap: 10px; }
        #msg-container { flex: 1; overflow-y: auto; padding: 15px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); display: flex; flex-direction: column; gap: 5px; }
        
        .bubble { max-width: 85%; padding: 8px 12px; border-radius: 12px; font-size: 1rem; position: relative; }
        .me { align-self: flex-end; background: #005c4b; border-top-right-radius: 2px; }
        .other { align-self: flex-start; background: #202c33; border-top-left-radius: 2px; }
        .bubble .info { font-size: 0.65rem; color: #8696a0; float: left; margin-top: 5px; }
        .sender-name { font-size: 0.75rem; font-weight: bold; color: #34b7f1; display: block; }

        /* شريط الكتابة */
        .input-area { background: #202c33; padding: 8px 12px; display: flex; align-items: center; gap: 10px; }
        .input-wrap { flex: 1; background: #2a3942; border-radius: 25px; padding: 8px 15px; display: flex; align-items: center; }
        #msg-input { flex: 1; background: transparent; border: none; color: white; outline: none; }
        .btn-send { background: var(--wa-accent); border: none; width: 45px; height: 45px; border-radius: 50%; color: #000; cursor: pointer; }

        /* ستايلات المالك */
        .owner-tag { color: var(--gold) !important; font-weight: bold; }
        .verified { color: var(--verify); font-size: 0.9rem; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card" id="gate">
        <h2 style="color:var(--wa-accent)">WhatsApp Star</h2>
        <button onclick="showF('l-f')" style="width:100%; padding:15px; background:var(--wa-accent); border:none; border-radius:30px; font-weight:bold; margin-top:20px">تسجيل الدخول</button>
        <p onclick="showF('o-f')" style="margin-top:20px; color:var(--wa-secondary); cursor:pointer">بوابة المالك</p>
    </div>
    <div id="l-f" class="auth-card" style="display:none">
        <input type="text" id="phone" placeholder="رقم الموبايل">
        <input type="text" id="code" placeholder="كود التفعيل">
        <button onclick="doLogin()" style="width:100%; padding:12px; background:var(--wa-accent); border:none; border-radius:30px; margin-top:10px">دخول</button>
    </div>
    <div id="o-f" class="auth-card" style="display:none">
        <input type="password" id="pass" placeholder="كلمة السر">
        <button onclick="doOwner()" style="width:100%; padding:12px; background:var(--gold); border:none; border-radius:30px; margin-top:10px">دخول المالك</button>
    </div>
</div>

<div id="wa-main" style="display:none; flex-direction:column; height:100vh;">
    <div class="top-nav">
        <span class="wa-logo">WhatsApp</span>
        <div style="display:flex; gap:20px">
            <i class="fas fa-camera"></i>
            <i class="fas fa-search"></i>
            <i class="fas fa-ellipsis-v"></i>
        </div>
    </div>

    <div id="chats-list">
        <div class="chat-row" onclick="openChat('public', 'جروب النجم')">
            <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="avatar" style="border: 1.5px solid var(--gold)">
            <div class="chat-body">
                <div class="chat-main">
                    <span class="name">جروب النجم <i class="fas fa-certificate verified"></i></span>
                    <span class="time">12:00 م</span>
                </div>
                <div class="chat-main">
                    <span class="last-msg" id="p-last">مرحباً بك في جروب النجم..</span>
                    <i class="fas fa-thumbtack" style="color:var(--wa-secondary); font-size:0.8rem; transform: rotate(45deg);"></i>
                </div>
            </div>
        </div>
        <div id="private-list-area"></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active"><div style="position:relative"><i class="fas fa-comment"></i><span class="badge-count">1</span></div>محادثات</div>
        <div class="nav-item"><i class="fas fa-circle-notch"></i>المستجدات</div>
        <div class="nav-item"><i class="fas fa-users"></i>المجتمعات</div>
        <div class="nav-item"><i class="fas fa-phone"></i>المكالمات</div>
    </div>
</div>

<div id="chat-window">
    <div class="chat-header">
        <i class="fas fa-arrow-right" onclick="closeChat()"></i>
        <img id="active-avatar" src="" width="38" height="38" style="border-radius:50%">
        <div style="flex:1">
            <b id="active-name"></b><br>
            <small style="color:var(--wa-accent)">متصل الآن</small>
        </div>
        <div style="display:flex; gap:18px; font-size:1.1rem; color:#fff">
            <i class="fas fa-video"></i>
            <i class="fas fa-phone"></i>
            <i class="fas fa-ellipsis-v"></i>
        </div>
    </div>
    <div id="msg-container"></div>
    <div class="input-area">
        <div class="input-wrap">
            <i class="far fa-smile" style="color:var(--wa-secondary); margin-right:5px"></i>
            <input type="text" id="msg-input" placeholder="رسالة">
            <i class="fas fa-paperclip" style="color:var(--wa-secondary); margin:0 10px"></i>
            <i class="fas fa-camera" style="color:var(--wa-secondary)"></i>
        </div>
        <button class="btn-send" onclick="send()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://groop-27edc-default-rtdb.europe-west1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = JSON.parse(localStorage.getItem('wa_pro_session'));
    let currentPath = "msgs";

    if(user) launch();

    function showF(id) {
        document.querySelectorAll('.auth-card').forEach(c => c.style.display='none');
        document.getElementById(id).style.display='block';
    }

    function doOwner() {
        if(document.getElementById('pass').value === "2009257mama") {
            saveS({ name: "النجم", role: "admin", phone: "admin", style: "owner-tag" });
        }
    }

    function doLogin() {
        const p = document.getElementById('phone').value;
        const c = document.getElementById('code').value;
        db.ref('users').child(p).once('value', s => {
            if(s.val() && s.val().code === c) saveS(s.val());
            else Swal.fire('بيانات خطأ');
        });
    }

    function saveS(d) { localStorage.setItem('wa_pro_session', JSON.stringify(d)); location.reload(); }

    function launch() {
        document.getElementById('auth-screen').style.display='none';
        document.getElementById('wa-main').style.display='flex';
        loadPrivateUsers();
        db.ref('msgs').limitToLast(1).on('child_added', s => {
            document.getElementById('p-last').innerText = s.val().n + ": " + s.val().b;
        });
    }

    function openChat(type, name) {
        currentPath = type === 'public' ? 'msgs' : 'private/' + type;
        document.getElementById('active-name').innerText = name;
        document.getElementById('active-avatar').src = "https://cdn-icons-png.flaticon.com/512/149/149071.png";
        document.getElementById('chat-window').style.display='flex';
        listenMsgs();
    }

    function closeChat() { document.getElementById('chat-window').style.display='none'; }

    function send() {
        const inp = document.getElementById('msg-input');
        if(!inp.value) return;
        db.ref(currentPath).push({
            n: user.name, b: inp.value, s: user.style || "",
            t: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
            v: [user.name]
        });
        inp.value = "";
    }

    function listenMsgs() {
        db.ref(currentPath).off();
        db.ref(currentPath).on('value', s => {
            const box = document.getElementById('msg-container');
            box.innerHTML = "";
            s.forEach(m => {
                const d = m.val();
                const isMe = d.n === user.name;
                box.innerHTML += `
                    <div class="bubble ${isMe?'me':'other'}" oncontextmenu="adminAction(event, '${m.key}', '${d.b}')" onclick="adminAction(event, '${m.key}', '${d.b}')">
                        <span class="sender-name ${d.s}">${d.n}</span>
                        <div>${d.b}</div>
                        <div class="info">${d.t} ${user.role==='admin' && d.v ? '• شاهده '+Object.keys(d.v).length : ''}</div>
                    </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    // صلاحيات المالك
    window.adminAction = (e, key, body) => {
        if(user.role !== 'admin') return;
        e.preventDefault();
        Swal.fire({
            title: 'تحكم النجم',
            showDenyButton: true,
            confirmButtonText: 'تعديل',
            denyButtonText: 'حذف'
        }).then(r => {
            if(r.isConfirmed) {
                Swal.fire({input:'text', inputValue:body}).then(res => {
                    if(res.value) db.ref(currentPath).child(key).update({b: res.value});
                });
            } else if(r.isDenied) {
                db.ref(currentPath).child(key).remove();
            }
        });
    }

    function loadPrivateUsers() {
        db.ref('users').on('value', s => {
            const list = document.getElementById('private-list-area');
            list.innerHTML = "";
            s.forEach(u => {
                if(u.val().phone !== user.phone) {
                    const room = [user.phone, u.val().phone].sort().join("_");
                    list.innerHTML += `
                        <div class="chat-row" onclick="openChat('${room}', '${u.val().name}')">
                            <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="avatar">
                            <div class="chat-body">
                                <div class="chat-main"><span class="name">${u.val().name}</span><span class="time">أمس</span></div>
                                <div class="last-msg">انقر لمراسلة ${u.val().name} خاص</div>
                            </div>
                        </div>`;
                }
            });
        });
    }
</script>
</body>
</html>
