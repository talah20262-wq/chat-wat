<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Star | السهل السريع</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --wa-bg: #0b141a; --wa-header: #202c33; --green: #25d366; --gold: #ffd700; }
        body, html { height: 100%; margin: 0; font-family: sans-serif; background: var(--wa-bg); color: white; overflow: hidden; }

        /* بوابة الدخول المبسطة */
        #auth-screen { position: fixed; inset: 0; background: #111b21; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .card { background: #222e35; padding: 25px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; border: 1px solid #333; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: none; outline: none; }
        input { background: #2a3942; color: white; text-align: center; }
        .btn-green { background: var(--green); color: black; font-weight: bold; cursor: pointer; }
        .btn-admin { background: none; color: var(--gold); border: 1px solid var(--gold); cursor: pointer; margin-top: 10px; }

        /* الواجهة الرئيسية */
        .app-container { display: none; height: 100vh; flex-direction: column; }
        .top-bar { background: var(--wa-header); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .search-area { background: #111b21; padding: 10px; }
        .search-area input { background: #202c33; border-radius: 8px; width: 90%; padding: 8px; color: white; border: none; outline: none; }

        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; align-items: center; padding: 15px; border-bottom: 0.5px solid #222e35; cursor: pointer; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: #54656f; margin-left: 15px; }

        /* نافذة الشات */
        #chat-window { display: none; position: fixed; inset: 0; background: var(--wa-bg); z-index: 5000; flex-direction: column; }
        #msg-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .msg { max-width: 75%; padding: 10px; border-radius: 10px; font-size: 0.9rem; line-height: 1.4; }
        .msg.me { align-self: flex-end; background: #005c4b; }
        .msg.other { align-self: flex-start; background: #202c33; }

        .input-box { background: #202c33; padding: 10px; display: flex; align-items: center; gap: 10px; }
        
        /* لوحة المالك */
        #admin-panel { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; padding: 20px; overflow-y: auto; }
        .req-item { background: #111; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid var(--gold); display: flex; justify-content: space-between; }
        
        .hidden { display: none !important; }
        .gold { color: var(--gold) !important; font-weight: bold; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="card" id="login-card">
        <h2 style="color:var(--green)">WhatsApp Star</h2>
        <input type="text" id="user-name" placeholder="اكتب اسمك">
        <input type="text" id="user-phone" placeholder="رقم الموبايل">
        <button class="btn-green" onclick="startApp()">دخول سريع</button>
        <button class="btn-admin" onclick="showAdminLogin()">بوابة المالك</button>
    </div>
</div>

<div id="admin-panel">
    <h2 class="gold">لوحة تحكم النجم</h2>
    <div id="requests-list"></div>
    <button class="btn-green" onclick="location.reload()">خروج من اللوحة</button>
</div>

<div id="app-container" class="app-container">
    <div class="top-bar">
        <b id="display-name">WhatsApp Star</b>
        <i class="fas fa-sign-out-alt" onclick="localStorage.clear(); location.reload();"></i>
    </div>
    
    <div class="search-area">
        <input type="text" placeholder="بحث عن شخص بالاسم..." oninput="filterUsers(this.value)">
    </div>

    <div class="chat-list">
        <div class="chat-item" onclick="openChat('star_ai', 'النجم AI')">
            <div class="avatar" style="background:var(--gold); display:flex; align-items:center; justify-content:center;"><i class="fas fa-robot" style="color:black"></i></div>
            <div><b class="gold">النجم AI</b><br><small>مساعدك الذكي (Gemini)</small></div>
        </div>
        <div id="users-list"></div>
    </div>
</div>

<div id="chat-window">
    <div class="top-bar">
        <div style="display:flex; align-items:center; gap:10px">
            <i class="fas fa-arrow-right" onclick="closeChat()"></i>
            <b id="active-name"></b>
        </div>
    </div>
    <div id="msg-container"></div>
    <div class="input-box">
        <i class="fas fa-microphone" id="mic" onclick="recordAudio()"></i>
        <input type="text" id="msg-input" placeholder="اكتب رسالة..." style="flex:1; background:#2a3942; border:none; padding:10px; border-radius:20px; color:white;">
        <button onclick="sendMsg()" style="background:var(--green); border:none; width:45px; height:45px; border-radius:50%"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
    // ربط الفايربيس
    const firebaseConfig = { databaseURL: "https://groop-27edc-default-rtdb.europe-west1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let me = JSON.parse(localStorage.getItem('star_user')), currentPath = "", allUsers = [], recorder, chunks = [];

    if(me) launch();

    function startApp() {
        const n = document.getElementById('user-name').value;
        const p = document.getElementById('user-phone').value;
        if(!n || !p) return Swal.fire('اكتب اسمك ورقمك');

        // فحص هل العضو مقبول
        db.ref('users').child(p).once('value', s => {
            if(s.val()) {
                me = s.val();
                localStorage.setItem('star_user', JSON.stringify(me));
                launch();
            } else {
                db.ref('requests').child(p).set({name:n, phone:p});
                Swal.fire('تم إرسال الطلب', 'انتظر موافقة النجم (المالك) لفتح حسابك', 'info');
            }
        });
    }

    function launch() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-container').style.display = 'flex';
        document.getElementById('display-name').innerText = me.name;
        loadUsers();
    }

    function loadUsers() {
        db.ref('users').on('value', s => {
            allUsers = [];
            s.forEach(u => allUsers.push(u.val()));
            renderUsers(allUsers);
        });
    }

    function renderUsers(list) {
        const container = document.getElementById('users-list');
        container.innerHTML = "";
        list.forEach(u => {
            if(u.phone !== me.phone) {
                const room = [me.phone, u.phone].sort().join("_");
                container.innerHTML += `
                <div class="chat-item" onclick="openChat('${room}', '${u.name}')">
                    <div class="avatar"></div>
                    <div><b>${u.name}</b><br><small style="color:#8696a0">${u.bio || 'متوفر'}</small></div>
                </div>`;
            }
        });
    }

    function filterUsers(val) {
        const filtered = allUsers.filter(u => u.name.includes(val));
        renderUsers(filtered);
    }

    function openChat(path, name) {
        currentPath = path;
        document.getElementById('active-name').innerText = name;
        document.getElementById('chat-window').style.display = 'flex';
        db.ref('msgs/' + path).on('value', s => {
            const box = document.getElementById('msg-container');
            box.innerHTML = "";
            s.forEach(m => {
                const d = m.val();
                let body = d.type === 'voice' ? `<audio src="${d.b}" controls style="width:180px"></audio>` : d.b;
                box.innerHTML += `<div class="msg ${d.n === me.name ? 'me' : 'other'}"><b>${d.n}:</b><br>${body}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMsg() {
        const inp = document.getElementById('msg-input');
        if(!inp.value) return;
        db.ref('msgs/' + currentPath).push({n: me.name, b: inp.value, type: 'text'});
        
        // ذكاء اصطناعي بسيط لو بيكلم البوت
        if(currentPath === 'star_ai') {
            setTimeout(() => {
                db.ref('msgs/star_ai').push({n: 'النجم AI', b: 'أهلاً بك يا ' + me.name + '! أنا مساعدك الذكي، كيف حالك؟', type: 'text'});
            }, 800);
        }
        inp.value = "";
    }

    async function recordAudio() {
        const mic = document.getElementById('mic');
        if(!recorder || recorder.state === 'inactive') {
            const stream = await navigator.mediaDevices.getUserMedia({audio:true});
            recorder = new MediaRecorder(stream);
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const reader = new FileReader();
                reader.readAsDataURL(new Blob(chunks));
                reader.onloadend = () => db.ref('msgs/' + currentPath).push({n: me.name, b: reader.result, type: 'voice'});
                chunks = [];
            };
            recorder.start();
            mic.style.color = 'red';
        } else {
            recorder.stop();
            mic.style.color = 'white';
        }
    }

    function closeChat() { document.getElementById('chat-window').style.display = 'none'; }

    // --- نظام المالك ---
    function showAdminLogin() {
        Swal.fire({ title: 'باسورد المالك', input: 'password' }).then(r => {
            if(r.value === "2009257mama") {
                document.getElementById('admin-panel').style.display = 'block';
                loadRequests();
            }
        });
    }

    function loadRequests() {
        db.ref('requests').on('value', s => {
            const list = document.getElementById('requests-list');
            list.innerHTML = "";
            s.forEach(req => {
                const u = req.val();
                list.innerHTML += `
                <div class="req-item">
                    <span>${u.name} (${u.phone})</span>
                    <button class="btn-green" style="width:80px" onclick="approveUser('${u.phone}', '${u.name}')">موافقة</button>
                </div>`;
            });
        });
    }

    function approveUser(p, n) {
        db.ref('users').child(p).set({name:n, phone:p, role:'user'}).then(() => {
            db.ref('requests').child(p).remove();
        });
    }
</script>
</body>
</html>
