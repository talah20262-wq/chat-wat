<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Star | واتساب النجم</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --main-bg: #0b141a; --accent: #00a884; --card-bg: #222e35; --text: #e9edef; }
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--main-bg); color: var(--text); }
        
        /* شاشة البداية */
        #auth-screen { position: fixed; inset: 0; background: #111b21; display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; }
        .auth-card { background: var(--card-bg); padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .auth-btn { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-owner { background: var(--accent); color: white; }
        .btn-user { background: #3b4a54; color: white; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; background: #2a3942; color: white; box-sizing: border-box; }

        /* واجهة التطبيق */
        #main-app { display: none; height: 100vh; flex-direction: column; }
        header { background: #202c33; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); display: flex; flex-direction: column; gap: 10px; }
        
        .msg { max-width: 75%; padding: 10px; border-radius: 12px; font-size: 0.95rem; }
        .sent { align-self: flex-end; background: #005c4b; }
        .received { align-self: flex-start; background: #202c33; }

        .input-bar { background: #202c33; padding: 10px; display: flex; align-items: center; gap: 10px; }
        .icon-btn { color: #8696a0; font-size: 1.5rem; cursor: pointer; }
        
        #admin-panel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; display: none; padding: 20px; box-sizing: border-box; overflow-y: auto; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card" id="main-gate">
        <h2 style="color:var(--accent)">واتساب النجم</h2>
        <button class="auth-btn btn-owner" onclick="showOwnerLogin()">تسجيل دخول المالك</button>
        <button class="auth-btn btn-user" onclick="showUserSignup()">إنشاء حساب جديد</button>
        <button class="auth-btn btn-user" style="background:#005c4b" onclick="showUserLogin()">دخول المستخدمين (بالكود)</button>
    </div>

    <div class="auth-card" id="owner-login" style="display:none">
        <h3>دخول المالك</h3>
        <input type="password" id="owner-pass" placeholder="أدخل كود المالك السري">
        <button class="auth-btn btn-owner" onclick="processOwner()">دخول</button>
        <p onclick="backToGate()" style="cursor:pointer; font-size:0.8rem">رجوع</p>
    </div>

    <div class="auth-card" id="user-signup" style="display:none">
        <h3>طلب انضمام</h3>
        <input type="text" id="reg-name" placeholder="الاسم">
        <input type="text" id="reg-phone" placeholder="رقم الهاتف">
        <button class="auth-btn btn-owner" onclick="processSignup()">إرسال الطلب</button>
        <p onclick="backToGate()" style="cursor:pointer; font-size:0.8rem">رجوع</p>
    </div>

    <div class="auth-card" id="user-login" style="display:none">
        <h3>دخول الجروب</h3>
        <input type="text" id="log-phone" placeholder="رقم الهاتف">
        <input type="text" id="log-code" placeholder="الكود السري الذي استلمته">
        <button class="auth-btn btn-owner" onclick="processUserLogin()">دخول</button>
        <p onclick="backToGate()" style="cursor:pointer; font-size:0.8rem">رجوع</p>
    </div>
</div>

<div id="main-app">
    <header>
        <b id="display-name">واتساب النجم</b>
        <div style="display:flex; gap:15px">
            <i id="admin-icon" class="fas fa-users-cog" style="display:none; cursor:pointer" onclick="toggleAdminPanel(true)"></i>
            <i class="fas fa-sign-out-alt" onclick="localStorage.clear(); location.reload();"></i>
        </div>
    </header>
    <div id="chat-box"></div>
    <div class="input-bar">
        <input type="text" id="msg-input" placeholder="اكتب رسالة...">
        <i class="fas fa-paper-plane icon-btn" style="color:var(--accent)" onclick="sendMessage()"></i>
    </div>
</div>

<div id="admin-panel">
    <div style="display:flex; justify-content:space-between; align-items:center">
        <h2>طلبات الانضمام</h2>
        <button onclick="toggleAdminPanel(false)" style="padding:10px">إغلاق</button>
    </div>
    <div id="requests-list"></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://groop-27edc-default-rtdb.europe-west1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = JSON.parse(localStorage.getItem('star_session'));
    if(user) startApp();

    // --- توجيه الواجهات ---
    function showOwnerLogin() { hideAll(); document.getElementById('owner-login').style.display='block'; }
    function showUserSignup() { hideAll(); document.getElementById('user-signup').style.display='block'; }
    function showUserLogin() { hideAll(); document.getElementById('user-login').style.display='block'; }
    function backToGate() { hideAll(); document.getElementById('main-gate').style.display='block'; }
    function hideAll() { ['main-gate','owner-login','user-signup','user-login'].forEach(id => document.getElementById(id).style.display='none'); }

    // --- العمليات ---
    function processOwner() {
        if(document.getElementById('owner-pass').value === "2009257mama") {
            const data = { name: "المالك", role: "admin" };
            localStorage.setItem('star_session', JSON.stringify(data));
            location.reload();
        } else { Swal.fire('الكود خطأ'); }
    }

    function processSignup() {
        const name = document.getElementById('reg-name').value;
        const phone = document.getElementById('reg-phone').value;
        if(!name || !phone) return;
        db.ref('requests').child(phone).set({ name, phone, status: 'pending' }).then(() => {
            Swal.fire('تم الإرسال', 'تواصل مع المالك للحصول على كود الدخول الخاص بك', 'success');
            backToGate();
        });
    }

    function processUserLogin() {
        const phone = document.getElementById('log-phone').value;
        const code = document.getElementById('log-code').value;
        db.ref('users').child(phone).once('value', s => {
            const data = s.val();
            if(data && data.secretCode === code) {
                localStorage.setItem('star_session', JSON.stringify(data));
                location.reload();
            } else { Swal.fire('الكود أو الرقم غير صحيح'); }
        });
    }

    function startApp() {
        user = JSON.parse(localStorage.getItem('star_session'));
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'flex';
        document.getElementById('display-name').innerText = user.name;
        if(user.role === 'admin') {
            document.getElementById('admin-icon').style.display = 'block';
            loadRequests();
        }
        loadChat();
    }

    function loadRequests() {
        db.ref('requests').on('value', s => {
            const list = document.getElementById('requests-list');
            list.innerHTML = "";
            s.forEach(req => {
                const r = req.val();
                list.innerHTML += `
                    <div style="background:#2a3942; padding:15px; border-radius:10px; margin-bottom:10px">
                        <p>الاسم: ${r.name} | الرقم: ${r.phone}</p>
                        <input type="text" id="code-${r.phone}" placeholder="اكتب كود دخول له">
                        <button onclick="approveUser('${r.phone}', '${r.name}')">إرسال الكود وتفعيل الحساب</button>
                    </div>`;
            });
        });
    }

    window.approveUser = (phone, name) => {
        const code = document.getElementById(`code-${phone}`).value;
        if(!code) return Swal.fire('اكتب كود أولاً');
        db.ref('users').child(phone).set({ name, phone, secretCode: code, role: 'user' }).then(() => {
            db.ref('requests').child(phone).remove();
            Swal.fire('تم التفعيل', 'أعطي هذا الكود للمستخدم: ' + code, 'success');
        });
    }

    function sendMessage() {
        const inp = document.getElementById('msg-input');
        if(!inp.value) return;
        db.ref('messages').push({ name: user.name, body: inp.value, time: new Date().toLocaleTimeString() });
        inp.value = "";
    }

    function loadChat() {
        db.ref('messages').limitToLast(50).on('value', s => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            s.forEach(m => {
                const d = m.val();
                const isMe = d.name === user.name;
                box.innerHTML += `<div class="msg ${isMe?'sent':'received'}"><b>${d.name}</b><br>${d.body}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function toggleAdminPanel(show) { document.getElementById('admin-panel').style.display = show ? 'block' : 'none'; }
</script>
</body>
</html>
