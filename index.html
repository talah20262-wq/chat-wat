<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Star Ultimate</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --bg: #0b141a; --header: #202c33; --green: #25d366; --gold: #ffd700; --blue: #34b7f1; }
        body, html { height: 100%; margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: white; overflow: hidden; }
        
        /* الهيدر والقصص */
        .top-nav { background: var(--header); padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .stories-bar { display: flex; gap: 10px; padding: 15px; overflow-x: auto; border-bottom: 0.5px solid #222e35; }
        .st-circle { min-width: 65px; height: 65px; border-radius: 50%; border: 2px solid var(--green); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; background: #202c33; cursor: pointer; text-align: center; }
        
        /* القائمة والشات */
        .chat-list { height: calc(100vh - 180px); overflow-y: auto; }
        .chat-row { display: flex; align-items: center; padding: 15px; border-bottom: 0.5px solid #222e35; cursor: pointer; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: #54656f; margin-left: 12px; }
        
        /* نافذة الشات */
        #chat-window { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 1000; flex-direction: column; }
        #msg-container { flex: 1; overflow-y: auto; padding: 15px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); display: flex; flex-direction: column; gap: 8px; }
        
        /* فقاعات الرسائل */
        .bubble { max-width: 80%; padding: 8px 12px; border-radius: 12px; font-size: 0.95rem; line-height: 1.4; }
        .me { align-self: flex-end; background: #005c4b; border-top-right-radius: 2px; }
        .other { align-self: flex-start; background: #202c33; border-top-left-radius: 2px; }
        
        /* شريط الأدوات */
        .input-bar { background: #202c33; padding: 10px; display: flex; align-items: center; gap: 8px; }
        .in-box { flex: 1; background: #2a3942; border-radius: 25px; padding: 8px 15px; display: flex; align-items: center; }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; }
        .btn-act { background: var(--green); border: none; width: 45px; height: 45px; border-radius: 50%; color: #000; cursor: pointer; }
        .rec-active { color: #ff4b4b; animation: pulse 1s infinite; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .gold-txt { color: var(--gold) !important; font-weight: bold; }
        .v-badge { color: var(--blue); font-size: 0.8rem; }
    </style>
</head>
<body>

<div id="auth-gate" style="position:fixed; inset:0; background:#111b21; z-index:9999; display:flex; align-items:center; justify-content:center;">
    <div style="background:#222e35; padding:30px; border-radius:20px; width:85%; max-width:320px; text-align:center;">
        <h2 id="app-name" style="color:var(--green)">تحميل...</h2>
        <input type="text" id="u-phone" placeholder="رقم الهاتف">
        <input type="text" id="u-code" placeholder="الكود">
        <button onclick="loginUser()" style="width:100%; padding:12px; border-radius:25px; border:none; background:var(--green); font-weight:bold; margin-top:10px;">دخول</button>
        <p onclick="ownerEntry()" style="color:#8696a0; margin-top:15px; cursor:pointer">بوابة النجم</p>
    </div>
</div>

<div id="app-ui" style="display:none">
    <div class="top-nav">
        <b id="head-title">WhatsApp</b>
        <div style="display:flex; gap:18px"><i class="fas fa-camera"></i><i class="fas fa-search"></i><i class="fas fa-ellipsis-v"></i></div>
    </div>

    <div class="stories-bar" id="stories-list">
        <div class="st-circle" onclick="postStory()" style="border-style:dashed; border-color:#8696a0">أضف حالة</div>
    </div>

    <div class="chat-list">
        <div id="pinned-chat-area"></div>
        <div id="users-list"></div>
    </div>
</div>

<div id="chat-window">
    <header class="top-nav">
        <div style="display:flex; align-items:center; gap:10px">
            <i class="fas fa-arrow-right" onclick="location.reload()"></i>
            <b id="active-user-name"></b>
        </div>
        <div style="display:flex; gap:20px">
            <i class="fas fa-video" onclick="startCall('video')"></i>
            <i class="fas fa-phone" onclick="startCall('audio')"></i>
        </div>
    </header>
    <div id="msg-container"></div>
    <div class="input-bar">
        <i class="fas fa-microphone" id="rec-btn" style="font-size:1.2rem; cursor:pointer" onclick="toggleRecord()"></i>
        <div class="in-box"><input type="text" id="msg-input" placeholder="رسالة"></div>
        <button class="btn-act" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://groop-27edc-default-rtdb.europe-west1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let appData = {}, user = JSON.parse(localStorage.getItem('star_pro_user')), currentPath = "";
    let mediaRecorder, audioChunks = [];

    async function init() {
        try {
            const res = await fetch('data.json');
            appData = await res.json();
            document.getElementById('app-name').innerText = appData.settings.appName;
            document.getElementById('head-title').innerText = appData.settings.appName;
            if(user) launch();
        } catch(e) { Swal.fire('خطأ في ملف data.json'); }
    }

    function launch() {
        document.getElementById('auth-gate').style.display = 'none';
        document.getElementById('app-ui').style.display = 'block';
        loadPinned();
        loadStories();
        loadUsers();
    }

    function loadPinned() {
        const p = appData.pinnedGroup;
        document.getElementById('pinned-chat-area').innerHTML = `
            <div class="chat-row" onclick="openChat('public', '${p.name}')">
                <div class="avatar" style="border:2px solid var(--gold)"></div>
                <div style="flex:1">
                    <b class="${p.isVerified?'gold-txt':''}">${p.name} ${p.isVerified?'<i class="fas fa-check-circle v-badge"></i>':''}</b>
                    <div style="font-size:0.8rem; color:#8696a0">${p.description}</div>
                </div>
            </div>`;
    }

    function openChat(path, name) {
        currentPath = path === 'public' ? 'msgs' : 'private/' + path;
        document.getElementById('active-user-name').innerText = name;
        document.getElementById('chat-window').style.display = 'flex';
        db.ref(currentPath).on('value', s => {
            const box = document.getElementById('msg-container'); box.innerHTML = "";
            s.forEach(m => {
                const d = m.val();
                if(d.type === 'voice') {
                    box.innerHTML += `<div class="bubble ${d.n===user.name?'me':'other'}">
                        <small class="gold-txt">${d.n}</small><br>
                        <audio controls src="${d.b}" style="width:200px"></audio>
                    </div>`;
                } else {
                    box.innerHTML += `<div class="bubble ${d.n===user.name?'me':'other'}">
                        <small class="gold-txt">${d.n}</small><br>${d.b}</div>`;
                }
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    // --- نظام الريكورد (الصوت) ---
    async function toggleRecord() {
        const btn = document.getElementById('rec-btn');
        if (!mediaRecorder || mediaRecorder.state === "inactive") {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/ogg' });
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = () => {
                    db.ref(currentPath).push({ n: user.name, b: reader.result, type: 'voice' });
                };
                audioChunks = [];
            };
            mediaRecorder.start();
            btn.classList.add('rec-active');
        } else {
            mediaRecorder.stop();
            btn.classList.remove('rec-active');
        }
    }

    function sendMsg() {
        const i = document.getElementById('msg-input'); if(!i.value) return;
        db.ref(currentPath).push({ n: user.name, b: i.value, type: 'text' });
        i.value = "";
    }

    function postStory() {
        Swal.fire({ title: 'حالة جديدة', input: 'text' }).then(r => {
            if(r.value) db.ref('stories').push({ n: user.name, b: r.value, t: Date.now() });
        });
    }

    function loadStories() {
        db.ref('stories').on('value', s => {
            const area = document.getElementById('stories-list');
            area.innerHTML = `<div class="st-circle" onclick="postStory()" style="border-style:dashed">حالتك</div>`;
            s.forEach(st => {
                area.innerHTML += `<div class="st-circle" onclick="Swal.fire('حالة ${st.val().n}', '${st.val().b}')"><b>${st.val().n}</b></div>`;
            });
        });
    }

    // محاكاة مكالمة
    function startCall(type) {
        Swal.fire(`بدء مكالمة ${type === 'video' ? 'فيديو' : 'صوتية'}...`, 'يتم الاتصال بالطرف الآخر عبر Star Server', 'info');
    }

    function loginUser() {
        const p = document.getElementById('u-phone').value, c = document.getElementById('u-code').value;
        db.ref('users').child(p).once('value', s => {
            if(s.val() && s.val().code === c) {
                localStorage.setItem('star_pro_user', JSON.stringify(s.val())); location.reload();
            } else Swal.fire('بيانات خطأ');
        });
    }

    function ownerEntry() {
        Swal.fire({ title: 'كلمة السر', input: 'password' }).then(r => {
            if(r.value === "2009257mama") {
                localStorage.setItem('star_pro_user', JSON.stringify({name:"النجم", phone:"admin", role:"admin"}));
                location.reload();
            }
        });
    }

    init();
</script>
</body>
</html>
