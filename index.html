<!-- نفس HTML بتاعك بدون تغيير كبير -->

<script>
const firebaseConfig = {
  databaseURL: "https://talah-c12c5-default-rtdb.asia-southeast1.firebasedatabase.app/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

let me = JSON.parse(localStorage.getItem('tallah_ultra_v7'));
let activeChatID = null;
let targetID = null;
let chatRef = null;

/* =========================
   LOGIN (زي ما هو)
========================= */
function finalizeLogin(){
  localStorage.setItem('tallah_ultra_v7', JSON.stringify(me));
  location.reload();
}

/* =========================
   USERS FIX (بدون تكرار listeners)
========================= */
function loadUsers(){
  db.ref("users").on("value", snap=>{
    const box = document.getElementById("users-list-box");
    box.innerHTML = "";

    const users = snap.val() || {};

    Object.keys(users).forEach(id=>{
      const user = users[id];
      if(user.id === me.id) return;

      box.innerHTML += `
        <div class="user-row" onclick="openChat('${user.id}','${user.name}','${user.pfp}')">
          <img src="${user.pfp}" class="pfp">
          <div style="flex:1"><b>${user.name}</b></div>
        </div>
      `;
    });
  });
}

/* =========================
   CHAT FIX (أهم تعديل)
   child_added بدل value
========================= */
function openChat(id,name,pfp){

  targetID = id;
  activeChatID = [me.id,id].sort().join("_");

  document.getElementById('chat-ui').style.display='flex';
  document.getElementById('chat-user-name').innerText = name;
  document.getElementById('chat-pfp').src = pfp;

  db.ref(`unread/${me.id}/${id}`).set(0);

  /* ❌ حل مشكلة تكرار listeners */
  if(chatRef) chatRef.off();

  document.getElementById('chat-msgs-box').innerHTML = "";

  chatRef = db.ref("messages/"+activeChatID)
    .limitToLast(50);

  chatRef.on("child_added", snap=>{
    const d = snap.val();
    const box = document.getElementById("chat-msgs-box");

    const isMe = d.sender === me.id;

    let content =
      d.type === 'image' ? `<img src="${d.content}" class="msg-img">` :
      d.type === 'voice' ? `<audio controls src="${d.content}"></audio>` :
      d.content;

    box.innerHTML += `
      <div class="bubble ${isMe ? 'b-me':'b-other'}">
        ${content}
        <div style="font-size:10px;opacity:0.6">
          ${isMe ? (d.seen ? '✔✔' : '✔') : ''}
        </div>
      </div>
    `;

    if(!isMe && !d.seen){
      db.ref("messages/"+activeChatID+"/"+snap.key).update({seen:true});
    }

    box.scrollTop = box.scrollHeight;
  });
}

/* =========================
   SEND TEXT (مضبوط)
========================= */
function sendText(){
  const input = document.getElementById('msg-input');
  if(!input.value) return;

  db.ref("messages/"+activeChatID).push({
    sender:me.id,
    content:input.value,
    type:"text",
    time:Date.now(),
    seen:false
  });

  db.ref(`unread/${targetID}/${me.id}`)
    .transaction(c=>(c||0)+1);

  input.value="";
}

/* =========================
   FIX VOICE (WebM بدل mp3)
========================= */
let rec,chunks=[];

async function toggleVoice(){
  const btn=document.getElementById('mic-btn');

  if(!rec || rec.state==="inactive"){
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});

    rec = new MediaRecorder(stream);
    rec.start();
    chunks=[];

    rec.ondataavailable=e=>chunks.push(e.data);

    rec.onstop=()=>{
      const blob = new Blob(chunks,{type:'audio/webm'});
      const r = new FileReader();

      r.readAsDataURL(blob);
      r.onloadend=()=>{
        db.ref("messages/"+activeChatID).push({
          sender:me.id,
          content:r.result,
          type:"voice",
          time:Date.now(),
          seen:false
        });
      };
    };

    btn.style.color="red";
  }else{
    rec.stop();
    btn.style.color="#8696a0";
  }
}

/* =========================
   TYPING FIX (خفيف وسريع)
========================= */
function isTyping(){
  db.ref(`typing/${activeChatID}`).set({
    user:me.id,
    name:me.name
  });

  clearTimeout(window.t);
  window.t=setTimeout(()=>{
    db.ref(`typing/${activeChatID}`).remove();
  },1200);
}

/* =========================
   TYPING LISTENER
========================= */
db.ref("typing").on("value",snap=>{
  const d=snap.val()||{};
  const el=document.getElementById("typing-info");

  if(d.user && d.user!==me.id){
    el.classList.remove("hidden");
    el.innerText=d.name+" يكتب الآن...";
  }else{
    el.classList.add("hidden");
  }
});

/* =========================
   INIT
========================= */
if(me){
  document.getElementById('gate').classList.add('hidden');
  document.getElementById('main-app').classList.remove('hidden');
  loadUsers();
}

</script>
