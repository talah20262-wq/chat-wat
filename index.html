<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* نظام الألوان الأصلي لواتساب */
        :root {
            --wa-bg: #0b141a;
            --wa-header: #202c33;
            --wa-input: #2a3942;
            --wa-bubble-me: #005c4b;
            --wa-bubble-other: #202c33;
            --wa-accent: #00a884;
            --wa-text: #e9edef;
            --wa-secondary: #8696a0;
            --gold: #ffd700;
            --verify: #2196f3;
        }

        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--wa-bg); color: var(--wa-text); overflow: hidden; }

        /* شاشة الدخول */
        #auth-screen { position: fixed; inset: 0; background: #111b21; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .auth-card { background: #222e35; padding: 25px; border-radius: 15px; width: 85%; max-width: 350px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .auth-btn { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; background: #2a3942; color: white; text-align: center; box-sizing: border-box; }

        /* الهيدر (رأس الصفحة) */
        #main-app { display: none; height: 100vh; flex-direction: column; }
        header { background: var(--wa-header); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; z-index: 10; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .profile-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #54656f; }
        
        /* ستايل المالك الفخم */
        .owner-badge { 
            color: #000 !important; 
            background: linear-gradient(45deg, #ffd700, #ffae00); 
            padding: 2px 8px; 
            border-radius: 6px; 
            font-weight: bold;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .v-icon { color: var(--verify); font-size: 0.9rem; }

        /* منطقة الشات */
        #chat-box { flex: 1; overflow-y: auto; padding: 10px 16px; display: flex; flex-direction: column; gap: 4px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; }
        
        .bubble { max-width: 85%; padding: 6px 10px; border-radius: 8px; position: relative; font-size: 0.95rem; line-height: 1.4; margin-bottom: 2px; }
        .me { align-self: flex-end; background: var(--wa-bubble-me); border-top-right-radius: 0; }
        .other { align-self: flex-start; background: var(--wa-bubble-other); border-top-left-radius: 0; }
        
        .msg-name { font-weight: bold; font-size: 0.8rem; display: block; margin-bottom: 2px; color: #34b7f1; }
        .msg-time { font-size: 0.65rem; color: var(--wa-secondary); float: left; margin-top: 4px; margin-right: 8px; }

        /* شريط الكتابة */
        .input-area { background: var(--wa-header); padding: 8px 10px; display: flex; align-items: center; gap: 8px; }
        .input-wrapper { flex: 1; background: var(--wa-input); border-radius: 25px; padding: 5px 15px; display: flex; align-items: center; }
        #msg-input { flex: 1; background: transparent; border: none; color: white; padding: 8px; outline: none; }
        .send-btn { background: var(--wa-accent); color: white; width: 45px; height: 45px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* لوحة التحكم */
        #admin-panel { position: fixed; inset: 0; background: var(--wa-bg); z-index: 10001; display: none; padding: 20px; overflow-y: auto; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card" id="gate-main">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="60" style="margin-bottom:15px">
        <h2 style="margin-top:0">واتساب النجم</h2>
        <button class="auth-btn" style="background:var(--wa-accent); color:white" onclick="showSec('signup-form')">إنشاء حساب جديد</button>
        <button class="auth-btn" style="background:var(--wa-input); color:white" onclick="showSec('login-form')">تسجيل الدخول (بالكود)</button>
        <p style="color:var(--wa-secondary); font-size:0.8rem; cursor:pointer; margin-top:15px" onclick="showSec('owner-form')">مدخل المالك</p>
    </div>

    <div class="auth-card" id="owner-form" style="display:none">
        <h3>دخول المالك</h3>
        <input type="password" id="owner-pass" placeholder="كلمة السر">
        <button class="auth-btn" style="background:var(--gold); color:black" onclick="authOwner()">دخول</button>
        <button class="auth-btn" style="background:transparent; color:white" onclick="showSec('gate-main')">إلغاء</button>
    </div>

    <div class="auth-card" id="signup-form" style="display:none">
        <h3>طلب انضمام للجروب</h3>
        <input type="text" id="reg-name" placeholder="اسمك المستعار">
        <input type="text" id="reg-phone" placeholder="رقم هاتفك">
        <button class="auth-btn" style="background:var(--wa-accent); color:white" onclick="submitRequest()">إرسال الطلب</button>
        <button class="auth-btn" style="background:transparent; color:white" onclick="showSec('gate-main')">رجوع</button>
    </div>

    <div class="auth-card" id="login-form" style="display:none">
        <h3>أدخل الكود السري</h3>
        <input type="text" id="log-phone" placeholder="رقم الهاتف">
        <input type="text" id="log-code" placeholder="كود الدخول">
        <button class="auth-btn" style="background:var(--wa-accent); color:white" onclick="authUser()">دخول الشات</button>
        <button class="auth-btn" style="background:transparent; color:white" onclick="showSec('gate-main')">رجوع</button>
    </div>
</div>

<div id="main-app">
    <header>
        <div class="user-info">
            <i class="fas fa-arrow-right" style="margin-left: 5px; color: var(--wa-secondary);"></i>
            <img id="header-pic" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="profile-img">
            <div>
                <b id="header-name" style="font-size: 1.1rem; display: block;">جروب النجم</b>
                <span style="font-size: 0.75rem; color: var(--wa-secondary);">متصل الآن</span>
            </div>
        </div>
        <div style="display:flex; gap:18px; font-size: 1.2rem; color: #b1bac0;">
            <i class="fas fa-video"></i>
            <i class="fas fa-phone"></i>
            <i id="admin-btn" class="fas fa-ellipsis-v" style="display:none" onclick="toggleAdmin(true)"></i>
        </div>
    </header>

    <div id="chat-box"></div>

    <div class="input-area">
        <div class="input-wrapper">
            <i class="far fa-smile" style="color: var(--wa-secondary); font-size: 1.4rem;"></i>
            <input type="text" id="msg-input" placeholder="رسالة">
            <i class="fas fa-paperclip" style="color: var(--wa-secondary); font-size: 1.2rem; margin: 0 10px;"></i>
            <i class="fas fa-camera" style="color: var(--wa-secondary); font-size: 1.2rem;"></i>
        </div>
        <button class="send-btn" onclick="sendMsg()">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>
</div>

<div id="admin-panel">
    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #2a3942; padding-bottom:15px">
        <h2>إعدادات المالك</h2>
        <i class="fas fa-times" onclick="toggleAdmin(false)" style="font-size:1.5rem"></i>
    </div>
    
    <div style="background:#202c33; padding:15px; border-radius:10px; margin:20px 0;">
        <h4>صورتك الشخصية (النجم)</h4>
        <input type="text" id="owner-pic-url" placeholder="حط رابط صورتك هنا">
        <button class="auth-btn" style="background:var(--wa-accent); color:white" onclick="updateOwnerPic()">تحديث الصورة</button>
    </div>

    <h3>طلبات الانضمام</h3>
    <div id="admin-requests-list"></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://groop-27edc-default-rtdb.europe-west1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let session = JSON.parse(localStorage.getItem('wa_session'));
    if(session) launch();

    function showSec(id) {
        ['gate-main','owner-form','signup-form','login-form'].forEach(s => document.getElementById(s).style.display='none');
        document.getElementById(id).style.display='block';
    }

    function authOwner() {
        if(document.getElementById('owner-pass').value === "2009257mama") {
            db.ref('owner_cfg').once('value', s => {
                const pic = s.val() ? s.val().pic : 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
                save({ name: "النجم", role: "admin", style: "owner-badge", pic: pic });
            });
        } else { Swal.fire('خطأ في كلمة السر'); }
    }

    function submitRequest() {
        const n = document.getElementById('reg-name').value;
        const p = document.getElementById('reg-phone').value;
        if(n && p) {
            db.ref('requests').child(p).set({name: n, phone: p}).then(() => {
                Swal.fire('تم إرسال طلبك', 'تواصل مع المالك للحصول على كود الدخول', 'success');
                showSec('gate-main');
            });
        }
    }

    function authUser() {
        const p = document.getElementById('log-phone').value;
        const c = document.getElementById('log-code').value;
        db.ref('users').child(p).once('value', s => {
            if(s.val() && s.val().code === c) { save(s.val()); }
            else { Swal.fire('البيانات غير صحيحة'); }
        });
    }

    function save(data) { localStorage.setItem('wa_session', JSON.stringify(data)); location.reload(); }

    function launch() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'flex';
        if(session.role === 'admin') {
            document.getElementById('admin-btn').style.display = 'block';
            loadAdmin();
        }
        loadChat();
    }

    function updateOwnerPic() {
        const url = document.getElementById('owner-pic-url').value;
        if(url) db.ref('owner_cfg').update({pic: url}).then(() => { session.pic = url; save(session); });
    }

    function sendMsg() {
        const input = document.getElementById('msg-input');
        if(!input.value) return;
        db.ref('msgs').push({
            n: session.name,
            b: input.value,
            s: session.style || "",
            t: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12:true})
        });
        input.value = "";
    }

    function loadChat() {
        db.ref('msgs').on('value', s => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            s.forEach(m => {
                const d = m.val();
                const isMe = d.n === session.name;
                box.innerHTML += `
                    <div class="bubble ${isMe ? 'me' : 'other'}">
                        <span class="msg-name ${d.s || ''}">${d.n} ${d.s ? '<i class="fas fa-check-circle v-icon"></i>' : ''}</span>
                        <div>${d.b}</div>
                        <span class="msg-time">${d.t}</span>
                    </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function loadAdmin() {
        db.ref('requests').on('value', s => {
            const list = document.getElementById('admin-requests-list');
            list.innerHTML = "";
            s.forEach(r => {
                list.innerHTML += `<div style="background:#202c33; padding:15px; border-radius:10px; margin-bottom:10px; border-right:4px solid var(--wa-accent)">
                    <b>${r.val().name}</b> (${r.val().phone})
                    <input type="text" id="code-${r.key}" placeholder="أدخل كود لهذا المستخدم">
                    <button class="auth-btn" style="background:var(--wa-accent); padding:5px" onclick="approveUser('${r.key}','${r.val().name}')">إصدار كود وتفعيل</button>
                </div>`;
            });
        });
    }

    window.approveUser = (phone, name) => {
        const code = document.getElementById('code-'+phone).value;
        if(!code) return;
        db.ref('users').child(phone).set({name, phone, code, role: 'user'}).then(() => db.ref('requests').child(phone).remove());
    }

    function toggleAdmin(s) { document.getElementById('admin-panel').style.display = s ? 'block' : 'none'; }
</script>
</body>
</html>
