<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية WhatsApp Star | النسخة العظمى</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22WhatsApp%20Star%22,%22short_name%22:%22Star%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22#0b141a%22,%22theme_color%22:%22#202c33%22}">

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --wa-bg: #0b141a;
            --wa-header: #202c33;
            --wa-green: #25d366;
            --wa-gold: #d4af37;
            --wa-blue: #34b7f1;
            --wa-msg-me: #005c4b;
            --wa-msg-other: #202c33;
            --wa-text: #e9edef;
            --wa-muted: #8696a0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            height: 100%; margin: 0; padding: 0; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--wa-bg); color: var(--wa-text);
            overflow: hidden;
        }

        /* --- شاشات الدخول الفخمة --- */
        .auth-overlay {
            position: fixed; inset: 0; 
            background: radial-gradient(circle at center, #111b21 0%, #0b141a 100%);
            z-index: 10000; display: flex; align-items: center; justify-content: center;
            padding: 20px; transition: 0.5s;
        }
        .royal-card {
            background: #222e35; width: 100%; max-width: 450px;
            padding: 40px; border-radius: 35px; border: 1px solid var(--wa-gold);
            text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .royal-card h1 { color: var(--wa-gold); font-size: 32px; margin-bottom: 10px; text-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }
        
        .input-group { margin-bottom: 15px; text-align: right; }
        .input-group label { display: block; margin-bottom: 5px; color: var(--wa-gold); font-size: 14px; margin-right: 10px;}
        input[type="text"], input[type="tel"], input[type="password"] {
            width: 100%; padding: 16px; border-radius: 15px; border: none;
            background: #2a3942; color: white; font-size: 16px; outline: none;
            text-align: center; transition: 0.3s;
        }
        input:focus { box-shadow: 0 0 0 2px var(--wa-gold); }

        .btn-royal {
            width: 100%; padding: 16px; border-radius: 15px; border: none;
            font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-main { background: var(--wa-green); color: #0b141a; margin-top: 10px; }
        .btn-outline { background: transparent; color: var(--wa-gold); border: 1px solid var(--wa-gold); margin-top: 15px; }
        .btn-royal:active { transform: scale(0.98); }

        /* --- الهيكل الرئيسي --- */
        .app-shell { display: none; height: 100vh; flex-direction: column; }
        
        .main-header {
            background: var(--wa-header); padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #313d45; z-index: 100;
        }
        .header-user { display: flex; align-items: center; gap: 15px; }
        .pfp-ring {
            width: 50px; height: 50px; border-radius: 50%;
            padding: 2px; background: linear-gradient(45deg, var(--wa-gold), #fff);
            display: flex; align-items: center; justify-content: center;
        }
        .pfp-main { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #54656f; }
        .header-actions { display: flex; gap: 20px; font-size: 22px; color: var(--wa-muted); }
        .header-actions i { cursor: pointer; transition: 0.3s; }
        .header-actions i:hover { color: var(--wa-gold); }

        /* --- قائمة الدردشات --- */
        .chat-list { flex: 1; overflow-y: auto; background: var(--wa-bg); }
        .search-container { padding: 10px 15px; background: var(--wa-bg); }
        .search-bar {
            background: var(--wa-header); padding: 8px 15px; border-radius: 10px;
            display: flex; align-items: center; gap: 15px;
        }
        .search-bar input { background: transparent; border: none; color: white; flex: 1; outline: none; padding: 5px; }

        .chat-item {
            display: flex; align-items: center; padding: 12px 16px;
            border-bottom: 1px solid #1c282f; cursor: pointer; transition: 0.2s;
            position: relative;
        }
        .chat-item:hover { background: #202c33; }
        .chat-item-pfp { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; margin-left: 15px; }
        .chat-item-info { flex: 1; border-bottom: none; }
        .chat-item-top { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .chat-item-name { font-weight: 500; font-size: 17px; color: var(--wa-text); }
        .chat-item-time { font-size: 12px; color: var(--wa-muted); }
        .chat-item-msg { font-size: 14px; color: var(--wa-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
        
        .badge-online {
            width: 12px; height: 12px; background: var(--wa-green);
            border-radius: 50%; border: 2px solid var(--wa-bg);
            position: absolute; right: 60px; bottom: 15px; display: none;
        }

        /* --- نافذة المحادثة --- */
        .chat-view {
            position: fixed; inset: 0; background: var(--wa-bg);
            z-index: 5000; display: none; flex-direction: column;
            animation: slideInLeft 0.3s forwards;
        }
        .chat-view-header {
            background: var(--wa-header); padding: 10px 15px;
            display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #313d45;
        }
        .back-btn { font-size: 20px; padding: 10px; cursor: pointer; }
        
        .chat-messages {
            flex: 1; overflow-y: auto; padding: 20px;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-repeat: repeat; background-attachment: fixed;
            display: flex; flex-direction: column; gap: 4px;
        }

        .msg-container { display: flex; width: 100%; margin-bottom: 2px; }
        .msg-container.me { justify-content: flex-end; }
        .msg-container.other { justify-content: flex-start; }

        .bubble {
            max-width: 75%; padding: 8px 12px; border-radius: 12px;
            font-size: 15px; position: relative; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13);
        }
        .bubble.me { 
            background: var(--wa-msg-me); color: #e9edef; 
            border-top-left-radius: 12px; border-top-right-radius: 0; 
        }
        .bubble.other { 
            background: var(--wa-msg-other); color: #e9edef; 
            border-top-left-radius: 0; border-top-right-radius: 12px; 
        }
        .bubble-name { display: block; font-size: 12px; font-weight: bold; color: var(--wa-gold); margin-bottom: 4px; }
        .bubble-time { font-size: 11px; color: rgba(255,255,255,0.5); text-align: left; margin-top: 4px; display: block; }
        
        .input-toolbar {
            background: var(--wa-header); padding: 10px 15px;
            display: flex; align-items: center; gap: 10px;
        }
        .attach-btn { font-size: 22px; color: var(--wa-muted); cursor: pointer; transform: rotate(45deg); }
        .input-field {
            flex: 1; background: #2a3942; border: none; padding: 12px 18px;
            border-radius: 25px; color: white; outline: none; font-size: 16px;
        }
        .action-btn {
            width: 45px; height: 45px; background: var(--wa-green);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: #0b141a; font-size: 20px; cursor: pointer; border: none;
        }

        /* --- لوحة الإعدادات --- */
        .settings-panel {
            position: fixed; inset: 0; background: var(--wa-bg);
            z-index: 6000; display: none; flex-direction: column;
            animation: fadeIn 0.3s;
        }
        .settings-header { background: var(--wa-header); padding: 20px; display: flex; align-items: center; gap: 20px; }
        .settings-content { flex: 1; overflow-y: auto; padding: 20px; }
        .setting-item {
            background: #1c282f; padding: 20px; border-radius: 15px;
            margin-bottom: 15px; display: flex; align-items: center; gap: 20px;
            cursor: pointer; transition: 0.3s;
        }
        .setting-item:hover { background: #2a3942; }
        .setting-item i { font-size: 24px; color: var(--wa-gold); width: 30px; text-align: center; }

        /* --- لوحة المالك --- */
        .admin-panel { background: #111b21; border-top: 3px solid var(--wa-gold); padding: 20px; display: none; }
        .user-admin-card {
            background: #202c33; padding: 15px; border-radius: 12px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid #333;
        }

        /* --- الملحقات --- */
        .audio-wave { display: flex; align-items: center; gap: 2px; height: 20px; }
        .wave-bar { width: 3px; background: var(--wa-gold); border-radius: 2px; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { height: 5px; } 50% { height: 15px; } 100% { height: 5px; } }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-screen" class="auth-overlay">
    <div class="royal-card animate__animated animate__fadeInDown">
        <i class="fas fa-crown" style="font-size: 50px; color: var(--wa-gold); margin-bottom: 15px;"></i>
        <h1>WhatsApp Star</h1>
        <p style="color: var(--wa-muted); margin-bottom: 30px;">بوابة التواصل للملوك فقط</p>
        
        <div id="auth-fields">
            <div class="input-group">
                <label>الاسم الملكي</label>
                <input type="text" id="reg-name" placeholder="مثلاً: النجم الثاقب">
            </div>
            <div class="input-group">
                <label>رقم الموبايل</label>
                <input type="tel" id="reg-phone" placeholder="01xxxxxxxxx">
            </div>
            <div class="input-group">
                <label>كلمة المرور</label>
                <input type="password" id="reg-pass" placeholder="••••••••">
            </div>
            <button class="btn-royal btn-main" onclick="handleAuth()">دخول المملكة <i class="fas fa-paper-plane"></i></button>
            <button class="btn-royal btn-outline" onclick="adminLogin()">لوحة التحكم الملكية 👑</button>
        </div>
    </div>
</div>

<div id="app" class="app-shell">
    <header class="main-header">
        <div class="header-user">
            <div class="pfp-ring">
                <img id="my-pfp" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="pfp-main">
            </div>
            <div>
                <b id="my-name-display" style="font-size: 18px;"></b><br>
                <small style="color: var(--wa-green);">متصل الآن <i class="fas fa-circle" style="font-size: 8px;"></i></small>
            </div>
        </div>
        <div class="header-actions">
            <i class="fas fa-user-shield hidden" id="admin-btn" onclick="toggleAdminPanel()"></i>
            <i class="fas fa-cog" onclick="openSettings()"></i>
            <i class="fas fa-sign-out-alt" onclick="logout()"></i>
        </div>
    </header>

    <div class="chat-list">
        <div class="search-container">
            <div class="search-bar">
                <i class="fas fa-search" style="color: var(--wa-muted);"></i>
                <input type="text" id="user-search" placeholder="بحث عن أصدقاء..." oninput="searchUsers(this.value)">
            </div>
        </div>

        <div class="chat-item" onclick="openChat('global_star', 'الجروب الملكي العام', 'group')">
            <div class="pfp-ring" style="width: 60px; height: 60px; margin-left: 15px; background: var(--wa-gold);">
                <i class="fas fa-users" style="color: #000; font-size: 25px;"></i>
            </div>
            <div class="chat-item-info">
                <div class="chat-item-top">
                    <span class="chat-item-name">الجروب الملكي العام 🏆</span>
                    <span class="chat-item-time" id="last-group-time">الآن</span>
                </div>
                <div class="chat-item-msg">مرحبًا بكل الملوك في الدردشة الجماعية...</div>
            </div>
        </div>

        <div id="users-render-box"></div>
    </div>
</div>

<div id="chat-window" class="chat-view">
    <div class="chat-view-header">
        <i class="fas fa-arrow-right back-btn" onclick="closeChat()"></i>
        <div id="chat-pfp-area"></div>
        <div style="flex: 1;">
            <b id="chat-title-name" style="font-size: 18px;"></b><br>
            <small id="chat-status" style="color: var(--wa-muted);">متصل الآن</small>
        </div>
        <i class="fas fa-video icon-large" style="color: var(--wa-gold); margin-left: 15px;"></i>
        <i class="fas fa-phone icon-large" style="color: var(--wa-gold);"></i>
    </div>

    <div class="chat-messages" id="chat-msgs-box"></div>

    <div class="input-toolbar">
        <label for="file-upload"><i class="fas fa-paperclip attach-btn"></i></label>
        <input type="file" id="file-upload" class="hidden" accept="image/*" onchange="handleFileUpload(this)">
        <input type="text" id="main-input" placeholder="اكتب رسالتك الملكية..." onkeypress="checkEnter(event)">
        <button class="action-btn" id="send-btn" onclick="sendMessage()">
            <i class="fas fa-paper-plane" id="send-icon"></i>
        </button>
    </div>
</div>

<div id="settings-page" class="settings-panel">
    <div class="settings-header">
        <i class="fas fa-arrow-right back-btn" onclick="closeSettings()"></i>
        <b style="font-size: 22px;">الإعدادات</b>
    </div>
    <div class="settings-content">
        <div class="setting-item" onclick="changeMyPfp()">
            <i class="fas fa-camera"></i>
            <div>
                <b>تغيير الصورة الشخصية</b><br>
                <small>اختر لوجو فخم يعبر عنك</small>
            </div>
        </div>
        <div class="setting-item" onclick="changeName()">
            <i class="fas fa-user-edit"></i>
            <div>
                <b>تعديل الاسم المستعار</b><br>
                <small id="current-name-info"></small>
            </div>
        </div>
        <div class="setting-item" onclick="toggleLanguage()">
            <i class="fas fa-language"></i>
            <div>
                <b>اللغة (Language)</b><br>
                <small>العربية (Default)</small>
            </div>
        </div>
        <div class="setting-item" style="border: 1px solid #ff3b30;" onclick="logout()">
            <i class="fas fa-door-open" style="color: #ff3b30;"></i>
            <b style="color: #ff3b30;">تسجيل الخروج</b>
        </div>
    </div>
</div>

<audio id="sound-notif" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

<script>
    // --- برمجة الفايربيس (Firebase) ---
    const firebaseConfig = { 
        databaseURL: "https://talah-c12c5-default-rtdb.asia-southeast1.firebasedatabase.app/" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- المتغيرات العامة ---
    let currentUser = JSON.parse(localStorage.getItem('star_user_v2'));
    let activeChatID = null;
    let allUsers = [];

    // --- بدء التطبيق ---
    if(currentUser) {
        launchApp();
    }

    function handleAuth() {
        const name = document.getElementById('reg-name').value;
        const phone = document.getElementById('reg-phone').value;
        const pass = document.getElementById('reg-pass').value;

        if(!name || !phone || !pass) {
            return Swal.fire('عذراً', 'يجب ملء كافة البيانات الملكية', 'error');
        }

        const userData = {
            name: name,
            phone: phone,
            pass: pass,
            pfp: 'https://cdn-icons-png.flaticon.com/512/149/149071.png',
            status: 'online',
            lastSeen: Date.now(),
            role: 'user'
        };

        db.ref('users/' + phone).set(userData).then(() => {
            localStorage.setItem('star_user_v2', JSON.stringify(userData));
            location.reload();
        });
    }

    async function adminLogin() {
        const { value: code } = await Swal.fire({
            title: 'كود المالك السري',
            input: 'password',
            inputPlaceholder: 'ادخل الكود الملكي',
            confirmButtonColor: '#d4af37'
        });

        if(code === "2009257mama") {
            const adminData = {
                name: 'الإمبراطور المالك 👑',
                phone: 'admin_007',
                role: 'admin',
                pfp: 'https://img.freepik.com/premium-vector/gold-crown-icon_120816-160.jpg'
            };
            localStorage.setItem('star_user_v2', JSON.stringify(adminData));
            location.reload();
        } else if (code) {
            Swal.fire('خطأ', 'الكود غير صحيح يا نجم', 'error');
        }
    }

    function launchApp() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        document.getElementById('my-name-display').innerText = currentUser.name;
        document.getElementById('my-pfp').src = currentUser.pfp;
        document.getElementById('current-name-info').innerText = currentUser.name;

        if(currentUser.role === 'admin') {
            document.getElementById('admin-btn').classList.remove('hidden');
        }

        // تحديث الحالة أونلاين
        db.ref('users/' + currentUser.phone).update({ status: 'online', lastSeen: Date.now() });

        // جلب المستخدمين
        db.ref('users').on('value', snap => {
            allUsers = [];
            snap.forEach(u => allUsers.push(u.val()));
            renderUsers(allUsers);
        });
    }

    function renderUsers(users) {
        const box = document.getElementById('users-render-box');
        box.innerHTML = "";
        users.forEach(user => {
            if(user.phone === currentUser.phone) return;
            
            const isOnline = user.status === 'online';
            box.innerHTML += `
                <div class="chat-item animate__animated animate__fadeInUp" onclick="openChat('${user.phone}', '${user.name}', '${user.pfp}')">
                    <img src="${user.pfp}" class="chat-item-pfp">
                    <div class="badge-online" style="display: ${isOnline ? 'block' : 'none'}"></div>
                    <div class="chat-item-info">
                        <div class="chat-item-top">
                            <span class="chat-item-name">${user.name}</span>
                            <span class="chat-item-time">${isOnline ? 'نشط' : 'غير متصل'}</span>
                        </div>
                        <div class="chat-item-msg">${user.role === 'admin' ? 'المالك متوفر لخدمتك' : 'اضغط للبدء في المحادثة الملكية'}</div>
                    </div>
                </div>
            `;
        });
    }

    function openChat(id, name, pfp) {
        if(id === 'global_star') {
            activeChatID = 'global_star';
            document.getElementById('chat-pfp-area').innerHTML = `
                <div class="pfp-ring" style="width:45px; height:45px; background:var(--wa-gold);">
                    <i class="fas fa-users" style="color:#000;"></i>
                </div>`;
        } else {
            activeChatID = [currentUser.phone, id].sort().join("_");
            document.getElementById('chat-pfp-area').innerHTML = `
                <img src="${pfp}" class="pfp-main" style="width:45px; height:45px; border-radius:50%;">`;
        }

        document.getElementById('chat-window').style.display = 'flex';
        document.getElementById('chat-title-name').innerText = name;

        // استماع للرسائل
        db.ref('messages/' + activeChatID).off();
        db.ref('messages/' + activeChatID).on('value', snap => {
            const msgBox = document.getElementById('chat-msgs-box');
            msgBox.innerHTML = "";
            snap.forEach(m => {
                const msg = m.val();
                const isMe = msg.senderID === currentUser.phone;
                const time = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                msgBox.innerHTML += `
                    <div class="msg-container ${isMe ? 'me' : 'other'}">
                        <div class="bubble ${isMe ? 'me' : 'other'}">
                            ${activeChatID === 'global_star' && !isMe ? `<span class="bubble-name">${msg.senderName}</span>` : ''}
                            ${msg.text}
                            <span class="bubble-time">${time}</span>
                        </div>
                    </div>
                `;
            });
            msgBox.scrollTop = msgBox.scrollHeight;
            if(snap.exists()) document.getElementById('sound-notif').play();
        });
    }

    function sendMessage() {
        const input = document.getElementById('main-input');
        const text = input.value.trim();
        if(!text) return;

        const msgData = {
            senderID: currentUser.phone,
            senderName: currentUser.name,
            text: text,
            timestamp: Date.now()
        };

        db.ref('messages/' + activeChatID).push(msgData);
        input.value = "";
        input.focus();
    }

    function handleFileUpload(input) {
        if(input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const imgHtml = `<img src="${e.target.result}" style="max-width:100%; border-radius:10px; margin-top:5px;">`;
                db.ref('messages/' + activeChatID).push({
                    senderID: currentUser.phone,
                    senderName: currentUser.name,
                    text: imgHtml,
                    timestamp: Date.now()
                });
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // --- الإعدادات ---
    function openSettings() { document.getElementById('settings-page').style.display = 'flex'; }
    function closeSettings() { document.getElementById('settings-page').style.display = 'none'; }
    
    async function changeMyPfp() {
        const { value: file } = await Swal.fire({
            title: 'اختر صورتك الجديدة',
            input: 'file',
            inputAttributes: { 'accept': 'image/*', 'aria-label': 'Upload your profile picture' }
        });

        if(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const base64 = e.target.result;
                db.ref('users/' + currentUser.phone).update({ pfp: base64 });
                currentUser.pfp = base64;
                localStorage.setItem('star_user_v2', JSON.stringify(currentUser));
                location.reload();
            };
            reader.readAsDataURL(file);
        }
    }

    async function changeName() {
        const { value: newName } = await Swal.fire({
            title: 'تعديل الاسم',
            input: 'text',
            inputValue: currentUser.name
        });
        if(newName) {
            db.ref('users/' + currentUser.phone).update({ name: newName });
            currentUser.name = newName;
            localStorage.setItem('star_user_v2', JSON.stringify(currentUser));
            location.reload();
        }
    }

    function searchUsers(val) {
        const filtered = allUsers.filter(u => u.name.toLowerCase().includes(val.toLowerCase()));
        renderUsers(filtered);
    }

    function checkEnter(e) { if(e.key === 'Enter') sendMessage(); }
    function closeChat() { document.getElementById('chat-window').style.display = 'none'; }
    function logout() { 
        db.ref('users/' + currentUser.phone).update({ status: 'offline' });
        localStorage.clear(); 
        location.reload(); 
    }
</script>
</body>
</html>
