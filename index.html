<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Star Ultimate</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --wa-bg: #0b141a; --wa-header: #202c33; --green: #25d366; --gold: #ffd700; --blue: #34b7f1; }
        body, html { height: 100%; margin: 0; font-family: sans-serif; background: var(--wa-bg); color: white; overflow: hidden; }

        /* شاشات الدخول */
        #auth-overlay { position: fixed; inset: 0; background: #111b21; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: #222e35; padding: 25px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; }
        .main-btn { width: 100%; padding: 12px; margin: 8px 0; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; background: #2a3942; color: white; text-align: center; outline: none; }

        /* الواجهة الرئيسية */
        .header { background: var(--wa-header); padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .stories { display: flex; gap: 10px; padding: 15px; overflow-x: auto; border-bottom: 0.5px solid #222e35; }
        .st-circle { min-width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--green); display: flex; align-items: center; justify-content: center; background: #232d36; font-size: 0.6rem; cursor: pointer; }
        
        .chat-list { height: calc(100vh - 180px); overflow-y: auto; }
        .chat-item { display: flex; align-items: center; padding: 12px 16px; border-bottom: 0.5px solid #222e35; cursor: pointer; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: #54656f; margin-left: 12px; }

        /* شاشة الشات */
        #chat-ui { display: none; position: fixed; inset: 0; background: var(--wa-bg); z-index: 5000; flex-direction: column; }
        #msg-box { flex: 1; overflow-y: auto; padding: 15px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); display: flex; flex-direction: column; gap: 8px; }
        .bubble { max-width: 80%; padding: 10px; border-radius: 12px; position: relative; }
        .me { align-self: flex-end; background: #005c4b; }
        .other { align-self: flex-start; background: #202c33; }

        /* شريط الأدوات والريكورد */
        .input-bar { background: #202c33; padding: 10px; display: flex; align-items: center; gap: 10px; }
        .rec-btn { color: white; font-size: 1.3rem; cursor: pointer; transition: 0.3s; }
        .recording { color: #ff4b4b; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .gold-txt { color: var(--gold) !important; font-weight: bold; }
        .v-badge { color: var(--blue); font-size: 0.8rem; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card" id="pane-main">
        <h2 style="color:var(--green)">WhatsApp Star</h2>
        <button class="main-btn" style="background:var(--green)" onclick="showSec('pane-reg')">إنشاء حساب (كود فوري)</button>
        <button class="main-btn" style="background:#2a3942; color:white" onclick="showSec('pane-login')">دخول بالكود</button>
        <button class="main-btn" style="background:var(--gold); color:black" onclick="showSec('pane-owner')">لوحة تحكم المالك</button>
    </div>

    <div class="auth-card hidden" id="pane-reg">
        <input type="text" id="reg-name" placeholder="اسمك المستعار">
        <input type="text" id="reg-phone" placeholder="رقم الهاتف">
        <button class="main-btn" style="background:var(--green)" onclick="doReg()">تفعيل الحساب</button>
        <p onclick="showSec('pane-main')" style="cursor:pointer">رجوع</p>
    </div>

    <div class="auth-card hidden" id="pane-login">
        <input type="text" id="log-phone" placeholder="رقم الهاتف">
        <input type="text" id="log-code" placeholder="الكود">
        <button class="main-btn" style="background:var(--green)" onclick="doLogin()">دخول</button>
        <p onclick="showSec('pane-main')" style="cursor:pointer">رجوع</p>
    </div>

    <div class="auth-card hidden" id="pane-owner">
        <input type="password" id="own-pass" placeholder="باسورد النجم">
        <button class="main-btn" style="background:var(--gold)" onclick="doOwner()">دخول الإدارة</button>
        <p onclick="showSec('pane-main')" style="cursor:pointer">رجوع</p>
    </div>
</div>

<div id="app-main" style="display:none; flex-direction:column; height:100vh;">
    <div class="header">
        <b>WhatsApp Star</b>
        <i class="fas fa-sign-out-alt" onclick="logout()"></i>
    </div>
    <div class="stories" id="st-list">
        <div class="st-circle" onclick="addStatus()">+<br>حالة</div>
    </div>
    <div class="chat-list">
        <div id="pinned-chat">
            <div class="chat-item" onclick="openChat('public', 'جروب النجم الملكي')">
                <div class="avatar" style="border:2px solid var(--gold)"></div>
                <div style="flex:1"><b class="gold-txt">جروب النجم الملكي <i class="fas fa-check-circle v-badge"></i></b><br><small>المقر الرسمي للإدارة</small></div>
            </div>
        </div>
        <div id="users-list"></div>
    </div>
</div>

<div id="chat-ui">
    <div class="header">
        <div style="display:flex; align-items:center; gap:10px">
            <i class="fas fa-arrow-right" onclick="location.reload()"></i>
            <b id="chat-title"></b>
        </div>
        <div style="display:flex; gap:15px"><i class="fas fa-video"></i><i class="fas fa-phone"></i></div>
    </div>
    <div id="msg-box"></div>
    <div class="input-bar">
        <i class="fas fa-microphone rec-btn" id="mic-icon" onclick="startVoice()"></i>
        <span id="rec-timer" style="display:none; color:red; font-size:0.8rem">00:00</span>
        <input type="text" id="msg-input" placeholder="رسالة" style="flex:1; background:#2a3942; border:none; padding:10px; border-radius:20px; color:white;">
        <button onclick="sendText()" style="background:var(--green); border:none; width:40px; height:40px; border-radius:50%"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
    // تكوين الفايربيس (تأكد أن الرابط ينتهي بـ /)
    const firebaseConfig = { databaseURL: "https://groop-27edc-default-rtdb.europe-west1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = JSON.parse(localStorage.getItem('wa_star_final')), curPath = "", recorder, chunks = [], timerInterval;

    if(user) launch();

    function showSec(id) {
        document.querySelectorAll('.auth-card').forEach(c => c.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function doReg() {
        const n = document.getElementById('reg-name').value, p = document.getElementById('reg-phone').value;
        const c = Math.floor(100000 + Math.random() * 900000).toString();
        if(n && p) db.ref('users').child(p).set({name:n, phone:p, code:c, role:'user'}).then(() => {
            Swal.fire('كودك هو: ' + c); showSec('pane-login');
        });
    }

    function doLogin() {
        const p = document.getElementById('log-phone').value, c = document.getElementById('log-code').value;
        db.ref('users').child(p).once('value', s => {
            if(s.val() && s.val().code === c) saveSession(s.val());
            else Swal.fire('خطأ في البيانات');
        });
    }

    function doOwner() {
        if(document.getElementById('own-pass').value === "2009257mama") {
            saveSession({name:"النجم", phone:"admin", role:"admin", style:"gold-txt"});
        } else Swal.fire('باسورد المالك خطأ');
    }

    function saveSession(d) { localStorage.setItem('wa_star_final', JSON.stringify(d)); location.reload(); }
    function logout() { localStorage.removeItem('wa_star_final'); location.reload(); }

    function launch() {
        document.getElementById('auth-overlay').style.display='none';
        document.getElementById('app-main').style.display='flex';
        loadUsers(); loadStatuses();
    }

    function openChat(path, name) {
        curPath = path === 'public' ? 'msgs' : 'private/' + path;
        document.getElementById('chat-title').innerText = name;
        document.getElementById('chat-ui').style.display='flex';
        db.ref(curPath).on('value', s => {
            const box = document.getElementById('msg-box'); box.innerHTML = "";
            s.forEach(m => {
                const d = m.val();
                let content = d.type === 'voice' ? `<audio src="${d.b}" controls style="width:200px"></audio>` : d.b;
                box.innerHTML += `<div class="bubble ${d.n===user.name?'me':'other'}"><small class="${d.s}">${d.n}</small><br>${content}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendText() {
        const i = document.getElementById('msg-input'); if(!i.value) return;
        db.ref(curPath).push({n:user.name, b:i.value, type:'text', s:user.style||""}); i.value="";
    }

    // --- نظام الريكورد الاحترافي ---
    async function startVoice() {
        const mic = document.getElementById('mic-icon');
        const timer = document.getElementById('rec-timer');

        if (!recorder || recorder.state === "inactive") {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                recorder = new MediaRecorder(stream);
                chunks = [];
                
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/ogg; codecs=opus' });
                    const reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onloadend = () => {
                        db.ref(curPath).push({ n: user.name, b: reader.result, type: 'voice', s: user.style || "" });
                    };
                };

                recorder.start();
                mic.classList.add('recording');
                timer.style.display = 'inline';
                let sec = 0;
                timerInterval = setInterval(() => {
                    sec++;
                    let m = Math.floor(sec/60), s = sec%60;
                    timer.innerText = `${m}:${s<10?'0'+s:s}`;
                }, 1000);

            } catch (err) { Swal.fire('يجب السماح بالمايك'); }
        } else {
            recorder.stop();
            mic.classList.remove('recording');
            clearInterval(timerInterval);
            timer.style.display = 'none';
            timer.innerText = "00:00";
        }
    }

    function addStatus() {
        Swal.fire({title:'اكتب حالة', input:'text'}).then(r => { if(r.value) db.ref('status').push({n:user.name, b:r.value}); });
    }

    function loadStatuses() {
        db.ref('status').on('value', s => {
            const list = document.getElementById('st-list');
            list.innerHTML = `<div class="st-circle" onclick="addStatus()">+<br>حالة</div>`;
            s.forEach(st => { list.innerHTML += `<div class="st-circle" onclick="Swal.fire('حالة ${st.val().n}', '${st.val().b}')">${st.val().n}</div>`; });
        });
    }

    function loadUsers() {
        db.ref('users').on('value', s => {
            const list = document.getElementById('users-list'); list.innerHTML = "";
            s.forEach(u => {
                if(u.val().phone !== user.phone) {
                    const room = [user.phone, u.val().phone].sort().join("_");
                    list.innerHTML += `<div class="chat-item" onclick="openChat('${room}', '${u.val().name}')"><div class="avatar"></div><b>${u.val().name}</b></div>`;
                }
            });
        });
    }
</script>
</body>
</html>
