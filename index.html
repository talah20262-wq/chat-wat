<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="main-title">Tallah Star | النظام الملكي</title>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #0b141a; --hdr: #202c33; --green: #00a884;
            --text: #e9edef; --gold: #d4af37; --blue: #20adff; --msg-me: #005c4b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* بوابة الدخول (Gate) */
        #gate { position: fixed; inset: 0; background: var(--bg); z-index: 99999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .gate-card { background: #1c282f; width: 100%; max-width: 400px; padding: 30px; border-radius: 20px; border-top: 5px solid var(--gold); text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; background: #2a3942; color: white; outline: none; }
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }

        /* شريط الإعلانات */
        #ad-bar { background: var(--gold); color: black; padding: 6px; font-weight: bold; overflow: hidden; white-space: nowrap; position: relative; }
        .ad-move { display: inline-block; animation: marquee 15s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-150%); } }

        /* الهيدر وقائمة الدردشة */
        header { background: var(--hdr); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #111b21; }
        .user-row { display: flex; padding: 15px; border-bottom: 1px solid #222d34; align-items: center; cursor: pointer; position: relative; }
        .unread-cnt { background: var(--green); color: white; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 11px; margin-right: auto; }
        .pfp { width: 55px; height: 55px; border-radius: 50%; margin-left: 15px; border: 1px solid #333; }

        /* الشات وعلامات الصح */
        #chat-ui { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: none; flex-direction: column; }
        .chat-body { flex: 1; overflow-y: auto; padding: 15px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-color: rgba(11,20,26,0.96); background-blend-mode: darken; display: flex; flex-direction: column; }
        .bubble { max-width: 80%; padding: 8px 12px; border-radius: 10px; margin-bottom: 8px; font-size: 15px; position: relative; }
        .b-me { background: var(--msg-me); align-self: flex-end; border-top-right-radius: 0; }
        .b-other { background: var(--hdr); align-self: flex-start; border-top-left-radius: 0; }
        .ticks { font-size: 11px; margin-right: 5px; color: #8696a0; }
        .seen { color: var(--blue) !important; }

        /* لوحة المالك */
        .admin-panel { position: fixed; inset: 0; background: var(--bg); z-index: 50000; display: none; flex-direction: column; overflow-y: auto; }
        .admin-card { background: #1c282f; margin: 15px; padding: 20px; border-radius: 15px; border-right: 4px solid var(--gold); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<audio id="sound-notif" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

<div id="gate">
    <div class="gate-card">
        <h2 id="gate-brand" style="color:var(--gold)">Tallah Star</h2>
        <div id="gate-main">
            <input type="text" id="reg-name" placeholder="ادخل اسمك للطلب">
            <button class="btn" style="background:var(--green); color:white" onclick="askJoin()">طلب انضمام</button>
            <p style="margin-top:15px; font-size:12px">أو ادخل كودك</p>
            <input type="password" id="log-code" placeholder="كود الدخول" style="text-align:center">
            <button class="btn" style="background:var(--gold); color:black" onclick="login()">دخول</button>
        </div>
        <div id="gate-wait" class="hidden">
            <h3 style="color:var(--gold)">تم قبولك! كودك هو:</h3>
            <h1 id="show-code" style="font-size:40px; margin:20px 0; letter-spacing:5px"></h1>
            <button class="btn" style="background:var(--green); color:white" onclick="location.reload()">ابدأ الآن</button>
        </div>
    </div>
</div>

<div id="app" class="hidden">
    <div id="ad-bar"><div class="ad-move" id="ad-txt">مرحباً بكم في إمبراطورية طلة</div></div>
    <header>
        <b id="nav-brand">Tallah Star</b>
        <div style="display:flex; gap:20px; cursor:pointer">
            <i class="fas fa-cog" onclick="openAdmin()" id="admin-btn"></i>
            <i class="fas fa-sign-out-alt" onclick="logout()"></i>
        </div>
    </header>
    <div id="user-list"></div>
</div>

<div id="admin-ui" class="admin-panel">
    <div style="background:var(--hdr); padding:15px; border-bottom:1px solid var(--gold); display:flex; align-items:center; gap:15px">
        <i class="fas fa-arrow-right" onclick="closeAdmin()"></i>
        <b>لوحة تحكم الإمبراطور 👑</b>
    </div>
    <div class="admin-card">
        <h4>تعديل اسم الموقع والإعلان ✍️</h4>
        <input type="text" id="set-name" placeholder="اسم البراند">
        <input type="text" id="set-ad" placeholder="نص الإعلان">
        <button class="btn" style="background:var(--blue); color:white" onclick="saveSettings()">تحديث</button>
    </div>
    <div class="admin-card">
        <h4>طلبات الانضمام 🔔</h4>
        <div id="req-box"></div>
    </div>
    <div class="admin-card">
        <h4>الأعضاء والتوثيق ✅</h4>
        <div id="user-manage"></div>
    </div>
</div>

<div id="chat-ui">
    <div style="background:var(--hdr); padding:12px; display:flex; align-items:center; gap:12px">
        <i class="fas fa-arrow-right" onclick="closeChat()"></i>
        <img id="chat-pfp" class="pfp" style="width:40px; height:40px; margin:0">
        <b id="chat-name"></b>
    </div>
    <div id="chat-msgs" class="chat-body"></div>
    <div style="background:var(--hdr); padding:10px; display:flex; gap:10px; align-items:center">
        <i class="fas fa-microphone" id="mic" onclick="doRecord()" style="color:var(--gold); font-size:22px; cursor:pointer"></i>
        <input type="text" id="msg-in" placeholder="رسالة">
        <i class="fas fa-paper-plane" style="color:var(--green); font-size:22px; cursor:pointer" onclick="send()"></i>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://talah-c12c5-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let me = JSON.parse(localStorage.getItem('tallah_v_final'));
    let activeChat = null;
    let targetID = null;

    // --- الدخول ---
    function askJoin() {
        const n = document.getElementById('reg-name').value;
        if(!n) return;
        const ref = db.ref('requests').push({ name: n, status: 'pending' });
        Swal.fire('وصل الطلب', 'انتظر قبول المالك وظهور كودك هنا', 'success');
        db.ref('requests/'+ref.key).on('value', s => {
            if(s.val()?.status === 'ok') {
                document.getElementById('gate-main').classList.add('hidden');
                document.getElementById('gate-wait').classList.remove('hidden');
                document.getElementById('show-code').innerText = s.val().code;
            }
        });
    }

    function login() {
        const c = document.getElementById('log-code').value;
        if(c === "248") {
            me = { name: "الإمبراطور", code: "248", role: "admin", id: "admin", pfp: "https://cdn-icons-png.flaticon.com/512/149/149071.png" };
            save();
        } else {
            db.ref('users').once('value', s => {
                s.forEach(u => { if(u.val().code === c) { me = u.val(); save(); } });
            });
        }
    }
    function save() { localStorage.setItem('tallah_v_final', JSON.stringify(me)); location.reload(); }

    if(me) {
        document.getElementById('gate').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        start();
    }

    // --- تشغيل الإمبراطورية ---
    function start() {
        if(me.role !== 'admin') document.getElementById('admin-btn').classList.add('hidden');
        db.ref('settings').on('value', s => {
            if(s.val()){
                document.getElementById('nav-brand').innerText = s.val().name;
                document.getElementById('ad-txt').innerText = s.val().ad;
                document.getElementById('gate-brand').innerText = s.val().name;
            }
        });
        loadList();
        if(me.role === 'admin') loadAdmin();
        
        // صوت الإشعارات
        db.ref('messages').on('child_changed', () => { document.getElementById('sound-notif').play(); });
    }

    function loadList() {
        db.ref('users').on('value', s => {
            const list = document.getElementById('user-list');
            list.innerHTML = "";
            s.forEach(u => {
                const user = u.val();
                if(user.id === me.id) return;
                db.ref(`unread/${me.id}/${user.id}`).on('value', c => {
                    const cnt = c.val() || 0;
                    const row = `
                        <div class="user-row" onclick="openChat('${user.id}','${user.name}','${user.pfp}')">
                            <img src="${user.pfp}" class="pfp">
                            <div style="flex:1"><b>${user.name} ${user.verified?'✅':''}</b></div>
                            ${cnt > 0 ? `<div class="unread-cnt">${cnt}</div>` : ''}
                        </div>`;
                    list.innerHTML += row;
                });
            });
        });
    }

    function openChat(id, name, pfp) {
        targetID = id;
        activeChat = [me.id, id].sort().join("_");
        document.getElementById('chat-ui').style.display = "flex";
        document.getElementById('chat-name').innerText = name;
        document.getElementById('chat-pfp').src = pfp;
        db.ref(`unread/${me.id}/${id}`).set(0);

        db.ref('messages/'+activeChat).on('value', s => {
            const box = document.getElementById('chat-msgs');
            box.innerHTML = "";
            s.forEach(m => {
                const d = m.val();
                const isMe = d.sender === me.id;
                box.innerHTML += `
                    <div class="bubble ${isMe?'b-me':'b-other'}">
                        ${d.type==='audio'?`<audio controls src="${d.content}" style="width:180px"></audio>`:d.content}
                        <div style="font-size:10px; margin-top:5px">
                            ${isMe?`<i class="fas fa-check-double ticks ${d.seen?'seen':''}"></i>`:''}
                        </div>
                    </div>`;
                if(!isMe && !d.seen) db.ref(`messages/${activeChat}/${m.key}`).update({seen:true});
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function send() {
        const v = document.getElementById('msg-in').value;
        if(!v) return;
        db.ref('messages/'+activeChat).push({ sender:me.id, content:v, type:'text', time:Date.now(), seen:false });
        db.ref(`unread/${targetID}/${me.id}`).transaction(c => (c||0)+1);
        document.getElementById('msg-in').value = "";
    }

    // --- الريكورد ---
    let rec; let chunks = [];
    async function doRecord() {
        const m = document.getElementById('mic');
        if(!rec || rec.state === 'inactive') {
            const s = await navigator.mediaDevices.getUserMedia({ audio: true });
            rec = new MediaRecorder(s);
            rec.start();
            m.style.color = "red";
            rec.ondataavailable = e => chunks.push(e.data);
            rec.onstop = () => {
                const b = new Blob(chunks, { type:'audio/mp3' });
                const r = new FileReader();
                r.readAsDataURL(b);
                r.onloadend = () => {
                    db.ref('messages/'+activeChat).push({ sender:me.id, content:r.result, type:'audio', time:Date.now(), seen:false });
                    db.ref(`unread/${targetID}/${me.id}`).transaction(c => (c||0)+1);
                };
                chunks = [];
            };
        } else {
            rec.stop();
            m.style.color = "var(--gold)";
        }
    }

    // --- الإدارة ---
    function loadAdmin() {
        db.ref('requests').on('value', s => {
            const box = document.getElementById('req-box'); box.innerHTML = "";
            s.forEach(r => {
                if(r.val().status === 'pending') {
                    box.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:10px">
                        <span>${r.val().name}</span>
                        <button onclick="approve('${r.key}','${r.val().name}')" class="btn" style="width:auto; padding:5px; background:var(--green)">قبول وتعيين كود</button>
                    </div>`;
                }
            });
        });
        db.ref('users').on('value', s => {
            const box = document.getElementById('user-manage'); box.innerHTML = "";
            s.forEach(u => {
                box.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:5px">
                    <span>${u.val().name} (${u.val().code})</span>
                    <button onclick="verify('${u.key}')" style="background:var(--blue); border:none; color:white; border-radius:4px; padding:2px 8px">توثيق</button>
                </div>`;
            });
        });
    }

    async function approve(k, n) {
        const { value: c } = await Swal.fire({ title: 'تعيين كود', input: 'text' });
        if(c) {
            const uid = Date.now();
            db.ref('users').push({ name:n, code:c, id:uid, verified:false, pfp:'https://cdn-icons-png.flaticon.com/512/149/149071.png' });
            db.ref('requests/'+k).update({ status:'ok', code:c });
        }
    }
    function verify(k) { db.ref('users/'+k).update({ verified:true }); }
    function saveSettings() {
        const n = document.getElementById('set-name').value;
        const a = document.getElementById('set-ad').value;
        db.ref('settings').update({ name:n||"Tallah Star", ad:a||"أهلاً بكم" });
        Swal.fire('تم التحديث');
    }

    function openAdmin() { document.getElementById('admin-ui').style.display='flex'; }
    function closeAdmin() { document.getElementById('admin-ui').style.display='none'; }
    function closeChat() { document.getElementById('chat-ui').style.display='none'; }
    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
