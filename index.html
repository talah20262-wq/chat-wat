<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Star | المطور</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --wa-bg: #0b141a; --wa-header: #202c33; --green: #25d366; --gold: #ffd700; --blue: #34b7f1; }
        body, html { height: 100%; margin: 0; font-family: sans-serif; background: var(--wa-bg); color: white; overflow: hidden; }

        /* بوابة الدخول */
        #auth-overlay { position: fixed; inset: 0; background: #111b21; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: #222e35; padding: 30px; border-radius: 25px; width: 85%; max-width: 350px; text-align: center; }
        .main-btn { width: 100%; padding: 14px; margin: 10px 0; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: none; background: #2a3942; color: white; text-align: center; outline: none; }
        .hidden { display: none; }

        /* الواجهة */
        .header { background: var(--wa-header); padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .stories { display: flex; gap: 10px; padding: 15px; overflow-x: auto; border-bottom: 0.5px solid #222e35; }
        .st-circle { min-width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--green); display: flex; align-items: center; justify-content: center; background: #202c33; font-size: 0.7rem; cursor: pointer; }
        
        .chat-list { height: calc(100vh - 180px); overflow-y: auto; }
        .chat-row { display: flex; align-items: center; padding: 15px; border-bottom: 0.5px solid #222e35; cursor: pointer; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: #54656f; margin-left: 12px; }
        
        /* شاشة الشات */
        #chat-ui { display: none; position: fixed; inset: 0; background: var(--wa-bg); z-index: 5000; flex-direction: column; }
        #msg-box { flex: 1; overflow-y: auto; padding: 15px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 80%; padding: 10px; border-radius: 12px; font-size: 0.95rem; }
        .me { align-self: flex-end; background: #005c4b; }
        .other { align-self: flex-start; background: #202c33; }

        .gold-txt { color: var(--gold) !important; font-weight: bold; }
        .v-badge { color: var(--blue); font-size: 0.8rem; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card" id="auth-menu">
        <h2 id="json-app-name" style="color:var(--green)">تحميل...</h2>
        <button class="main-btn" style="background:var(--green)" onclick="show('pane-reg')">إنشاء حساب جديد</button>
        <button class="main-btn" style="background:#2a3942; color:white" onclick="show('pane-login')">دخول (بالكود)</button>
        <p onclick="show('pane-owner')" style="color:#8696a0; cursor:pointer; margin-top:15px">بوابة المالك</p>
    </div>

    <div class="auth-card hidden" id="pane-reg">
        <input type="text" id="reg-n" placeholder="اسمك">
        <input type="text" id="reg-p" placeholder="رقمك">
        <button class="main-btn" style="background:var(--green)" onclick="register()">احصل على كودك</button>
        <p onclick="show('auth-menu')" style="cursor:pointer">رجوع</p>
    </div>

    <div class="auth-card hidden" id="pane-login">
        <input type="text" id="log-p" placeholder="الرقم">
        <input type="text" id="log-c" placeholder="الكود">
        <button class="main-btn" style="background:var(--green)" onclick="login()">دخول</button>
        <p onclick="show('auth-menu')" style="cursor:pointer">رجوع</p>
    </div>

    <div class="auth-card hidden" id="pane-owner">
        <input type="password" id="own-pass" placeholder="كلمة سر النجم">
        <button class="main-btn" style="background:var(--gold)" onclick="ownerAuth()">فتح الإدارة</button>
        <p onclick="show('auth-menu')" style="cursor:pointer">رجوع</p>
    </div>
</div>

<div id="main-app" style="display:none; flex-direction:column; height:100vh;">
    <div class="header">
        <b id="json-header-name">WhatsApp</b>
        <i class="fas fa-ellipsis-v"></i>
    </div>
    <div class="stories" id="status-area">
        <div class="st-circle" onclick="addStatus()" style="border: 1px dashed #8696a0">+<br>حالة</div>
    </div>
    <div class="chat-list">
        <div id="pinned-area"></div>
        <div id="others-area"></div>
    </div>
</div>

<div id="chat-ui">
    <div class="header">
        <div style="display:flex; align-items:center; gap:10px">
            <i class="fas fa-arrow-right" onclick="location.reload()"></i>
            <b id="active-chat-title"></b>
        </div>
        <div style="display:flex; gap:20px"><i class="fas fa-video"></i><i class="fas fa-phone"></i></div>
    </div>
    <div id="msg-box"></div>
    <div style="background:#202c33; padding:10px; display:flex; align-items:center; gap:10px">
        <i class="fas fa-microphone" id="mic-btn" onclick="handleRecord()"></i>
        <input type="text" id="msg-input" placeholder="رسالة" style="flex:1; background:#2a3942; border:none; padding:10px; border-radius:20px; color:white;">
        <button onclick="sendMsg()" style="background:var(--green); border:none; width:40px; height:40px; border-radius:50%"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
    // ربط الفايربيس (ضع الرابط الخاص بك)
    const firebaseConfig = { databaseURL: "https://groop-27edc-default-rtdb.europe-west1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let appData = {}, user = JSON.parse(localStorage.getItem('star_v6')), curPath = "", recorder, chunks = [];

    // --- الربط مع ملف JSON ---
    async function loadJSON() {
        try {
            const res = await fetch('data.json');
            appData = await res.json();
            document.getElementById('json-app-name').innerText = appData.settings.appName;
            document.getElementById('json-header-name').innerText = appData.settings.appName;
            if(user) launch();
        } catch(e) { Swal.fire('تأكد من وجود ملف data.json بجانب ملف الـ HTML'); }
    }

    function show(id) {
        document.querySelectorAll('.auth-card').forEach(c => c.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function register() {
        const n = document.getElementById('reg-n').value, p = document.getElementById('reg-p').value;
        const c = Math.floor(100000 + Math.random() * 900000).toString();
        if(n && p) db.ref('users').child(p).set({name:n, phone:p, code:c, role:'user'}).then(() => {
            Swal.fire('تم! كودك هو: ' + c); show('pane-login');
        });
    }

    function login() {
        const p = document.getElementById('log-p').value, c = document.getElementById('log-c').value;
        db.ref('users').child(p).once('value', s => {
            if(s.val() && s.val().code === c) saveSession(s.val());
            else Swal.fire('بيانات خطأ');
        });
    }

    function ownerAuth() {
        if(document.getElementById('own-pass').value === "2009257mama") {
            saveSession({name: "النجم", role: "admin", phone: "admin", style: "gold-txt"});
        }
    }

    function saveSession(d) { localStorage.setItem('star_v6', JSON.stringify(d)); location.reload(); }

    function launch() {
        document.getElementById('auth-overlay').style.display='none';
        document.getElementById('main-app').style.display='flex';
        renderPinned(); loadUsers(); loadStatuses();
    }

    function renderPinned() {
        const pin = appData.pinnedGroup;
        document.getElementById('pinned-area').innerHTML = `
            <div class="chat-row" onclick="openChat('public', '${pin.name}')">
                <div class="avatar" style="border:2px solid var(--gold)"></div>
                <div style="flex:1">
                    <b class="${pin.isVerified?'gold-txt':''}">${pin.name} ${pin.isVerified?'<i class="fas fa-check-circle v-badge"></i>':''}</b><br>
                    <small style="color:#8696a0">${pin.status}</small>
                </div>
            </div>`;
    }

    function openChat(path, name) {
        curPath = path === 'public' ? 'msgs' : 'private/' + path;
        document.getElementById('active-chat-title').innerText = name;
        document.getElementById('chat-ui').style.display = 'flex';
        db.ref(curPath).on('value', s => {
            const box = document.getElementById('msg-box'); box.innerHTML = "";
            s.forEach(m => {
                const d = m.val();
                let body = d.type === 'audio' ? `<audio src="${d.b}" controls style="width:180px"></audio>` : d.b;
                box.innerHTML += `<div class="bubble ${d.n===user.name?'me':'other'}"><small class="${d.s}">${d.n}</small><br>${body}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMsg() {
        const i = document.getElementById('msg-input'); if(!i.value) return;
        db.ref(curPath).push({n:user.name, b:i.value, type:'text', s:user.style||""}); i.value="";
    }

    async function handleRecord() {
        const btn = document.getElementById('mic-btn');
        if(!recorder || recorder.state === 'inactive') {
            const stream = await navigator.mediaDevices.getUserMedia({audio:true});
            recorder = new MediaRecorder(stream);
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const reader = new FileReader(); reader.readAsDataURL(new Blob(chunks));
                reader.onloadend = () => db.ref(curPath).push({n:user.name, b:reader.result, type:'audio', s:user.style||""});
                chunks = [];
            };
            recorder.start(); btn.style.color = 'red';
        } else { recorder.stop(); btn.style.color = 'white'; }
    }

    function addStatus() {
        Swal.fire({title: 'اكتب حالة', input: 'text'}).then(r => {
            if(r.value) db.ref('status').push({n:user.name, b:r.value});
        });
    }

    function loadStatuses() {
        db.ref('status').on('value', s => {
            const area = document.getElementById('status-area');
            area.innerHTML = `<div class="st-circle" onclick="addStatus()" style="border: 1px dashed #8696a0">+<br>حالة</div>`;
            s.forEach(st => {
                area.innerHTML += `<div class="st-circle" onclick="Swal.fire('حالة ${st.val().n}', '${st.val().b}')"><b>${st.val().n}</b></div>`;
            });
        });
    }

    function loadUsers() {
        db.ref('users').on('value', s => {
            const area = document.getElementById('others-area'); area.innerHTML = "";
            s.forEach(u => {
                if(u.val().phone !== user.phone) {
                    const room = [user.phone, u.val().phone].sort().join("_");
                    area.innerHTML += `<div class="chat-row" onclick="openChat('${room}', '${u.val().name}')"><div class="avatar"></div><b>${u.val().name}</b></div>`;
                }
            });
        });
    }

    loadJSON();
</script>
</body>
</html>
