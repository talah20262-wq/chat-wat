<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Star | AI Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --wa-bg: #0b141a; --wa-header: #202c33; --green: #25d366; --gold: #ffd700; --blue: #34b7f1; }
        body { background: var(--wa-bg); color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        .hidden { display: none !important; }
        
        /* الهيدر والبحث */
        .header { background: var(--wa-header); padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .search-bar { background: #2a3942; border-radius: 10px; display: flex; align-items: center; padding: 5px 15px; }
        .search-bar input { background: transparent; border: none; color: white; width: 100%; padding: 8px; outline: none; }

        /* قائمة الشات */
        .chat-list { height: calc(100vh - 160px); overflow-y: auto; }
        .chat-item { display: flex; align-items: center; padding: 12px 16px; border-bottom: 0.5px solid #222e35; cursor: pointer; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: #54656f; margin-left: 12px; position: relative; }
        .ai-badge { position: absolute; bottom: 0; right: 0; background: var(--gold); color: black; font-size: 0.6rem; padding: 2px 5px; border-radius: 5px; font-weight: bold; }
        
        /* شاشة الشات */
        #chat-window { position: fixed; inset: 0; background: var(--wa-bg); z-index: 5000; display: none; flex-direction: column; }
        #msg-box { flex: 1; overflow-y: auto; padding: 15px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); display: flex; flex-direction: column; gap: 8px; }
        .bubble { max-width: 80%; padding: 10px; border-radius: 12px; font-size: 0.9rem; }
        .me { align-self: flex-end; background: #005c4b; }
        .other { align-self: flex-start; background: #202c33; }

        /* لوحة المالك */
        #admin-panel { position: fixed; inset: 0; background: #0b141a; z-index: 9999; padding: 20px; overflow-y: auto; display: none; }
        .admin-card { background: #202c33; padding: 15px; border-radius: 15px; margin-bottom: 10px; }
        
        /* الدخول */
        .auth-screen { position: fixed; inset: 0; background: #111b21; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .card { background: #222e35; padding: 25px; border-radius: 20px; width: 85%; max-width: 380px; text-align: center; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 25px; border: none; outline: none; }
        .btn-green { background: var(--green); color: black; font-weight: bold; cursor: pointer; }
        .btn-gold { background: var(--gold); color: black; font-weight: bold; cursor: pointer; }
        .gold-txt { color: var(--gold) !important; font-weight: bold; }
    </style>
</head>
<body>

<div id="auth-gate" class="auth-screen">
    <div id="menu-main" class="card">
        <h2 style="color:var(--green)">WhatsApp Star AI</h2>
        <button class="btn-green" onclick="showPane('pane-reg')">طلب انضمام جديد</button>
        <button class="btn-green" style="background:#2a3942; color:white" onclick="showPane('pane-login')">تسجيل دخول بالكود</button>
        <button class="btn-gold" onclick="showPane('pane-admin-login')">بوابة النجم (المالك)</button>
    </div>

    <div id="pane-reg" class="card hidden">
        <h3>إنشاء ملفك</h3>
        <input type="text" id="reg-name" placeholder="الاسم">
        <input type="text" id="reg-phone" placeholder="رقم الهاتف">
        <input type="text" id="reg-desc" placeholder="وصف قصير عنك (Bio)">
        <button class="btn-green" onclick="sendRequest()">إرسال للموافقة</button>
        <p onclick="showPane('menu-main')" style="cursor:pointer; color:#8696a0">رجوع</p>
    </div>

    <div id="pane-login" class="card hidden">
        <input type="text" id="log-phone" placeholder="رقم الهاتف">
        <input type="text" id="log-otp" placeholder="الكود المتغير">
        <button class="btn-green" onclick="checkOTP()">دخول</button>
        <p onclick="getOTP()" style="color:var(--green); cursor:pointer">احصل على كودي المتغير</p>
        <p onclick="showPane('menu-main')" style="cursor:pointer; color:#8696a0">رجوع</p>
    </div>

    <div id="pane-admin-login" class="card hidden">
        <input type="password" id="admin-pass" placeholder="كلمة سر المالك">
        <button class="btn-gold" onclick="adminLogin()">دخول اللوحة</button>
        <p onclick="showPane('menu-main')" style="cursor:pointer; color:#8696a0">رجوع</p>
    </div>
</div>

<div id="app-ui" class="hidden">
    <div class="header">
        <div style="display:flex; justify-content:space-between;">
            <b id="my-name">WhatsApp Star</b>
            <i class="fas fa-sign-out-alt" onclick="localStorage.clear(); location.reload();"></i>
        </div>
        <div class="search-bar">
            <i class="fas fa-search" style="color:#8696a0"></i>
            <input type="text" id="search-input" placeholder="ابحث عن اسم..." oninput="searchUsers()">
        </div>
    </div>

    <div class="chat-list">
        <div class="chat-item" onclick="openChat('ai_bot', 'النجم AI (Gemini)')">
            <div class="avatar" style="background:#673ab7"><i class="fas fa-robot" style="margin:15px"></i><span class="ai-badge">ذكاء اصطناعي</span></div>
            <div><b class="gold-txt">النجم AI (Gemini)</b><br><small style="color:var(--gold)">متصل دائماً لمساعدتك</small></div>
        </div>
        <div id="pinned-group"></div>
        <div id="users-container"></div>
    </div>
</div>

<div id="admin-panel">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 class="gold-txt">لوحة تحكم المالك</h2>
        <button onclick="location.reload()" style="width:70px; background:red; color:white; border-radius:10px">إغلاق</button>
    </div>
    <div class="admin-card">
        <h4>طلبات الموافقة</h4>
        <div id="admin-reqs"></div>
    </div>
    <div class="admin-card">
        <h4>الأعضاء (طرد/حذف)</h4>
        <div id="admin-users"></div>
    </div>
</div>

<div id="chat-window">
    <div class="header" style="flex-direction:row; align-items:center; gap:15px;">
        <i class="fas fa-arrow-right" onclick="location.reload()"></i>
        <b id="active-chat-name"></b>
    </div>
    <div id="msg-box"></div>
    <div style="background:#202c33; padding:10px; display:flex; gap:10px;">
        <input type="text" id="msg-input" placeholder="اكتب رسالة..." style="flex:1; background:#2a3942; border:none; padding:10px; border-radius:20px; color:white;">
        <button onclick="sendMsg()" style="background:var(--green); border:none; width:45px; height:45px; border-radius:50%"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://groop-27edc-default-rtdb.europe-west1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = JSON.parse(localStorage.getItem('star_v10')), curPath = "", allUsers = [];

    if(user) launch();

    function showPane(id) {
        document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    // 1. نظام الطلبات والبيانات
    function sendRequest() {
        const n = document.getElementById('reg-name').value;
        const p = document.getElementById('reg-phone').value;
        const d = document.getElementById('reg-desc').value;
        if(n && p) db.ref('requests').child(p).set({ name:n, phone:p, bio:d, status:'pending' })
        .then(() => { Swal.fire('تم الإرسال', 'انتظر موافقة النجم..', 'info'); showPane('menu-main'); });
    }

    // 2. بوابة المالك
    function adminLogin() {
        if(document.getElementById('admin-pass').value === "2009257mama") {
            document.getElementById('auth-gate').classList.add('hidden');
            document.getElementById('admin-panel').style.display = 'block';
            loadAdmin();
        }
    }

    function loadAdmin() {
        db.ref('requests').on('value', s => {
            const area = document.getElementById('admin-reqs'); area.innerHTML = "";
            s.forEach(req => {
                const u = req.val();
                area.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span>${u.name} - ${u.bio}</span>
                    <button onclick="approve('${u.phone}', '${u.name}', '${u.bio}')" style="background:green; color:white">موافقة</button>
                </div>`;
            });
        });
        db.ref('users').on('value', s => {
            const area = document.getElementById('admin-users'); area.innerHTML = "";
            s.forEach(u => {
                area.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span>${u.val().name}</span>
                    <button onclick="db.ref('users').child('${u.val().phone}').remove()" style="background:red; color:white">طرد</button>
                </div>`;
            });
        });
    }

    function approve(p, n, d) {
        db.ref('users').child(p).set({ name:n, phone:p, bio:d, role:'user' }).then(() => db.ref('requests').child(p).remove());
    }

    // 3. البحث والواجهة
    function launch() {
        document.getElementById('auth-gate').classList.add('hidden');
        document.getElementById('app-ui').classList.remove('hidden');
        document.getElementById('my-name').innerText = user.name;
        loadUsers();
    }

    function loadUsers() {
        db.ref('users').on('value', s => {
            allUsers = [];
            s.forEach(u => allUsers.push(u.val()));
            displayUsers(allUsers);
        });
    }

    function displayUsers(list) {
        const area = document.getElementById('users-container'); area.innerHTML = "";
        list.forEach(u => {
            if(u.phone !== user.phone) {
                const room = [user.phone, u.phone].sort().join("_");
                area.innerHTML += `<div class="chat-item" onclick="openChat('${room}', '${u.name}')">
                    <div class="avatar"></div>
                    <div><b>${u.name}</b><br><small style="color:#8696a0">${u.bio || 'لا يوجد وصف'}</small></div>
                </div>`;
            }
        });
    }

    function searchUsers() {
        const query = document.getElementById('search-input').value.toLowerCase();
        const filtered = allUsers.filter(u => u.name.toLowerCase().includes(query));
        displayUsers(filtered);
    }

    // 4. الشات والذكاء الاصطناعي
    function openChat(path, name) {
        curPath = path;
        document.getElementById('active-chat-name').innerText = name;
        document.getElementById('chat-window').style.display = 'flex';
        db.ref('chats/'+path).on('value', s => {
            const box = document.getElementById('msg-box'); box.innerHTML = "";
            s.forEach(m => {
                const d = m.val();
                box.innerHTML += `<div class="bubble ${d.n===user.name?'me':'other'}"><b>${d.n}:</b><br>${d.b}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMsg() {
        const i = document.getElementById('msg-input'); if(!i.value) return;
        const msg = i.value;
        db.ref('chats/'+curPath).push({ n:user.name, b:msg });
        i.value = "";

        // رد الذكاء الاصطناعي لو الشات مع البوت
        if(curPath === 'ai_bot') {
            setTimeout(() => {
                const aiResponses = ["أهلاً بك! أنا النجم AI، كيف يمكنني مساعدتك اليوم؟", "سؤال جميل، دعني أفكر..", "أنا هنا لخدمتك دائماً يا صديقي.", "هل تريد مني أن أخبر النجم (المالك) بشيء ما؟"];
                const rand = aiResponses[Math.floor(Math.random() * aiResponses.length)];
                db.ref('chats/ai_bot').push({ n: 'النجم AI', b: rand });
            }, 1000);
        }
    }

    // 5. الكود المتغير
    function generateOTP(phone) {
        const step = Math.floor(Date.now() / 30000);
        return (Math.abs(Math.sin(step + parseInt(phone.slice(-3)))) * 899999 + 100000).toFixed(0);
    }

    function getOTP() {
        const p = document.getElementById('log-phone').value;
        db.ref('users').child(p).once('value', s => {
            if(s.val()) Swal.fire('كودك الحالي:', generateOTP(p), 'success');
            else Swal.fire('غير مقبول بعد');
        });
    }

    function checkOTP() {
        const p = document.getElementById('log-phone').value;
        const o = document.getElementById('log-otp').value;
        if(o === generateOTP(p)) {
            db.ref('users').child(p).once('value', s => {
                localStorage.setItem('star_v10', JSON.stringify(s.val()));
                location.reload();
            });
        } else Swal.fire('الكود خطأ');
    }
</script>
</body>
</html>
