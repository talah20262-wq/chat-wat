<script>
const firebaseConfig = {
  databaseURL: "https://talah-c12c5-default-rtdb.asia-southeast1.firebasedatabase.app/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let user = JSON.parse(localStorage.getItem('najm_pro_session'));
let activeChatID = null;

// ================= AUTH =================
function performAuth() {
    const input = document.getElementById('login-code').value;

    db.ref('users').once('value', snap => {
        let found = false;

        snap.forEach(child => {
            const u = child.val();

            // تسجيل بالكود أو رقم + باسورد
            if (u.loginCode === input || (u.phone === input && u.password === input)) {
                saveSession(u);
                found = true;
            }
        });

        if (!found) {
            document.getElementById('error-msg').style.display = 'block';
        }
    });
}

function saveSession(data) {
    localStorage.setItem('najm_pro_session', JSON.stringify(data));
    location.reload();
}

// ================= INIT =================
if(user){
    document.getElementById('auth-panel').style.display = 'none';
    document.getElementById('main-app').style.display = 'flex';

    if(user.role === 'admin'){
        document.getElementById('king-btn').classList.remove('hidden');
    }

    initMain();
    setOnlineStatus(true);
}

window.onbeforeunload = () => setOnlineStatus(false);

// ================= ONLINE =================
function setOnlineStatus(status){
    db.ref('users/' + user.phone).update({
        online: status,
        lastSeen: Date.now()
    });
}

// ================= MAIN =================
function initMain(){

    // تحميل المستخدمين
    db.ref('users').on('value', snap => {
        const list = document.getElementById('chats-list');
        list.innerHTML = "";

        snap.forEach(child => {
            const u = child.val();
            if(u.phone === user.phone) return;

            list.innerHTML += `
            <div class="user-row" onclick="openChat('${u.phone}','${u.name}','${u.pfp}')">
                <div class="pfp-wrap"><img src="${u.pfp}"></div>
                <div class="user-meta">
                    <div class="meta-top">
                        <span class="user-name">${u.name}</span>
                    </div>
                    <div class="user-status">
                        ${u.online ? 'متصل الآن 🟢' : 'آخر ظهور: ' + formatTime(u.lastSeen)}
                    </div>
                </div>
            </div>`;
        });
    });
}

// ================= CHAT =================
function openChat(id, name, pfp){
    activeChatID = [user.phone, id].sort().join("_");

    document.getElementById('chat-window').style.display = 'flex';
    document.getElementById('chat-name').innerText = name;
    document.getElementById('chat-pfp').src = pfp;

    // مهم جدًا: إلغاء القديم
    db.ref('messages/' + activeChatID).off();

    db.ref('messages/' + activeChatID).on('value', snap => {
        const box = document.getElementById('chat-messages');
        box.innerHTML = "";

        snap.forEach(m => {
            const msg = m.val();
            const isMe = msg.sender === user.phone;

            const div = document.createElement('div');
            div.className = "msg-bubble " + (isMe ? 'sent' : 'received');

            div.innerHTML = `
                ${msg.text}
                <div class="msg-time">${formatTime(msg.time)}</div>
            `;

            box.appendChild(div);
        });

        box.scrollTop = box.scrollHeight;
    });
}

function sendMessage(){
    const inp = document.getElementById('msg-input');

    if(!inp.value.trim() || !activeChatID) return;

    db.ref('messages/' + activeChatID).push({
        sender: user.phone,
        text: inp.value,
        time: Date.now(),
        seen: false
    });

    inp.value = "";
}

// ================= TIME =================
function formatTime(t){
    if(!t) return '';

    const d = new Date(t);
    return d.toLocaleTimeString('ar-EG', {
        hour: '2-digit',
        minute: '2-digit'
    });
}

// ================= ADMIN =================
function addUser(){
    const name = document.getElementById('u-name').value;
    const phone = document.getElementById('u-phone').value;
    const password = document.getElementById('u-code').value;

    if(!name || !phone || !password) return;

    db.ref('users/' + phone).set({
        name,
        phone,
        password,
        role: 'user',
        online: false,
        lastSeen: Date.now(),
        pfp: 'https://cdn-icons-png.flaticon.com/512/149/149071.png',
        bio: 'Najm User'
    }).then(()=>{
        Swal.fire('تم','المستخدم جاهز','success');
    });
}

function deleteUser(p){
    db.ref('users/' + p).remove();
}

// ================= UI =================
function closeChat(){
    document.getElementById('chat-window').style.display = 'none';
}

function logout(){
    localStorage.clear();
    location.reload();
}
</script>
