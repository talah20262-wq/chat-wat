<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Star | واتساب النجم</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --main-bg: #0b141a; --accent: #00a884; --card-bg: #222e35; --text: #e9edef; }
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--main-bg); color: var(--text); overflow: hidden; }
        
        /* شاشة الدخول */
        #auth-screen { position: fixed; inset: 0; background: #111b21; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .auth-card { background: var(--card-bg); padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .auth-btn { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-owner { background: var(--accent); color: white; }
        .btn-user { background: #3b4a54; color: white; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; background: #2a3942; color: white; box-sizing: border-box; text-align: center; }

        /* حالة الانتظار */
        #wait-screen { display: none; text-align: center; }
        .code-box { background: #111b21; padding: 20px; border: 2px dashed var(--accent); border-radius: 15px; margin: 20px 0; font-size: 1.5rem; color: #ffd700; letter-spacing: 5px; }

        /* واجهة الشات */
        #main-app { display: none; height: 100vh; flex-direction: column; }
        header { background: #202c33; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); display: flex; flex-direction: column; gap: 10px; }
        
        .msg { max-width: 75%; padding: 10px; border-radius: 12px; font-size: 0.95rem; }
        .sent { align-self: flex-end; background: #005c4b; }
        .received { align-self: flex-start; background: #202c33; }

        .input-bar { background: #202c33; padding: 10px; display: flex; align-items: center; gap: 10px; }
        .icon-btn { color: #8696a0; font-size: 1.5rem; cursor: pointer; }
        #admin-panel { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: none; padding: 20px; overflow-y: auto; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card" id="gate">
        <h2 style="color:var(--accent)">واتساب النجم</h2>
        <button class="auth-btn btn-owner" onclick="showSection('owner-form')">دخول المالك</button>
        <button class="auth-btn btn-user" onclick="showSection('signup-form')">إنشاء حساب جديد</button>
        <button class="auth-btn btn-user" style="background:#005c4b" onclick="showSection('login-form')">دخول مباشر (بالكود)</button>
    </div>

    <div class="auth-card" id="owner-form" style="display:none">
        <h3>دخول المالك</h3>
        <input type="password" id="owner-pass" placeholder="كلمة السر">
        <button class="auth-btn btn-owner" onclick="authOwner()">دخول</button>
        <p onclick="showSection('gate')" style="cursor:pointer; font-size:0.8rem">رجوع</p>
    </div>

    <div class="auth-card" id="signup-form" style="display:none">
        <h3>طلب انضمام</h3>
        <input type="text" id="reg-name" placeholder="الاسم المستعار">
        <input type="text" id="reg-phone" placeholder="رقم الهاتف">
        <button class="auth-btn btn-owner" onclick="submitSignup()">إرسال الطلب</button>
        <p onclick="showSection('gate')" style="cursor:pointer; font-size:0.8rem">رجوع</p>
    </div>

    <div class="auth-card" id="wait-screen">
        <h3 style="color:var(--accent)">تم إرسال طلبك بنجاح</h3>
        <p>بانتظار أن يصدر المالك كود الدخول الخاص بك...</p>
        <div id="loading-spinner"><i class="fas fa-spinner fa-spin fa-2x"></i></div>
        <div id="code-received-area" style="display:none">
            <p>مبروك! تم إصدار الكود الخاص بك:</p>
            <div class="code-box" id="display-code">----</div>
            <button class="auth-btn btn-owner" onclick="directEntry()">دخول مباشر الآن</button>
        </div>
    </div>

    <div class="auth-card" id="login-form" style="display:none">
        <h3>دخول الجروب</h3>
        <input type="text" id="log-phone" placeholder="رقم الهاتف">
        <input type="text" id="log-code" placeholder="الكود السري">
        <button class="auth-btn btn-owner" onclick="authUserManually()">دخول</button>
        <p onclick="showSection('gate')" style="cursor:pointer; font-size:0.8rem">رجوع</p>
    </div>
</div>

<div id="main-app">
    <header>
        <b id="user-display">واتساب النجم</b>
        <div style="display:flex; gap:15px">
            <i id="admin-icon" class="fas fa-user-shield" style="display:none; cursor:pointer; color:var(--accent)" onclick="toggleAdmin(true)"></i>
            <i class="fas fa-sign-out-alt" onclick="localStorage.clear(); location.reload();"></i>
        </div>
    </header>
    <div id="chat-box"></div>
    <div class="input-bar">
        <input type="text" id="msg-input" placeholder="اكتب رسالة...">
        <i class="fas fa-paper-plane icon-btn" style="color:var(--accent)" onclick="pushMsg()"></i>
    </div>
</div>

<div id="admin-panel">
    <div style="display:flex; justify-content:space-between; align-items:center">
        <h2>طلبات الانتظار</h2>
        <button onclick="toggleAdmin(false)" style="padding:10px; border-radius:8px">إغلاق</button>
    </div>
    <div id="admin-list"></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://groop-27edc-default-rtdb.europe-west1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let session = JSON.parse(localStorage.getItem('star_session'));
    let tempPhone = localStorage.getItem('waiting_phone');

    if(session) { startApp(); } 
    else if(tempPhone) { showSection('wait-screen'); watchForCode(tempPhone); }

    function showSection(id) {
        ['gate','owner-form','signup-form','wait-screen','login-form'].forEach(s => document.getElementById(s).style.display='none');
        document.getElementById(id).style.display='block';
    }

    function authOwner() {
        if(document.getElementById('owner-pass').value === "2009257mama") {
            saveSession({ name: "المالك", role: "admin" });
        } else { Swal.fire('باسورد خطأ'); }
    }

    function submitSignup() {
        const name = document.getElementById('reg-name').value;
        const phone = document.getElementById('reg-phone').value;
        if(!name || !phone) return;
        
        db.ref('requests').child(phone).set({ name, phone }).then(() => {
            localStorage.setItem('waiting_phone', phone);
            showSection('wait-screen');
            watchForCode(phone);
        });
    }

    // مراقبة قاعدة البيانات حتى يصدر المالك الكود
    function watchForCode(phone) {
        db.ref('users').child(phone).on('value', s => {
            if(s.val()) {
                const data = s.val();
                document.getElementById('loading-spinner').style.display = 'none';
                document.getElementById('code-received-area').style.display = 'block';
                document.getElementById('display-code').innerText = data.code;
                localStorage.setItem('temp_data', JSON.stringify(data));
            }
        });
    }

    function directEntry() {
        const data = JSON.parse(localStorage.getItem('temp_data'));
        saveSession(data);
        localStorage.removeItem('waiting_phone');
        localStorage.removeItem('temp_data');
    }

    function authUserManually() {
        const phone = document.getElementById('log-phone').value;
        const code = document.getElementById('log-code').value;
        db.ref('users').child(phone).once('value', s => {
            if(s.val() && s.val().code === code) { saveSession(s.val()); }
            else { Swal.fire('بيانات خطأ'); }
        });
    }

    function saveSession(data) { localStorage.setItem('star_session', JSON.stringify(data)); location.reload(); }

    function startApp() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'flex';
        document.getElementById('user-display').innerText = session.name;
        if(session.role === 'admin') {
            document.getElementById('admin-icon').style.display = 'block';
            loadAdminTasks();
        }
        loadChat();
    }

    function loadAdminTasks() {
        db.ref('requests').on('value', s => {
            const list = document.getElementById('admin-list');
            list.innerHTML = "";
            s.forEach(r => {
                const req = r.val();
                list.innerHTML += `
                    <div style="background:#2a3942; padding:15px; border-radius:12px; margin-bottom:10px">
                        <p>👤 ${req.name} (${req.phone})</p>
                        <input type="text" id="in-${req.phone}" placeholder="أدخل كود مخصص له">
                        <button class="auth-btn btn-owner" onclick="approve('${req.phone}', '${req.name}')">تفعيل الحساب</button>
                    </div>`;
            });
        });
    }

    window.approve = (phone, name) => {
        const code = document.getElementById('in-'+phone).value;
        if(!code) return;
        db.ref('users').child(phone).set({ name, phone, code, role: 'user' }).then(() => {
            db.ref('requests').child(phone).remove();
        });
    }

    function pushMsg() {
        const i = document.getElementById('msg-input');
        if(!i.value) return;
        db.ref('msgs').push({ n: session.name, b: i.value, t: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
        i.value = "";
    }

    function loadChat() {
        db.ref('msgs').limitToLast(50).on('value', s => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            s.forEach(m => {
                const d = m.val();
                const isMe = d.n === session.name;
                box.innerHTML += `<div class="msg ${isMe?'sent':'received'}"><b>${d.n}</b><br>${d.b}<div style="font-size:0.6rem; opacity:0.5; text-align:left">${d.t}</div></div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function toggleAdmin(s) { document.getElementById('admin-panel').style.display = s ? 'block' : 'none'; }
</script>
</body>
</html>
