<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tallah Star | The Sovereign Empire v29</title>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --gold: #d4af37; --royal: linear-gradient(135deg, #d4af37, #f9f295, #ab8e28);
            --black: #050505; --dark: #0b141a; --green: #00a884; --glass: rgba(15, 23, 30, 0.95);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; transition: 0.3s; }
        body { background: var(--black); color: white; height: 100vh; overflow: hidden; }

        /* شاشات */
        .screen { position: fixed; inset: 0; display: none; flex-direction: column; z-index: 10; background: var(--black); }
        .active { display: flex !important; }

        /* الهيدر الإمبراطوري */
        header { background: var(--dark); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); }

        /* لوحة العرش */
        #admin-drawer { 
            position: fixed; left: -100%; top: 0; width: 85%; max-width: 420px; height: 100%; 
            background: #080808; z-index: 10000; padding: 25px; border-right: 3px solid var(--gold); overflow-y: auto;
        }
        .drawer-open { left: 0 !important; }

        /* منطقة اللايف (Live Zone) */
        #live-container {
            position: fixed; top: 70px; right: 15px; width: 220px; height: 150px; 
            background: black; border: 2px solid var(--gold); border-radius: 15px; overflow: hidden;
            z-index: 9999; display: none; box-shadow: 0 0 20px rgba(212,175,55,0.5);
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        .live-tag { position: absolute; top: 10px; left: 10px; background: red; color: white; padding: 2px 8px; border-radius: 5px; font-size: 10px; font-weight: bold; animation: pulse 1s infinite; }

        /* الشات */
        .chat-box { flex: 1; overflow-y: auto; padding: 20px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; background-color: rgba(0,0,0,0.92); }
        .bubble { max-width: 80%; padding: 14px; border-radius: 20px; margin-bottom: 15px; position: relative; animation: slideInUp 0.4s; }
        .bubble.me { background: #005c4b; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bubble.other { background: #202c33; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid rgba(212,175,55,0.2); }
        .admin-glow { border: 1px solid var(--gold) !important; box-shadow: 0 0 15px var(--gold); }

        /* أزرار وعناصر */
        .btn-royal { background: var(--royal); color: black; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; }
        .input-dark { background: #1a252b; border: 1px solid #333; padding: 14px; border-radius: 25px; color: white; width: 100%; outline: none; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        #matrix { position: fixed; inset: 0; z-index: -1; opacity: 0.12; }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div id="live-container">
    <div class="live-tag">LIVE</div>
    <video id="live-video" autoplay playsinline muted></video>
</div>

<div id="admin-drawer">
    <h2 style="color:var(--gold); margin-bottom:20px;"><i class="fas fa-crown"></i> إدارة الإمبراطورية</h2>
    
    <div class="card" style="background:#111; padding:15px; border-radius:15px; border:1px solid var(--gold); margin-bottom:15px;">
        <h4 style="color:var(--gold); margin-bottom:10px;"><i class="fas fa-video"></i> البث المباشر للملك</h4>
        <button id="btn-start-live" onclick="startLive()" class="btn-royal" style="margin-bottom:10px;">بدء البث المباشر</button>
        <button id="btn-stop-live" onclick="stopLive()" class="btn-royal" style="background:red; color:white; display:none;">إنهاء البث</button>
    </div>

    <div class="card" style="background:#111; padding:15px; border-radius:15px; border:1px solid #333;">
        <h4><i class="fas fa-user-clock"></i> طلبات الانضمام</h4>
        <div id="req-list"></div>
    </div>

    <div class="card" style="background:#111; padding:15px; border-radius:15px; border:1px solid #333; margin-top:15px;">
        <h4><i class="fas fa-users"></i> التحكم بالأعضاء</h4>
        <div id="user-admin-list"></div>
    </div>
    
    <button onclick="toggleDrawer()" class="btn-royal" style="background:none; border:1px solid gray; color:gray; margin-top:20px;">إغلاق</button>
</div>

<div id="view-gate" class="screen active" style="justify-content:center; align-items:center; background: radial-gradient(#1c282f, #050505);">
    <div class="animate__animated animate__zoomIn" style="width:85%; max-width:400px; background:var(--glass); padding:40px; border-radius:30px; border:2px solid var(--gold); text-align:center; backdrop-filter: blur(10px);">
        <h1 style="color:var(--gold); font-size:45px; text-shadow: 0 0 15px var(--gold); letter-spacing: 5px;">TALLAH</h1>
        <div id="auth-forms">
            <input type="password" id="entry-code" class="input-dark" style="text-align:center; margin-bottom:20px;" placeholder="ادخل كود المملكة">
            <button onclick="login()" class="btn-royal">دخول الآن</button>
            <p style="margin-top:20px; font-size:12px;">ليس لديك حساب؟ <span onclick="requestEntry()" style="color:var(--gold); cursor:pointer;">اطلب انضمام</span></p>
        </div>
    </div>
</div>

<div id="view-main" class="screen">
    <header>
        <i class="fas fa-dragon btn-royal" style="background:none; font-size:24px;" onclick="toggleDrawer()"></i>
        <b style="color:var(--gold)">TALLAH EMPIRE v29</b>
        <i class="fas fa-power-off" style="color:red;" onclick="logout()"></i>
    </header>
    <div id="chat-list" style="flex:1; overflow-y:auto; padding:20px;"></div>
</div>

<div id="view-chat" class="screen">
    <header>
        <div style="display:flex; align-items:center; gap:10px;">
            <i class="fas fa-arrow-right" onclick="showView('view-main')"></i>
            <b id="chat-name-display"></b>
        </div>
    </header>
    <div id="chat-box" class="chat-box" style="display:flex; flex-direction:column;"></div>
    <div style="background:#202c33; padding:15px; display:flex; gap:10px;">
        <input type="text" id="msg-input" class="input-dark" placeholder="تحدث يا بطل...">
        <button onclick="sendMsg()" style="background:none; border:none; color:var(--green); font-size:28px;"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://talah-c12c5-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let me = JSON.parse(localStorage.getItem('tallah_v29_core'));
    let activeKey, targetUid;
    let localStream;

    if(me) { showView('view-main'); initEmpire(); }

    function showView(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // --- نظام اللايف (The Royal Live) ---
    async function startLive() {
        if(me.role !== 'admin') return;
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('live-video').srcObject = localStream;
            db.ref('live_status').set({ active: true, startTime: Date.now() });
            document.getElementById('btn-start-live').style.display = 'none';
            document.getElementById('btn-stop-live').style.display = 'block';
            Swal.fire('تم بدء البث', 'الجميع يرونك الآن يا ملك', 'success');
        } catch (err) {
            Swal.fire('خطأ', 'تأكد من إذن الكاميرا', 'error');
        }
    }

    function stopLive() {
        if(localStream) {
            localStream.getTracks().forEach(track => track.stop());
            db.ref('live_status').set({ active: false });
            document.getElementById('btn-start-live').style.display = 'block';
            document.getElementById('btn-stop-live').style.display = 'none';
            document.getElementById('live-container').style.display = 'none';
        }
    }

    // استماع لحالة اللايف للكل
    db.ref('live_status').on('value', s => {
        const live = s.val();
        const container = document.getElementById('live-container');
        if(live && live.active) {
            container.style.display = 'block';
            // في النسخة الحقيقية هنحتاج WebRTC للربط، هنا بنبين الـ UI كـ فكرة مدمجة
        } else {
            container.style.display = 'none';
        }
    });

    // --- نظام الدخول ---
    function login() {
        const code = document.getElementById('entry-code').value;
        if(code === "248") { 
            me = { uid:'admin', name:'الإمبراطور', role:'admin', active:true };
            saveUser(); return;
        }
        db.ref('users').once('value', s => {
            let found = false;
            s.forEach(u => {
                if(u.val().code === code && u.val().active && !u.val().banned) {
                    me = {...u.val(), uid: u.key};
                    saveUser(); found = true;
                }
            });
            if(!found) Swal.fire('خطأ','الكود غير صحيح أو حسابك لم يتفعل','error');
        });
    }

    async function requestEntry() {
        const { value: form } = await Swal.fire({
            title: 'طلب انضمام',
            html: '<input id="n" class="swal2-input" placeholder="اسمك"><input id="c" class="swal2-input" placeholder="كودك">',
            preConfirm: () => [document.getElementById('n').value, document.getElementById('c').value]
        });
        if(form && form[0]) db.ref('users').push({ name: form[0], code: form[1], active: false, banned: false, role: 'user' });
    }

    function saveUser() { localStorage.setItem('tallah_v29_core', JSON.stringify(me)); location.reload(); }

    // --- إدارة الإمبراطورية ---
    function initEmpire() {
        db.ref('status/'+me.uid).set(true);
        db.ref('status/'+me.uid).onDisconnect().set(false);
        loadChatList();
        initMatrix();
        if(me.role === 'admin') loadAdminTools();
    }

    function loadAdminTools() {
        db.ref('users').on('value', s => {
            const reqBox = document.getElementById('req-list'), userBox = document.getElementById('user-admin-list');
            reqBox.innerHTML = ""; userBox.innerHTML = "";
            s.forEach(u => {
                if(u.key === 'admin') return;
                const d = u.val();
                const card = `<div style="background:#222; padding:10px; border-radius:10px; margin-top:10px;">
                    <b>${d.name}</b> (${d.code})<br>
                    <button onclick="db.ref('users/${u.key}').update({active:true})" style="color:var(--green); background:none; border:none;">تفعيل</button>
                    <button onclick="db.ref('users/${u.key}').update({banned:!${d.banned}})" style="color:red; background:none; border:none;">${d.banned?'فك':'طرد'}</button>
                </div>`;
                d.active ? userBox.innerHTML += card : reqBox.innerHTML += card;
            });
        });
    }

    function loadChatList() {
        db.ref('users').on('value', s => {
            const list = document.getElementById('chat-list'); list.innerHTML = "";
            s.forEach(u => {
                if(u.key === me.uid || !u.val().active || u.val().banned) return;
                list.innerHTML += `<div class="animate__animated animate__fadeInRight" onclick="openChat('${u.key}','${u.val().name}')" style="background:#111b21; padding:15px; border-radius:15px; margin-bottom:10px; border-right:4px solid var(--gold);">
                    <b>${u.val().name}</b> <span id="online-${u.key}" style="font-size:10px; color:gray;">●</span>
                </div>`;
                db.ref('status/'+u.key).on('value', st => {
                    const el = document.getElementById('online-'+u.key);
                    if(el) el.style.color = st.val() ? 'var(--green)' : 'gray';
                });
            });
        });
    }

    function openChat(uid, name) {
        targetUid = uid; activeKey = [me.uid, uid].sort().join("_");
        document.getElementById('chat-name-display').innerText = name;
        showView('view-chat');
        db.ref('messages/'+activeKey).on('value', s => {
            const box = document.getElementById('chat-box'); box.innerHTML = "";
            s.forEach(m => {
                const d = m.val();
                box.innerHTML += `<div class="bubble ${d.sender===me.uid?'me':'other'} ${d.role==='admin'?'admin-glow':''}">
                    ${d.role==='admin'?'<span style="font-size:10px; color:var(--gold); display:block;">👑 إمبراطور طلة</span>':''}
                    ${d.text}
                </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMsg() {
        const inp = document.getElementById('msg-input');
        if(!inp.value) return;
        db.ref('messages/'+activeKey).push({ sender: me.uid, text: inp.value, role: me.role, time: Date.now() });
        inp.value = "";
    }

    // --- تأثير الماتريكس ---
    function initMatrix() {
        const c = document.getElementById("matrix"), ctx = c.getContext("2d");
        c.height = window.innerHeight; c.width = window.innerWidth;
        const drops = Array(Math.floor(c.width/10)).fill(1);
        setInterval(() => {
            ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,c.width,c.height);
            ctx.fillStyle = "#d4af37"; ctx.font = "10px arial";
            drops.forEach((y, i) => {
                ctx.fillText("TALLAH"[Math.floor(Math.random()*6)], i*10, y*10);
                if(y*10 > c.height && Math.random() > 0.975) drops[i] = 0; drops[i]++;
            });
        }, 33);
    }

    function toggleDrawer() { document.getElementById('admin-drawer').classList.toggle('drawer-open'); }
    function logout() { localStorage.clear(); location.reload(); }
    window.onkeydown = (e) => { if(e.key === 'Enter') sendMsg(); };
</script>
</body>
</html>
