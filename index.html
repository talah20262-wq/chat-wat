<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Star V3 | الإمبراطورية العظمى</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #0b141a;
            --header: #202c33;
            --accent: #25d366;
            --gold: #d4af37;
            --text: #e9edef;
            --msg-me: #005c4b;
            --msg-other: #202c33;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* --- شاشات الدخول (بدون تداخل) --- */
        .full-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .royal-card { background: #222e35; width: 100%; max-width: 400px; padding: 35px; border-radius: 30px; border: 2px solid var(--gold); text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        .input-group { margin-bottom: 20px; position: relative; }
        input { width: 100%; padding: 16px; border-radius: 12px; border: none; background: #2a3942; color: white; text-align: center; font-size: 16px; outline: none; }
        input:focus { box-shadow: 0 0 8px var(--gold); }

        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-green { background: var(--accent); color: #000; }
        .btn-gold { background: transparent; color: var(--gold); border: 2px solid var(--gold); }

        /* --- الواجهة الرئيسية --- */
        .app-container { display: none; height: 100vh; flex-direction: column; }
        header { background: var(--header); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); }
        
        .header-left { display: flex; align-items: center; gap: 15px; }
        .pfp-circle { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; cursor: pointer; }
        
        .header-right { display: flex; gap: 25px; font-size: 24px; color: var(--gold); }
        .header-right i { cursor: pointer; transition: 0.2s; }
        .header-right i:hover { transform: scale(1.2); }

        /* --- قائمة الدردشات --- */
        .list-view { flex: 1; overflow-y: auto; background: #111b21; }
        .chat-item { display: flex; align-items: center; padding: 15px 20px; border-bottom: 1px solid #1c282f; cursor: pointer; transition: 0.2s; }
        .chat-item:hover { background: #2a3942; }

        /* --- نافذة المحادثة (الزرار شغال 100%) --- */
        .chat-window { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: none; flex-direction: column; }
        .chat-msgs { flex: 1; overflow-y: auto; padding: 20px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; background-color: var(--bg); display: flex; flex-direction: column; gap: 8px; }
        
        .bubble { max-width: 80%; padding: 12px; border-radius: 15px; position: relative; font-size: 15px; }
        .bubble.me { align-self: flex-end; background: var(--msg-me); border-top-left-radius: 0; }
        .bubble.other { align-self: flex-start; background: var(--msg-other); border-top-right-radius: 0; }

        .input-bar { background: var(--header); padding: 15px; display: flex; align-items: center; gap: 12px; }
        #msg-input { flex: 1; background: #2a3942; border: none; padding: 12px 18px; border-radius: 25px; color: white; outline: none; }

        /* --- قائمة الإعدادات (جوه الخانة) --- */
        .settings-view { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; display: none; align-items: center; justify-content: center; }
        .settings-card { background: #1c282f; width: 90%; max-width: 450px; padding: 30px; border-radius: 20px; border: 2px solid var(--gold); }
        .setting-opt { width: 100%; padding: 15px; border: 1px solid #313d45; border-radius: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    </style>
</head>
<body>

<audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

<div id="screen-auth" class="full-screen">
    <div class="royal-card">
        <h1 style="color:var(--gold); margin-bottom:20px"><i class="fas fa-star"></i> WhatsApp Star</h1>
        <div class="input-group"><input type="text" id="in-name" placeholder="الاسم المستعار"></div>
        <div class="input-group"><input type="tel" id="in-phone" placeholder="رقم الهاتف"></div>
        <button class="btn btn-green" onclick="appLogin()">دخول المملكة 🚀</button>
        <button class="btn btn-gold" onclick="ownerPortal()">دخول المالك 👑</button>
    </div>
</div>

<div id="screen-app" class="app-container">
    <header>
        <div class="header-left">
            <img id="my-pfp" src="" class="pfp-circle" onclick="openSettings()">
            <b id="my-name-top" style="font-size: 18px;"></b>
        </div>
        <div class="header-right">
            <i class="fas fa-users-cog" id="admin-icon" style="display:none" onclick="openAdminPanel()"></i>
            <i class="fas fa-cog" onclick="openSettings()"></i>
            <i class="fas fa-sign-out-alt" onclick="logout()"></i>
        </div>
    </header>

    <div class="list-view">
        <div class="chat-item" onclick="openChat('global_group', 'الجروب الملكي العام', 'https://cdn-icons-png.flaticon.com/512/166/166258.png')">
            <img src="https://cdn-icons-png.flaticon.com/512/166/166258.png" class="pfp-circle" style="margin-left:15px">
            <div><b>الجروب الملكي العام 👑</b><br><small style="color:var(--gold)">شات لكل الأعضاء</small></div>
        </div>
        <div id="contacts-list"></div>
    </div>
</div>

<div id="screen-chat" class="chat-window">
    <header>
        <div class="header-left">
            <i class="fas fa-arrow-right" onclick="closeChat()" style="font-size:20px; cursor:pointer"></i>
            <img id="chat-pfp" src="" class="pfp-circle">
            <b id="chat-title-name"></b>
        </div>
        <div class="header-right">
            <i class="fas fa-video" onclick="makeCall('فيديو')"></i>
            <i class="fas fa-phone" onclick="makeCall('صوتية')"></i>
        </div>
    </header>
    <div id="msgs-box" class="chat-msgs"></div>
    <div class="input-bar">
        <label for="img-up"><i class="fas fa-image" style="font-size:24px; color:var(--gold); cursor:pointer"></i></label>
        <input type="file" id="img-up" style="display:none" accept="image/*" onchange="sendImage(this)">
        <input type="text" id="msg-input" placeholder="اكتب رسالتك...">
        <i class="fas fa-paper-plane" style="font-size:24px; color:var(--accent); cursor:pointer" onclick="sendText()"></i>
    </div>
</div>

<div id="screen-settings" class="settings-view">
    <div class="settings-card">
        <h2 style="color:var(--gold); text-align:center; margin-bottom:20px">غرفة التحكم</h2>
        <div class="setting-opt" onclick="updateName()">
            <span>تغيير الاسم</span>
            <i class="fas fa-chevron-left"></i>
        </div>
        <div class="setting-opt" onclick="updatePhoto()">
            <span>تغيير اللوجو الشخصي</span>
            <i class="fas fa-camera"></i>
        </div>
        <div class="setting-opt">
            <span>اللغة: العربية EG</span>
            <i class="fas fa-globe"></i>
        </div>
        <button class="btn btn-green" onclick="closeSettings()">حفظ وإغلاق ✅</button>
    </div>
</div>

<script>
    // --- الربط بالداتابيز ---
    const firebaseConfig = { databaseURL: "https://talah-c12c5-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let me = JSON.parse(localStorage.getItem('star_session_v3'));
    let activeChat = null;

    if(me) launch();

    function appLogin() {
        const name = document.getElementById('in-name').value, phone = document.getElementById('in-phone').value;
        if(!name || !phone) return Swal.fire('بيانات ناقصة','اكتب اسمك ورقمك','warning');
        const data = { name, phone, pfp: 'https://cdn-icons-png.flaticon.com/512/149/149071.png', role: 'user' };
        db.ref('users/' + phone).set(data).then(() => {
            localStorage.setItem('star_session_v3', JSON.stringify(data));
            location.reload();
        });
    }

    async function ownerPortal() {
        const { value: code } = await Swal.fire({ title: 'كود المالك', input: 'password' });
        if(code === "2009257mama") {
            const admin = { name: 'الإمبراطور المالك 👑', phone: 'admin_001', role: 'admin', pfp: 'https://cdn-icons-png.flaticon.com/512/149/149071.png' };
            localStorage.setItem('star_session_v3', JSON.stringify(admin));
            location.reload();
        }
    }

    function launch() {
        document.getElementById('screen-auth').style.display = 'none';
        document.getElementById('screen-app').style.display = 'flex';
        document.getElementById('my-name-top').innerText = me.name;
        document.getElementById('my-pfp').src = me.pfp;
        if(me.role === 'admin') document.getElementById('admin-icon').style.display = 'block';

        db.ref('users').on('value', snap => {
            const list = document.getElementById('contacts-list');
            list.innerHTML = "";
            snap.forEach(u => {
                const user = u.val();
                if(user.phone === me.phone) return;
                list.innerHTML += `
                    <div class="chat-item" onclick="openChat('${user.phone}', '${user.name}', '${user.pfp}')">
                        <img src="${user.pfp}" class="pfp-circle" style="margin-left:15px">
                        <div><b>${user.name}</b><br><small>متوفر في المملكة</small></div>
                    </div>`;
            });
        });
    }

    function openChat(phone, name, pfp) {
        activeChat = (phone === 'global_group') ? 'global_group' : [me.phone, phone].sort().join("_");
        document.getElementById('screen-chat').style.display = 'flex';
        document.getElementById('chat-title-name').innerText = name;
        document.getElementById('chat-pfp').src = pfp;

        db.ref('chats/' + activeChat).off();
        db.ref('chats/' + activeChat).on('value', snap => {
            const box = document.getElementById('msgs-box');
            box.innerHTML = "";
            snap.forEach(m => {
                const d = m.val();
                const isMe = d.s === me.phone;
                box.innerHTML += `<div class="bubble ${isMe ? 'me' : 'other'}">
                    ${activeChat === 'global_group' && !isMe ? `<small style="color:var(--gold); display:block">${d.sender_name}</small>` : ''}
                    ${d.t}
                </div>`;
            });
            box.scrollTop = box.scrollHeight;
            if(snap.exists()) document.getElementById('notif-sound').play();
        });
    }

    function sendText() {
        const val = document.getElementById('msg-input').value;
        if(!val) return;
        db.ref('chats/' + activeChat).push({ s: me.phone, sender_name: me.name, t: val });
        document.getElementById('msg-input').value = "";
    }

    function sendImage(input) {
        if(input.files && input.files[0]) {
            const r = new FileReader();
            r.onload = (e) => db.ref('chats/' + activeChat).push({ s: me.phone, sender_name: me.name, t: `<img src="${e.target.result}" style="max-width:100%; border-radius:10px">` });
            reader.readAsDataURL(input.files[0]);
        }
    }

    function makeCall(type) {
        Swal.fire({ title: `بدء مكالمة ${type}`, text: `جاري الاتصال بـ ${document.getElementById('chat-title-name').innerText}...`, icon: 'info', timer: 3000, showConfirmButton: false });
    }

    // --- تحديث الإعدادات جوه الخانة ---
    function openSettings() { document.getElementById('screen-settings').style.display = 'flex'; }
    function closeSettings() { document.getElementById('screen-settings').style.display = 'none'; }

    async function updateName() {
        const { value: newName } = await Swal.fire({ title: 'تغيير الاسم', input: 'text', inputValue: me.name });
        if(newName) {
            db.ref('users/' + me.phone).update({ name: newName });
            me.name = newName;
            localStorage.setItem('star_session_v3', JSON.stringify(me));
            document.getElementById('my-name-top').innerText = newName;
            Swal.fire('تم!', 'تحدث اسمك بنجاح', 'success');
        }
    }

    async function updatePhoto() {
        const { value: file } = await Swal.fire({ title: 'اختر لوجو جديد', input: 'file', inputAttributes: { accept: 'image/*' } });
        if(file) {
            const r = new FileReader();
            r.onload = (e) => {
                db.ref('users/' + me.phone).update({ pfp: e.target.result });
                me.pfp = e.target.result;
                localStorage.setItem('star_session_v3', JSON.stringify(me));
                document.getElementById('my-pfp').src = e.target.result;
                Swal.fire('تم!', 'تحدث الصورة بنجاح', 'success');
            };
            r.readAsDataURL(file);
        }
    }

    function closeChat() { document.getElementById('screen-chat').style.display = 'none'; }
    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
