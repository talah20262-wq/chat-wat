<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tallah Star | الإمبراطورية</title>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
:root {
    --bg:#0b141a;
    --hdr:#202c33;
    --green:#00a884;
    --text:#e9edef;
    --gold:#d4af37;
    --blue:#20adff;
    --msg-me:#005c4b;
}

body{margin:0;font-family:tahoma;background:var(--bg);color:var(--text);overflow:hidden}

/* UI */
.user-row{display:flex;padding:14px;border-bottom:1px solid #222;align-items:center;cursor:pointer}
.user-row:hover{background:#111}
.pfp{width:50px;height:50px;border-radius:50%;margin-left:12px}

/* chat */
#chat-ui{position:fixed;inset:0;display:none;flex-direction:column;background:var(--bg)}
.chat-body{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column}
.bubble{max-width:75%;padding:10px;margin:6px;border-radius:10px}
.b-me{background:var(--msg-me);margin-left:auto}
.b-other{background:var(--hdr)}
</style>
</head>

<body>

<audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

<div id="app">
    <div id="users-list"></div>
</div>

<!-- CHAT -->
<div id="chat-ui">
    <div style="padding:10px;background:var(--hdr);display:flex;align-items:center;gap:10px">
        <i class="fas fa-arrow-right" onclick="closeChat()"></i>
        <b id="chat-name"></b>
    </div>

    <div id="chat-box" class="chat-body"></div>

    <div style="display:flex;padding:10px;background:var(--hdr)">
        <input id="msg" style="flex:1;padding:10px;border-radius:20px;border:none">
        <button onclick="send()" style="margin-right:10px">➤</button>
    </div>
</div>

<script>

/* Firebase */
const firebaseConfig = {
    databaseURL: "https://talah-c12c5-default-rtdb.asia-southeast1.firebasedatabase.app/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* user */
let me = JSON.parse(localStorage.getItem("me")) || {
    id: Date.now().toString(),
    name: "Guest"
};

let activeChat = null;
let chatRef = null;

/* save user */
localStorage.setItem("me", JSON.stringify(me));

/* USERS */
function loadUsers(){
    db.ref("users").on("value", snap=>{
        const users = snap.val() || {};
        const box = document.getElementById("users-list");
        box.innerHTML = "";

        Object.keys(users).forEach(id=>{
            if(id === me.id) return;

            const u = users[id];

            box.innerHTML += `
                <div class="user-row" onclick="openChat('${id}','${u.name}')">
                    <img src="${u.pfp || 'https://i.pravatar.cc/150'}" class="pfp">
                    <div><b>${u.name}</b></div>
                </div>
            `;
        });
    });
}

/* CHAT ID */
function chatId(a,b){
    return [a,b].sort().join("_");
}

/* OPEN CHAT (FIXED LISTENER ISSUE) */
function openChat(id,name){
    activeChat = id;
    document.getElementById("chat-name").innerText = name;
    document.getElementById("chat-ui").style.display="flex";

    const idChat = chatId(me.id, id);

    /* FIX: remove old listener */
    if(chatRef) chatRef.off();

    document.getElementById("chat-box").innerHTML = "";

    chatRef = db.ref("messages/" + idChat).limitToLast(50);

    chatRef.on("child_added", snap=>{
        const d = snap.val();
        const box = document.getElementById("chat-box");

        box.innerHTML += `
            <div class="bubble ${d.sender===me.id?'b-me':'b-other'}">
                ${d.content}
            </div>
        `;

        box.scrollTop = box.scrollHeight;
    });
}

/* SEND */
function send(){
    const text = document.getElementById("msg").value;
    if(!text) return;

    const idChat = chatId(me.id, activeChat);

    db.ref("messages/" + idChat).push({
        sender: me.id,
        content: text,
        time: Date.now(),
        seen:false
    });

    document.getElementById("msg").value="";
}

/* CLOSE CHAT */
function closeChat(){
    document.getElementById("chat-ui").style.display="none";
}

/* INIT */
db.ref("users/" + me.id).set(me);
loadUsers();

</script>

</body>
</html>
