<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tallah Star | الإمبراطورية الكاملة</title>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --wa-bg: #0b141a; --wa-header: #202c33; --wa-green: #00a884;
            --wa-text: #e9edef; --wa-muted: #8696a0; --wa-msg-me: #005c4b;
            --wa-msg-other: #202c33; --wa-gold: #d4af37;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--wa-bg); color: var(--wa-text); height: 100vh; overflow: hidden; }

        /* شريط الإعلانات الخاص بالمالك */
        .admin-ads { background: linear-gradient(90deg, #b8860b, #d4af37); color: black; padding: 5px; text-align: center; font-weight: bold; font-size: 13px; overflow: hidden; white-space: nowrap; }
        .ads-track { display: inline-block; animation: marquee 20s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* الهيدر */
        header { background: var(--wa-header); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; }
        .verified-badge { color: #2196f3; margin-right: 5px; font-size: 14px; }
        
        /* التبويبات والحالات */
        .tabs { background: var(--wa-header); display: flex; border-bottom: 1px solid #222d34; }
        .tab { flex: 1; padding: 15px; text-align: center; color: var(--wa-muted); cursor: pointer; position: relative; }
        .tab.active { color: var(--wa-green); border-bottom: 3px solid var(--wa-green); }

        /* قائمة الحالات (Status) */
        .status-container { display: flex; gap: 15px; padding: 15px; overflow-x: auto; background: var(--wa-bg); }
        .status-circle { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--wa-green); padding: 2px; flex-shrink: 0; cursor: pointer; }
        .status-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        /* شاشة الشات والريكورد */
        #chat-window { position: fixed; inset: 0; background: var(--wa-bg); z-index: 10000; display: none; flex-direction: column; }
        .cw-body { flex: 1; overflow-y: auto; padding: 15px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-color: rgba(11,20,26,0.9); background-blend-mode: darken; }
        
        .footer-chat { background: var(--wa-header); padding: 10px; display: flex; align-items: center; gap: 10px; }
        .footer-chat input { flex: 1; background: #2a3942; border: none; border-radius: 20px; padding: 10px 15px; color: white; outline: none; }
        .record-btn { background: #ff3b30; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; display: none; }
        .mic-btn { color: var(--wa-muted); font-size: 20px; cursor: pointer; }

        /* لوحة المالك 100% */
        .admin-panel { position: fixed; inset: 0; background: var(--wa-bg); z-index: 20000; display: none; flex-direction: column; }
        .panel-card { background: #1c282f; margin: 10px; padding: 15px; border-radius: 10px; }

        .hidden { display: none !important; }
        .verified-star { color: var(--wa-gold); }
    </style>
</head>
<body>

<audio id="notif-sound" src="https://www.soundjay.com/buttons/beep-07a.mp3" preload="auto"></audio>

<div id="main-app" class="hidden">
    <div class="admin-ads">
        <div class="ads-track" id="admin-ad-text">🔥 خصومات طلة (Tallah) تصل لـ 50% على فساتين الصيف! 🔥</div>
    </div>

    <header>
        <div style="font-weight:bold; display:flex; align-items:center">
            Tallah Star <i class="fas fa-certificate verified-badge"></i>
        </div>
        <div style="display:flex; gap:20px; color:var(--wa-muted); cursor:pointer">
            <i class="fas fa-camera" onclick="uploadStatus()"></i>
            <i class="fas fa-ellipsis-v" onclick="toggleMenu()"></i>
            <div id="main-menu" class="menu-drop" style="position:absolute; background:#233138; top:50px; left:10px; display:none; flex-direction:column; width:180px; z-index:5000">
                <div style="padding:15px; border-bottom:1px solid #2a3942" onclick="openAdmin()">لوحة المالك 👑</div>
                <div style="padding:15px;" onclick="logout()">تسجيل الخروج</div>
            </div>
        </div>
    </header>

    <div class="tabs">
        <div class="tab" onclick="showSection('chats')">الدردشات</div>
        <div class="tab active" onclick="showSection('status')">الحالات</div>
        <div class="tab" onclick="showSection('calls')">المكالمات</div>
    </div>

    <div id="status-section">
        <div class="status-container" id="status-list">
            </div>
    </div>

    <div id="chats-list" style="overflow-y:auto; height: calc(100vh - 180px);"></div>
</div>

<div id="admin-panel" class="admin-panel">
    <div style="background:var(--wa-header); padding:15px; display:flex; align-items:center; gap:10px">
        <i class="fas fa-arrow-right" onclick="closeAdmin()"></i>
        <b>لوحة التحكم المطلقة 👑</b>
    </div>
    <div style="overflow-y:auto">
        <div class="panel-card">
            <h4>تحديث إعلان الموقع 📢</h4>
            <input type="text" id="new-ad" placeholder="اكتب الإعلان الجديد هنا..." style="width:100%; padding:10px; margin:10px 0; background:#2a3942; border:none; color:white">
            <button onclick="updateAd()" style="width:100%; background:var(--wa-gold); border:none; padding:10px; border-radius:5px; font-weight:bold">نشر الإعلان للكل</button>
        </div>
        <div class="panel-card" id="admin-requests">
            <h4>طلبات الأكواد 🔑</h4>
            </div>
    </div>
</div>

<div id="chat-window">
    <div style="background:var(--wa-header); padding:10px; display:flex; align-items:center; gap:10px">
        <i class="fas fa-arrow-right" onclick="closeChat()"></i>
        <img id="cw-pfp" style="width:40px; height:40px; border-radius:50%">
        <b id="cw-name"></b>
        <i id="cw-verified" class="fas fa-check-circle verified-badge hidden"></i>
    </div>
    <div id="cw-messages" class="cw-body"></div>
    <div class="footer-chat">
        <i class="fas fa-microphone mic-btn" id="mic-trigger" onclick="startRecording()"></i>
        <button id="stop-record" class="record-btn"><i class="fas fa-stop"></i></button>
        <input type="text" id="msg-input" placeholder="رسالة">
        <i class="fas fa-paper-plane" style="color:var(--wa-green); cursor:pointer" onclick="sendMsg()"></i>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://talah-c12c5-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let me = JSON.parse(localStorage.getItem('tallah_pro_user'));

    // --- نظام الدخول المطور ---
    if(!me) {
        Swal.fire({
            title: 'دخول منظومة طلة',
            input: 'password',
            inputPlaceholder: 'أدخل كود الإمبراطور أو كودك الشخصي'
        }).then(res => {
            if(res.value === "248") {
                me = { phone: "admin", name: "محمد نجم", role: "admin", verified: true, pfp: "https://cdn-icons-png.flaticon.com/512/149/149071.png" };
                saveMe();
            } else {
                // فحص الأكواد العادية في الداتابيز
                db.ref('users').once('value', s => {
                    s.forEach(u => { if(u.val().loginCode === res.value) { me = u.val(); saveMe(); } });
                });
            }
        });
    }

    function saveMe() { localStorage.setItem('tallah_pro_user', JSON.stringify(me)); location.reload(); }

    if(me) {
        document.getElementById('main-app').classList.remove('hidden');
        initProFeatures();
    }

    function initProFeatures() {
        // 1. الإعلانات اللحظية
        db.ref('site_settings/current_ad').on('value', s => {
            if(s.val()) document.getElementById('admin-ad-text').innerText = s.val();
        });

        // 2. إشعارات الرسائل (صوت)
        db.ref('messages').on('child_changed', snap => {
            document.getElementById('notif-sound').play();
        });

        // 3. الحالات
        loadStatus();

        // 4. الدردشات
        loadChats();
    }

    // --- وظائف المالك ---
    function openAdmin() { if(me.role === 'admin') document.getElementById('admin-panel').style.display = 'flex'; }
    function updateAd() {
        const ad = document.getElementById('new-ad').value;
        db.ref('site_settings').update({ current_ad: ad });
        Swal.fire('تم', 'الإعلان اتغير عند كل الناس', 'success');
    }

    // --- نظام الريكورد (تجريبي بسيط) ---
    function startRecording() {
        Swal.fire('الريكورد', 'ميزة تسجيل الصوت مفعلة وجاري ربطها بسيرفر الوسائط..', 'info');
    }

    // --- رفع الحالات ---
    function uploadStatus() {
        Swal.fire({
            title: 'رفع حالة جديدة',
            input: 'file',
            inputAttributes: { 'accept': 'image/*', 'aria-label': 'ارفع صورتك' }
        }).then(res => {
            if(res.value) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    db.ref('status').push({ user: me.name, pfp: me.pfp, img: e.target.result, time: Date.now() });
                };
                reader.readAsDataURL(res.value);
            }
        });
    }

    function loadStatus() {
        db.ref('status').on('value', snap => {
            const container = document.getElementById('status-list');
            container.innerHTML = `<div class="status-circle" onclick="uploadStatus()"><img src="${me.pfp}"></div>`;
            snap.forEach(s => {
                const data = s.val();
                container.innerHTML += `<div class="status-circle" onclick="viewStatus('${data.img}')"><img src="${data.pfp}"></div>`;
            });
        });
    }

    function viewStatus(url) {
        Swal.fire({ imageUrl: url, imageAlt: 'Status', background: '#000', showConfirmButton: false });
    }

    function loadChats() {
        db.ref('users').on('value', snap => {
            const list = document.getElementById('chats-list');
            list.innerHTML = "";
            snap.forEach(u => {
                const user = u.val();
                if(user.phone === me.phone) return;
                list.innerHTML += `
                    <div class="chat-row" onclick="openChat('${user.phone}', '${user.name}', '${user.pfp}', ${user.role === 'admin'})">
                        <img src="${user.pfp}" class="pfp">
                        <div>
                            <b>${user.name} ${user.role === 'admin' ? '<i class="fas fa-check-circle verified-badge"></i>' : ''}</b><br>
                            <small style="color:var(--wa-muted)">اضغط للدردشة..</small>
                        </div>
                    </div>`;
            });
        });
    }

    let activeChatID = null;
    function openChat(id, name, pfp, isAdmin) {
        activeChatID = [me.phone, id].sort().join("_");
        document.getElementById('chat-window').style.display = 'flex';
        document.getElementById('cw-name').innerText = name;
        document.getElementById('cw-pfp').src = pfp;
        if(isAdmin) document.getElementById('cw-verified').classList.remove('hidden');
        else document.getElementById('cw-verified').classList.add('hidden');

        db.ref('messages/' + activeChatID).on('value', snap => {
            const box = document.getElementById('cw-messages');
            box.innerHTML = "";
            snap.forEach(m => {
                const d = m.val();
                box.innerHTML += `<div class="bubble ${d.sender === me.phone ? 'b-me' : 'b-other'}">${d.text}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMsg() {
        const val = document.getElementById('msg-input').value;
        if(!val) return;
        db.ref('messages/' + activeChatID).push({ sender: me.phone, text: val, time: Date.now() });
        document.getElementById('msg-input').value = "";
    }

    function toggleMenu() {
        const m = document.getElementById('main-menu');
        m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
    }
    function closeChat() { document.getElementById('chat-window').style.display = 'none'; }
    function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
