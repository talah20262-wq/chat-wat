<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Star | واتساب النجم</title>
    
    <meta name="theme-color" content="#0b141a">
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIldoYXRzQXBwIFN0YXIiLAogICJzaG9ydF9uYW1lIjogIldBIFN0YXIiLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzBiMTQxYSIsCiAgImljb25zIjogW3sgInNyYyI6ICJodHRwczovL2Nkbi1pY29ucy1wbmcuZmxhdGljb24uY29tLzUxMi8zNTM2LzM1MzY0NDUucG5nIiwgInNpemVzIjogIjUxMng1MTIiLCAidHlwZSI6ICJpbWFnZS9wbmciIH1dCn0=">

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --main-bg: #0b141a; --accent: #00a884; --gold: #ffd700; --card-bg: #222e35; }
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--main-bg); color: #e9edef; overflow: hidden; }
        
        /* تصميم اسم المالك (النجم) */
        .owner-style {
            color: #000 !important; /* لون الخط أسود */
            background: linear-gradient(45deg, #ffd700, #fff700); /* لون ذهبي منير */
            padding: 2px 10px;
            border-radius: 5px;
            font-weight: 900;
            border: 2px solid #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.7); /* إشعاع ذهبي */
            text-shadow: none;
        }

        /* واجهة الدخول */
        #auth-screen { position: fixed; inset: 0; background: #111b21; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .auth-card { background: var(--card-bg); padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; }
        .auth-btn { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; background: #2a3942; color: white; text-align: center; }

        /* الشات */
        #main-app { display: none; height: 100vh; flex-direction: column; }
        header { background: #202c33; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); display: flex; flex-direction: column; gap: 10px; }
        
        .msg { max-width: 80%; padding: 10px; border-radius: 12px; position: relative; }
        .sent { align-self: flex-end; background: #005c4b; }
        .received { align-self: flex-start; background: #202c33; }
        .msg-tools { font-size: 0.7rem; margin-top: 5px; display: flex; gap: 10px; opacity: 0.6; }
        .msg-tools span:hover { color: var(--gold); cursor: pointer; }

        /* لوحة التحكم */
        #admin-panel { position: fixed; inset: 0; background: #0b141a; z-index: 10000; display: none; padding: 20px; overflow-y: auto; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: #202c33; padding: 15px; border-radius: 10px; text-align: center; border-bottom: 3px solid var(--gold); }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card" id="gate">
        <h1 style="color:var(--gold); text-shadow: 0 0 10px rgba(255,215,0,0.5);">واتساب النجم</h1>
        <button class="auth-btn" style="background:var(--gold); color:#000" onclick="showSec('owner-form')">دخول المالك</button>
        <button class="auth-btn" style="background:#3b4a54; color:white" onclick="showSec('signup-form')">طلب انضمام</button>
        <button class="auth-btn" style="background:#005c4b; color:white" onclick="showSec('login-form')">دخول بالكود</button>
    </div>

    <div class="auth-card" id="owner-form" style="display:none">
        <h3>دخول المالك</h3>
        <input type="password" id="owner-pass" placeholder="كلمة السر">
        <button class="auth-btn" style="background:var(--gold)" onclick="authOwner()">دخول</button>
        <p onclick="showSec('gate')" style="cursor:pointer">رجوع</p>
    </div>

    <div class="auth-card" id="signup-form" style="display:none">
        <h3>طلب انضمام</h3>
        <input type="text" id="reg-name" placeholder="اسمك">
        <input type="text" id="reg-phone" placeholder="رقم هاتفك">
        <button class="auth-btn" style="background:var(--accent); color:white" onclick="submitSignup()">إرسال الطلب</button>
        <p onclick="showSec('gate')" style="cursor:pointer">رجوع</p>
    </div>

    <div class="auth-card" id="wait-screen" style="display:none">
        <h3 style="color:var(--gold)">طلبك قيد المراجعة</h3>
        <div id="wait-loader" style="margin:20px 0;"><i class="fas fa-star fa-spin fa-3x" style="color:var(--gold)"></i></div>
        <div id="code-box" style="display:none">
            <p>كود دخولك هو:</p>
            <h1 id="res-code" style="letter-spacing:5px; color:var(--gold)">----</h1>
            <button class="auth-btn" style="background:var(--accent); color:white" onclick="autoEntry()">دخول الآن</button>
        </div>
    </div>

    <div class="auth-card" id="login-form" style="display:none">
        <h3>دخول سريع</h3>
        <input type="text" id="log-phone" placeholder="رقم الهاتف">
        <input type="text" id="log-code" placeholder="الكود">
        <button class="auth-btn" style="background:var(--accent); color:white" onclick="authManual()">دخول</button>
    </div>
</div>

<div id="main-app">
    <header>
        <div id="user-header">...</div>
        <div style="display:flex; gap:15px">
            <i id="admin-icon" class="fas fa-crown" style="display:none; color:var(--gold); cursor:pointer" onclick="toggleAdmin(true)"></i>
            <i class="fas fa-sign-out-alt" style="cursor:pointer" onclick="localStorage.clear(); location.reload();"></i>
        </div>
    </header>
    <div id="chat-box"></div>
    <div style="background:#202c33; padding:10px; display:flex; gap:10px">
        <input type="text" id="msg-input" style="flex:1" placeholder="اكتب رسالة...">
        <button onclick="sendMsg()" style="background:none; border:none; color:var(--accent); font-size:1.5rem"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<div id="admin-panel">
    <div style="display:flex; justify-content:space-between">
        <h2>لوحة تحكم النجم</h2>
        <button onclick="toggleAdmin(false)" style="padding:10px; border:none; border-radius:5px">إغلاق</button>
    </div>
    
    <div class="stats-grid">
        <div class="stat-card"><h4 id="stat-members">0</h4><small>أعضاء الجروب</small></div>
        <div class="stat-card"><h4 id="stat-views">0</h4><small>زيارات الموقع</small></div>
    </div>

    <h3>طلبات الانضمام</h3>
    <div id="admin-requests"></div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://groop-27edc-default-rtdb.europe-west1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // تسجيل زيارة جديدة فور فتح اللينك
    db.ref('stats/views').transaction(v => (v || 0) + 1);

    let session = JSON.parse(localStorage.getItem('star_session'));
    if(session) startApp();

    function showSec(id) {
        ['gate','owner-form','signup-form','wait-screen','login-form'].forEach(s => document.getElementById(s).style.display='none');
        document.getElementById(id).style.display='block';
    }

    function authOwner() {
        if(document.getElementById('owner-pass').value === "2009257mama") {
            saveSession({ name: "النجم", role: "admin", style: "owner-style" });
        }
    }

    function submitSignup() {
        const name = document.getElementById('reg-name').value;
        const phone = document.getElementById('reg-phone').value;
        if(!name || !phone) return;
        db.ref('requests').child(phone).set({name, phone});
        localStorage.setItem('wait_phone', phone);
        showSec('wait-screen');
        watchForCode(phone);
    }

    function watchForCode(phone) {
        db.ref('users').child(phone).on('value', s => {
            if(s.val()) {
                document.getElementById('wait-loader').style.display = 'none';
                document.getElementById('code-box').style.display = 'block';
                document.getElementById('res-code').innerText = s.val().code;
                localStorage.setItem('temp_user', JSON.stringify(s.val()));
            }
        });
    }

    function autoEntry() { saveSession(JSON.parse(localStorage.getItem('temp_user'))); }

    function saveSession(data) { localStorage.setItem('star_session', JSON.stringify(data)); location.reload(); }

    function startApp() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'flex';
        const head = document.getElementById('user-header');
        head.innerText = session.name;
        if(session.style) head.className = session.style;

        if(session.role === 'admin') {
            document.getElementById('admin-icon').style.display = 'block';
            loadAdminData();
        }
        loadChat();
    }

    function loadAdminData() {
        // تحديث الإحصائيات
        db.ref('users').on('value', s => document.getElementById('stat-members').innerText = s.numChildren());
        db.ref('stats/views').on('value', s => document.getElementById('stat-views').innerText = s.val());
        
        // تحميل الطلبات
        db.ref('requests').on('value', s => {
            const list = document.getElementById('admin-requests');
            list.innerHTML = "";
            s.forEach(r => {
                list.innerHTML += `<div style="background:#2a3942; padding:10px; margin-bottom:10px; border-radius:10px">
                    ${r.val().name} (${r.val().phone})
                    <input type="text" id="code-${r.key}" placeholder="الكود">
                    <button onclick="approve('${r.key}', '${r.val().name}')">تفعيل</button>
                </div>`;
            });
        });
    }

    window.approve = (phone, name) => {
        const code = document.getElementById('code-'+phone).value;
        if(!code) return;
        db.ref('users').child(phone).set({name, phone, code, role: 'user'}).then(() => db.ref('requests').child(phone).remove());
    }

    function sendMsg() {
        const inp = document.getElementById('msg-input');
        if(!inp.value) return;
        db.ref('chat').push({
            name: session.name, 
            body: inp.value, 
            style: session.style || '',
            time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
        });
        inp.value = "";
    }

    function loadChat() {
        db.ref('chat').on('value', s => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            s.forEach(m => {
                const d = m.val();
                const isMe = d.name === session.name;
                const isAdmin = session.role === 'admin';
                box.innerHTML += `
                    <div class="msg ${isMe?'sent':'received'}">
                        <b class="${d.style}">${d.name}</b><br>${d.body}
                        <div class="msg-tools">
                            <span>${d.time}</span>
                            ${isAdmin ? `<span onclick="editMsg('${m.key}', '${d.body}')">تعديل</span>
                                         <span onclick="db.ref('chat').child('${m.key}').remove()">حذف</span>` : ''}
                        </div>
                    </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    window.editMsg = (key, oldBody) => {
        Swal.fire({ title: 'تعديل الرسالة', input: 'text', inputValue: oldBody }).then(r => {
            if(r.value) db.ref('chat').child(key).update({body: r.value});
        });
    }

    function toggleAdmin(s) { document.getElementById('admin-panel').style.display = s ? 'block' : 'none'; }
    
    // Service Worker للتثبيت كتطبيق
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('data:application/javascript;base64,c2VsbC5hZGRFdmVudExpc3RlbmVyKCdmZXRjaCcsIGU9Pnt9KTs=');
    }
</script>
</body>
</html>
