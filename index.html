<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TALLAH | THE ULTIMATE EMPIRE v2000</title>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        :root { 
            --gold: #d4af37; --royal: linear-gradient(135deg, #d4af37, #f9f295, #ab8e28); 
            --black: #010101; --dark-card: #0a0a0a; --vip: #8e44ad; --green: #00ff88;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--black); color: white; height: 100vh; overflow: hidden; user-select: none; }

        /* 1. نظام الحماية البصري (Matrix & Glass) */
        #bg-canvas { position: fixed; inset: 0; z-index: -1; opacity: 0.15; }
        .glass { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(212, 175, 55, 0.2); }

        /* 2. الهيكل التنظيمي (Screens) */
        .screen { position: fixed; inset: 0; display: none; flex-direction: column; z-index: 10; background: var(--black); }
        .active { display: flex !important; animation: fadeIn 0.5s ease; }

        /* 3. نظام اللايف الاحترافي (Live Node) */
        #live-v-hub {
            position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
            width: 94%; max-width: 400px; height: 220px; background: #000;
            border-radius: 25px; border: 2px solid var(--gold); z-index: 999;
            display: none; overflow: hidden; box-shadow: 0 0 50px rgba(212,175,55,0.3);
        }
        #v-feed { width: 100%; height: 100%; object-fit: cover; }
        .live-tag { position: absolute; top: 15px; right: 15px; background: red; padding: 3px 12px; border-radius: 5px; font-weight: 900; font-size: 11px; animation: pulse 1s infinite; }

        /* 4. نظام الشات (The Messenger) */
        #chat-scroller { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 14px; position: relative; line-height: 1.6; }
        .sent { background: #005c4b; align-self: flex-end; border-bottom-right-radius: 2px; }
        .recv { background: #1c282f; align-self: flex-start; border-bottom-left-radius: 2px; border-left: 3px solid var(--gold); }
        .msg-info { font-size: 9px; opacity: 0.6; display: flex; justify-content: flex-end; gap: 5px; margin-top: 5px; }
        .typing { font-size: 11px; color: var(--green); padding: 5px 20px; display: none; }

        /* 5. لوحة العرش (The Throne) */
        #throne-sidebar { 
            position: fixed; left: -100%; top: 0; width: 85%; max-width: 450px; height: 100%; 
            background: rgba(5,5,5,0.98); z-index: 10000; border-right: 2px solid var(--gold); 
            transition: 0.5s cubic-bezier(0.7, 0, 0.3, 1); padding: 30px; overflow-y: auto;
        }
        .throne-active { left: 0 !important; }

        /* 6. بروفايل الـ VIP والاقتصاد */
        .u-card { background: var(--dark-card); padding: 15px; border-radius: 20px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; border: 1px solid #1a1a1a; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
        .badge { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 900; text-transform: uppercase; }
        .king-bg { background: var(--royal); color: #000; }

        /* 7. الأزرار التفاعلية */
        .btn-gold { background: var(--royal); color: #000; border: none; padding: 15px; border-radius: 15px; font-weight: 900; width: 100%; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-gold:hover { filter: brightness(1.2); transform: translateY(-2px); }
        .input-gold { background: #111; border: 1px solid var(--gold); padding: 15px; border-radius: 15px; color: white; width: 100%; outline: none; text-align: center; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body oncontextmenu="return false;"> <canvas id="bg-canvas"></canvas>

<div id="king-alert" style="position:fixed; top:-100px; left:50%; transform:translateX(-50%); width:90%; max-width:400px; background:var(--royal); color:#000; padding:15px; border-radius:20px; z-index:9999; font-weight:900; text-align:center; transition:0.5s;"></div>

<div id="live-v-hub">
    <div class="live-tag">LIVE</div>
    <video id="v-feed" autoplay playsinline muted></video>
    <div style="position:absolute; bottom:10px; left:15px; font-size:12px; color:white; background:rgba(0,0,0,0.5); padding:2px 8px; border-radius:10px;">
        <i class="fas fa-eye"></i> <span id="view-count">0</span>
    </div>
</div>

<div id="gate-screen" class="screen active" style="justify-content:center; align-items:center; background: radial-gradient(circle, #1a1a1a 0%, #000 100%);">
    <div class="glass" style="padding:40px; border-radius:40px; width:85%; max-width:400px; text-align:center;">
        <h1 style="background:var(--royal); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 55px; font-weight: 900;">TALLAH</h1>
        <p style="color:gray; letter-spacing:5px; margin-bottom:40px;">THE EMPIRE OS</p>
        <input type="password" id="gate-pass" class="input-gold" placeholder="أدخل كود العبور">
        <button onclick="login()" class="btn-gold">فتح النظام</button>
        <p onclick="regReq()" style="margin-top:25px; color:var(--gold); font-size:13px; cursor:pointer;">طلب انضمام جديد</p>
    </div>
</div>

<div id="main-screen" class="screen">
    <header class="glass">
        <i class="fas fa-bars" onclick="toggleThrone()" style="color:var(--gold); font-size:24px;"></i>
        <b>إمبراطورية طلة</b>
        <i class="fas fa-power-off" style="color:red; font-size:20px;" onclick="logout()"></i>
    </header>

    <div style="display:flex; justify-content:space-around; padding:10px; background:#050505; border-bottom:1px solid #1a1a1a; font-size:12px;">
        <span><i class="fas fa-coins" style="color:gold"></i> <span id="m-coins">0</span></span>
        <span><i class="fas fa-shield-alt" style="color:var(--green)"></i> <span id="m-rank">عضو</span></span>
        <span><i class="fas fa-star" style="color:cyan"></i> LVL <span id="m-lvl">1</span></span>
    </div>

    <div id="users-container" style="flex:1; overflow-y:auto; padding:15px;"></div>
</div>

<div id="throne-sidebar">
    <h2 style="color:var(--gold); text-align:center; margin-bottom:30px;"><i class="fas fa-crown"></i> العرش</h2>
    
    <div id="admin-tools" style="display:none;">
        <p style="color:var(--green); border-bottom:1px solid #222; padding-bottom:5px;">أدوات الملك</p>
        <button onclick="live('cam')" class="btn-gold">بث الكاميرا</button>
        <button onclick="live('screen')" class="btn-gold" style="background:var(--green)">بث الشاشة</button>
        <button id="stop-btn" onclick="killLive()" class="btn-gold" style="background:red; color:white; display:none;">إغلاق البث</button>
        <button onclick="boom()" class="btn-gold" style="background:orange;">احتفالية عالمية 🎉</button>
        <button onclick="broadcast()" class="btn-gold" style="background:#444; color:white;">رسالة للكل 📢</button>
    </div>

    <div style="margin-top:40px;">
        <p style="color:gray; border-bottom:1px solid #222; padding-bottom:5px;">المتجر الإمبراطوري</p>
        <button class="btn-gold" style="background:rgba(255,255,255,0.05); color:white; border:1px solid #333;">شراء VIP (500 Coin)</button>
        <button class="btn-gold" style="background:rgba(255,255,255,0.05); color:white; border:1px solid #333;">تغيير لون الاسم</button>
    </div>

    <button onclick="toggleThrone()" style="margin-top:60px; color:gray; background:none; border:none; width:100%;">رجوع</button>
</div>

<div id="chat-screen" class="screen">
    <header class="glass">
        <i class="fas fa-chevron-right" onclick="showView('main-screen')"></i>
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="" id="target-img" class="avatar" style="width:35px; height:35px;">
            <b id="target-name">...</b>
        </div>
        <i class="fas fa-phone-alt" style="color:var(--green);"></i>
    </header>
    
    <div id="chat-scroller"></div>
    <div id="is-typing" class="typing">يكتب الآن...</div>

    <div style="padding:15px; background:var(--dark-card); display:flex; gap:10px; align-items:center;">
        <i class="fas fa-plus" style="color:var(--gold)"></i>
        <input type="text" id="m-input" class="input-gold" style="margin:0; text-align:right;" placeholder="رسالة مشفرة...">
        <button onclick="sendMsg()" style="background:var(--royal); border:none; width:45px; height:45px; border-radius:50%; color:#000;"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
    // 1. محرك الإمبراطورية (Engine)
    const config = { databaseURL: "https://talah-c12c5-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(config);
    const db = firebase.database();
    
    const peer = new Peer(null, { config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]} });
    
    let me = JSON.parse(localStorage.getItem('tallah_v2000_auth'));
    let activeChat, myStream;

    if(me) { document.getElementById('gate-screen').style.display='none'; showView('main-screen'); initApp(); }

    function showView(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // 2. نظام الدخول والأمان
    function login() {
        const p = document.getElementById('gate-pass').value;
        if(p === "248") { 
            me = {uid:'admin', name:'الإمبراطور', role:'admin', coins:10000, lvl:100, badge:'KING', avatar:'https://cdn-icons-png.flaticon.com/512/6941/6941697.png'}; 
            save(); return; 
        }
        db.ref('users').once('value', s => {
            s.forEach(u => { if(u.val().code === p && u.val().active) { me = {...u.val(), uid:u.key}; save(); } });
        });
    }
    function save() { localStorage.setItem('tallah_v2000_auth', JSON.stringify(me)); location.reload(); }

    // 3. التطبيق واللايف (Live & Sync)
    function initApp() {
        db.ref('status/'+me.uid).set({ online: true, typing: false });
        db.ref('status/'+me.uid).onDisconnect().set({ online: false, typing: false });
        
        renderUsers();
        syncMe();
        
        if(me.role === 'admin') document.getElementById('admin-tools').style.display = 'block';

        // استقبال اللايف (The Bypass)
        peer.on('call', call => {
            call.answer();
            call.on('stream', stream => {
                const v = document.getElementById('v-feed');
                document.getElementById('live-v-hub').style.display = 'block';
                v.srcObject = stream;
                v.onloadedmetadata = () => { v.play(); v.currentTime = 0.1; };
            });
        });

        db.ref('live_id').on('value', s => {
            if(s.val() && me.role !== 'admin') peer.call(s.val(), new MediaStream());
            else if(!s.val()) document.getElementById('live-v-hub').style.display = 'none';
        });

        db.ref('global_boom').on('value', s => { if(s.val() > Date.now()-3000) confetti(); });
        initMatrix();
    }

    async function live(type) {
        myStream = (type === 'cam') ? 
            await navigator.mediaDevices.getUserMedia({video:true, audio:true}) : 
            await navigator.mediaDevices.getDisplayMedia({video:true, audio:true});
        document.getElementById('v-feed').srcObject = myStream;
        document.getElementById('live-v-hub').style.display = 'block';
        document.getElementById('stop-btn').style.display = 'block';
        db.ref('live_id').set(peer.id);
    }

    function killLive() { if(myStream) myStream.getTracks().forEach(t => t.stop()); db.ref('live_id').remove(); location.reload(); }

    // 4. الشات المتطور (Chat Engine)
    function renderUsers() {
        db.ref('users').on('value', s => {
            const cont = document.getElementById('users-container'); cont.innerHTML = "";
            s.forEach(u => {
                if(u.key === me.uid || !u.val().active) return;
                cont.innerHTML += `
                    <div class="u-card animate__animated animate__fadeInRight" onclick="openChat('${u.key}','${u.val().name}','${u.val().avatar}')">
                        <img src="${u.val().avatar}" class="avatar">
                        <div style="flex:1">
                            <b>${u.val().name}</b> <span class="badge king-bg">${u.val().badge || 'عضو'}</span>
                            <div id="status-${u.key}" style="font-size:10px; color:gray">آخر ظهور: جاري التحميل...</div>
                        </div>
                        <div id="dot-${u.key}" style="width:10px; height:10px; background:gray; border-radius:50%"></div>
                    </div>`;
                db.ref('status/'+u.key).on('value', st => {
                    const dot = document.getElementById('dot-'+u.key);
                    const txt = document.getElementById('status-'+u.key);
                    if(dot) { 
                        dot.style.background = st.val()?.online ? 'var(--green)' : 'gray'; 
                        txt.innerText = st.val()?.online ? 'متصل الآن' : 'غير متصل';
                    }
                });
            });
        });
    }

    function openChat(id, name, img) {
        activeChat = [me.uid, id].sort().join("_");
        document.getElementById('target-name').innerText = name;
        document.getElementById('target-img').src = img;
        showView('chat-screen');
        
        db.ref('chats/'+activeChat).on('value', s => {
            const box = document.getElementById('chat-scroller'); box.innerHTML = "";
            s.forEach(m => {
                box.innerHTML += `<div class="msg ${m.val().sender===me.uid?'sent':'recv'}">
                    ${m.val().text}
                    <div class="msg-info"><span>${new Date(m.val().t).getHours()}:${new Date(m.val().t).getMinutes()}</span> <i class="fas fa-check-double"></i></div>
                </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });

        db.ref('status/'+id).on('value', st => {
            document.getElementById('is-typing').style.display = st.val()?.typing ? 'block' : 'none';
        });
    }

    function sendMsg() {
        const i = document.getElementById('m-input'); if(!i.value) return;
        db.ref('chats/'+activeChat).push({ sender: me.uid, text: i.value, t: Date.now() });
        db.ref('users/'+me.uid).update({ coins: (me.coins || 0) + 1 }); // ربح عملة لكل رسالة
        i.value = "";
    }

    // 5. الاقتصاد والمؤثرات
    function syncMe() {
        db.ref('users/'+me.uid).on('value', s => {
            const d = s.val() || me;
            document.getElementById('m-coins').innerText = d.coins;
            document.getElementById('m-lvl').innerText = d.lvl;
            document.getElementById('m-rank').innerText = d.badge || 'عضو';
        });
    }

    function boom() { db.ref('global_boom').set(Date.now()); }

    function initMatrix() {
        const c = document.getElementById("bg-canvas"), ctx = c.getContext("2d");
        c.width = window.innerWidth; c.height = window.innerHeight;
        const drops = []; for(let i=0; i<30; i++) drops.push({x:Math.random()*c.width, y:Math.random()*c.height, s:Math.random()*2});
        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,c.width,c.height);
            ctx.fillStyle = "#d4af37"; drops.forEach(d => { ctx.fillText("T", d.x, d.y); d.y+=d.s; if(d.y>c.height) d.y=0; });
            requestAnimationFrame(draw);
        } draw();
    }

    function toggleThrone() { document.getElementById('throne-sidebar').classList.toggle('throne-active'); }
    function logout() { localStorage.clear(); location.reload(); }
    
    // منع اختصار F12
    window.onkeydown = (e) => { 
        if(e.keyCode === 123) return false; 
        if(e.key === 'Enter') sendMsg();
        db.ref('status/'+me.uid).update({ typing: true });
        clearTimeout(window.t_timeout);
        window.t_timeout = setTimeout(() => db.ref('status/'+me.uid).update({ typing: false }), 2000);
    };
</script>
</body>
</html>
