<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Star | واتساب النجم</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --main-bg: #0b141a; --chat-bg: #0b141a; --my-msg: #005c4b; --other-msg: #202c33; --accent: #00a884; --text: #e9edef; }
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--main-bg); color: var(--text); overflow: hidden; }
        
        /* شاشة التسجيل */
        #auth-screen { position: fixed; inset: 0; background: #111b21; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; padding: 20px; text-align: center; }
        .auth-card { background: #222e35; padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .auth-card h2 { color: var(--accent); margin-bottom: 20px; }
        
        /* واجهة الشات */
        #app-interface { display: none; height: 100vh; flex-direction: column; }
        header { background: #202c33; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-info img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--accent); }
        
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-opacity: 0.05; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { max-width: 70%; padding: 8px 12px; border-radius: 10px; position: relative; font-size: 0.95rem; line-height: 1.4; }
        .msg.sent { align-self: flex-end; background: var(--my-msg); border-top-left-radius: 0; }
        .msg.received { align-self: flex-start; background: var(--other-msg); border-top-right-radius: 0; }
        .msg .sender-name { font-size: 0.75rem; font-weight: bold; color: #ffd700; margin-bottom: 3px; display: block; }
        .msg .time { font-size: 0.65rem; opacity: 0.6; text-align: left; margin-top: 4px; }

        /* منطقة الكتابة */
        .input-area { background: #202c33; padding: 10px; display: flex; align-items: center; gap: 10px; }
        .input-area input { flex: 1; background: #2a3942; border: none; padding: 12px; border-radius: 25px; color: white; outline: none; }
        .icon-btn { color: #8696a0; font-size: 1.4rem; cursor: pointer; transition: 0.2s; }
        .icon-btn:hover { color: var(--accent); }
        .send-btn { color: var(--accent); font-size: 1.6rem; cursor: pointer; }

        /* لوحة المالك */
        #owner-btn { position: absolute; bottom: 80px; left: 20px; background: var(--accent); width: 50px; height: 50px; border-radius: 50%; display: none; align-items: center; justify-content: center; box-shadow: 0 4px 10px black; cursor: pointer; }
        
        /* الأزرار التفاعلية */
        .call-btns { display: flex; gap: 15px; }
        .call-btns i { color: #8696a0; cursor: pointer; }

        audio { height: 30px; filter: invert(1); }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card" id="login-form">
        <img src="https://cdn-icons-png.flaticon.com/512/3536/3536445.png" width="80" style="margin-bottom:10px">
        <h2>WhatsApp Star</h2>
        <input type="text" id="userName" placeholder="اسمك الكامل">
        <input type="text" id="userPhone" placeholder="رقم الموبايل">
        <input type="text" id="userPic" placeholder="رابط صورتك الشخصية (اختياري)">
        <button onclick="requestJoin()" style="width:100%; padding:12px; border-radius:10px; border:none; background:var(--accent); color:white; font-weight:bold; cursor:pointer;">طلب انضمام للجروب</button>
        <p style="margin-top:15px; font-size:0.8rem; color:#8696a0; cursor:pointer;" onclick="ownerLoginPrompt()">دخول المالك فقط</p>
    </div>
</div>

<div id="app-interface">
    <header>
        <div class="user-info">
            <img id="myAvatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
            <div>
                <div id="myNameDisplay" style="font-weight:bold;">جاري التحميل...</div>
                <div style="font-size:0.7rem; color:var(--accent);">متصل الآن</div>
            </div>
        </div>
        <div class="call-btns">
            <i class="fas fa-video" onclick="Swal.fire('بدء مكالمة فيديو...')"></i>
            <i class="fas fa-phone-alt" onclick="Swal.fire('اتصال صوتي...')"></i>
            <i class="fas fa-ellipsis-v"></i>
        </div>
    </header>

    <div id="chat-window"></div>

    <div class="input-area">
        <i class="far fa-smile icon-btn" onclick="toggleEmoji()"></i>
        <i class="fas fa-plus icon-btn"></i>
        <input type="text" id="msgInput" placeholder="اكتب رسالة..." onkeypress="if(event.key==='Enter') sendMsg()">
        <i id="mic-btn" class="fas fa-microphone icon-btn" onclick="toggleRecord()"></i>
        <i class="fas fa-paper-plane send-btn" onclick="sendMsg()"></i>
    </div>
</div>

<div id="owner-btn" onclick="showOwnerPanel()"><i class="fas fa-user-shield"></i></div>

<script>
    // ربط Firebase بالمشروع الجديد
    const firebaseConfig = { databaseURL: "https://groop-27edc-default-rtdb.europe-west1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = JSON.parse(localStorage.getItem('star_user'));
    let mediaRecorder;
    let audioChunks = [];

    window.onload = () => { if(currentUser) checkUserStatus(); };

    // --- نظام الدخول ---
    function ownerLoginPrompt() {
        Swal.fire({ title: 'دخول المالك', input: 'password', inputPlaceholder: 'كلمة السر' }).then(r => {
            if(r.value === "2009257mama") {
                const admin = { role: 'owner', name: 'المالك النجم', pic: 'https://cdn-icons-png.flaticon.com/512/4712/4712139.png', status: 'approved' };
                localStorage.setItem('star_user', JSON.stringify(admin));
                location.reload();
            }
        });
    }

    function requestJoin() {
        const name = document.getElementById('userName').value;
        const phone = document.getElementById('userPhone').value;
        const pic = document.getElementById('userPic').value || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
        if(!name || !phone) return Swal.fire('أكمل البيانات');

        const userData = { name, phone, pic, status: 'pending', role: 'user' };
        db.ref('users').child(phone).set(userData).then(() => {
            localStorage.setItem('star_user', JSON.stringify(userData));
            Swal.fire('تم إرسال الطلب', 'انتظر موافقة المالك لتتمكن من الدردشة', 'success');
        });
    }

    function checkUserStatus() {
        if(currentUser.role === 'owner') { startApp(); document.getElementById('owner-btn').style.display='flex'; return; }
        db.ref('users').child(currentUser.phone).on('value', s => {
            const data = s.val();
            if(data && data.status === 'approved') { startApp(); }
            else if(data && data.status === 'pending') { document.getElementById('login-form').innerHTML = "<h3>طلبك قيد المراجعة...</h3>"; }
        });
    }

    // --- تشغيل التطبيق ---
    function startApp() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-interface').style.display = 'flex';
        document.getElementById('myAvatar').src = currentUser.pic;
        document.getElementById('myNameDisplay').innerText = currentUser.name;
        loadMessages();
    }

    function sendMsg(type = 'text', content = null) {
        const input = document.getElementById('msgInput');
        const val = content || input.value;
        if(!val && type === 'text') return;

        db.ref('messages').push({
            sender: currentUser.name,
            senderPic: currentUser.pic,
            type: type,
            body: val,
            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
        });
        input.value = "";
    }

    function loadMessages() {
        db.ref('messages').limitToLast(50).on('value', s => {
            const win = document.getElementById('chat-window');
            win.innerHTML = "";
            s.forEach(c => {
                const m = c.val();
                const isMe = m.sender === currentUser.name;
                let html = `<div class="msg ${isMe ? 'sent' : 'received'}">
                    <span class="sender-name">${isMe ? 'أنت' : m.sender}</span>`;
                
                if(m.type === 'text') html += `<div>${m.body}</div>`;
                else if(m.type === 'audio') html += `<audio controls src="${m.body}"></audio>`;
                
                html += `<div class="time">${m.time}</div></div>`;
                win.innerHTML += html;
            });
            win.scrollTop = win.scrollHeight;
        });
    }

    // --- الريكورد (الصوت) ---
    async function toggleRecord() {
        const btn = document.getElementById('mic-btn');
        if (!mediaRecorder || mediaRecorder.state === "inactive") {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/ogg' });
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = () => sendMsg('audio', reader.result);
                audioChunks = [];
            };
            mediaRecorder.start();
            btn.style.color = "red";
            Swal.fire({ title: 'جاري التسجيل...', timer: 3000, showConfirmButton: false });
        } else {
            mediaRecorder.stop();
            btn.style.color = "#8696a0";
        }
    }

    // --- لوحة المالك ---
    function showOwnerPanel() {
        db.ref('users').once('value', s => {
            let list = '<div style="text-align:right">';
            s.forEach(u => {
                const user = u.val();
                if(user.status === 'pending') {
                    list += `<p>${user.name} - ${user.phone} <button onclick="approveUser('${user.phone}')">قبول</button></p>`;
                }
            });
            list += '</div>';
            Swal.fire({ title: 'طلبات الانضمام', html: list || 'لا يوجد طلبات جديدة' });
        });
    }

    window.approveUser = (phone) => {
        db.ref('users').child(phone).update({ status: 'approved' }).then(() => Swal.fire('تم القبول'));
    }
</script>
</body>
</html>
